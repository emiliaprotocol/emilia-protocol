[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "emilia-protocol"
version = "0.1.0"
description = "Reference Python SDK for trust profiles, policy evaluation, install preflight, disputes, and appeals across counterparties, software, and machine actors."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "Apache-2.0" }
authors = [
  { name = "EMILIA Protocol", email = "hello@emiliaprotocol.ai" }
]
keywords = [
  "trust",
  "trust profile",
  "policy evaluation",
  "install preflight",
  "appeals",
  "disputes",
  "software trust",
  "marketplace trust",
  "machine actors",
  "counterparties",
  "mcp",
  "emilia protocol"
]
dependencies = [
  "requests>=2.28.0"
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3"
]

[project.urls]
Homepage = "https://emiliaprotocol.ai"
Repository = "https://github.com/emiliaprotocol/emilia-protocol"
Issues = "https://github.com/emiliaprotocol/emilia-protocol/issues"
