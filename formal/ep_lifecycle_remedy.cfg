\* TLC configuration for ep_lifecycle_remedy.tla.
\*
\* Two remedy slots and two tenants exercise identity freshness and isolation.
\* MaxBudget 2 reaches a real partial state (one unit consumed, one reserved).
\* MaxSteps 8 covers appeal/trigger, authorization, claim, partial effect,
\* indeterminate report, reconciliation, and late revocation.

CONSTANTS
    Tenants = {tenant_a, tenant_b}
    OriginalTenant = tenant_a
    Remedies = {remedy_a, remedy_b}

    CAIDs = {original_caid, remedy_caid_a, remedy_caid_b}
    ActionIDs = {original_action, remedy_action_a, remedy_action_b}
    OperationIDs = {original_operation, remedy_operation_a, remedy_operation_b}

    EffectDigests = {original_effect_digest}
    OwnerModes = {principal_owner, delegated_owner}
    OwnerDigests = {owner_digest_a, owner_digest_b}
    ClaimTokens = {original_claim_token, remedy_claim_token_a,
                   remedy_claim_token_b}
    DecisionDigests = {authenticated_decision_digest}

    OriginalCAID = original_caid
    OriginalActionID = original_action
    OriginalOperationID = original_operation
    OriginalEffectDigest = original_effect_digest
    OriginalOwnerMode = principal_owner
    OriginalOwnerDigest = owner_digest_a
    OriginalClaimToken = original_claim_token

    MaxBudget = 2
    MaxSteps = 8

SPECIFICATION Spec

CONSTRAINT BoundedExploration

INVARIANT ModelShape
INVARIANT TypeInvariant
INVARIANT OriginalEffectRecord
INVARIANT AuthenticatedDecisionRequired
INVARIANT FreshRemedyIdentifiers
INVARIANT ExactlyOneOwnerModeDigest
INVARIANT ExactlyOneClaimToken
INVARIANT ObservationShape
INVARIANT RemedyLifecycleConsistent
INVARIANT PartialBudgetConservation
INVARIANT IndeterminateStateFence
INVARIANT AuthenticatedReconciliation
INVARIANT TriggerAuthorityBoundary
INVARIANT TenantIsolation

PROPERTY OriginalEffectImmutable
PROPERTY RemedyIdentityImmutable
PROPERTY OwnerBindingImmutable
PROPERTY ClaimTokenImmutable
PROPERTY AuthorizationTransitionAuthenticated
PROPERTY IndeterminateOnlyReconciles
PROPERTY ReconciliationTransitionAuthenticated
PROPERTY LateRevocationDoesNotUndo
PROPERTY TriggerDoesNotGrantAuthority
PROPERTY AppealCannotRewriteClaimedEffect
PROPERTY CrossTenantAccountingIsolation
PROPERTY TerminalRemedyIrreversible
