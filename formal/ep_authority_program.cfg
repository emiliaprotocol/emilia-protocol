\* TLC configuration for the public EP-AUTHORITY-PROGRAM-v1 model.
\*
\* Representative recursive expression, matching the verifier test fixture:
\*
\*   sequence(stage-a, parallel(stage-b, stage-c), stage-d)
\*
\* Derived immediate predecessors are:
\*   stage-a -> {}
\*   stage-b -> {stage-a}
\*   stage-c -> {stage-a}
\*   stage-d -> {stage-b, stage-c}

CONSTANTS
  RootNode = "seq-root"
  Nodes = {"seq-root", "stage-a-node", "parallel-bc", "stage-b-node", "stage-c-node", "stage-d-node"}
  NodeKind <- NodeKindModel
  Children <- ChildrenModel
  StageForNode <- StageForNodeModel

SPECIFICATION Spec

INVARIANT ExpressionIsSeriesParallel
INVARIANT TypeOK
INVARIANT CheckedReceiptsAreValid
INVARIANT CheckedReceiptsHaveTheirPredecessors
INVARIANT ValidOnlyAfterCompleteFold
INVARIANT ValidImpliesPinnedSignedProgram
INVARIANT ValidImpliesExactStageSet
INVARIANT ValidImpliesExactReceiptBindings
INVARIANT ConservationOfAuthority
INVARIANT NoExecutionProof

PROPERTY EventuallyTerminates
