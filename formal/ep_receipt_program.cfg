\* TLC configuration for ep_receipt_program.tla
\*
\* Two attempts contend for one stable operation id. This is the smallest
\* nontrivial finite scope for operation-in-flight and committed replay.

CONSTANTS
    Attempts = {attempt1, attempt2}

SPECIFICATION Spec

\* All attempts eventually reaching terminal is an expected quiescent state;
\* this model checks safety and makes no progress/liveness claim.
CHECK_DEADLOCK FALSE

INVARIANT TypeInvariant
INVARIANT OperationStateSound
INVARIANT PipelineOrderSafety
INVARIANT ReservationOwnership
INVARIANT EffectRequiresReservation
INVARIANT CommitRequiresEffect
INVARIANT ExecutedImpliesCommitted
INVARIANT IndeterminateLocksAuthority
INVARIANT RefusalBeforeEffect
INVARIANT ReplayFailClosed
INVARIANT SingleEffectOwner
INVARIANT TerminalOutcomeComplete
INVARIANT CertificateOutcomeSound
INVARIANT CertificateEvidenceRequired

PROPERTY TerminalAttemptStability
PROPERTY CommittedOperationStability
PROPERTY ReservationNeverReopens
