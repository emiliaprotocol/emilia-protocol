\* TLC configuration for ep_trust_program.tla.
\*
\* The model values instantiate a heterogeneous four-stage diamond DAG with
\* seven requirement seats, six globally one-use evidence ids, and two
\* competing execution owners.  MaxRevision 10 covers every longest useful
\* path (five admissions, claim, indeterminate result, reconciliation, and
\* invalidation) while keeping exploration finite.

CONSTANTS
    IdentityStage = identity_stage
    ScreeningStage = screening_stage
    LegalStage = legal_stage
    ApprovalStage = approval_stage

    IdentitySeat = identity_seat
    ScreeningSeatA = screening_seat_a
    ScreeningSeatB = screening_seat_b
    LegalSeat = legal_seat
    ApprovalSeatA = approval_seat_a
    ApprovalSeatB = approval_seat_b
    ApprovalSeatC = approval_seat_c

    Evidence = {evidence_1, evidence_2, evidence_3,
                evidence_4, evidence_5, evidence_6}
    Owners = {owner_a, owner_b}
    MaxRevision = 10

SPECIFICATION Spec

CONSTRAINT BoundedExploration

INVARIANT TypeInvariant
INVARIANT ProgramShape
INVARIANT StageLifecycleConsistent
INVARIANT ExactDependencyBinding
INVARIANT EvidenceUseIsExact
INVARIANT EvidenceOneUse
INVARIANT PartialThresholdZeroAuthority
INVARIANT ExecutionRequiresExactDependencies
INVARIANT SingleOwnerState
INVARIANT IndeterminateStateFence
INVARIANT AuthenticatedTerminalState
INVARIANT InvalidatedStateIsClosed

PROPERTY RevisionMonotonic
PROPERTY AtomicRevisionTransitions
PROPERTY EvidenceUseMonotonic
PROPERTY SatisfiedDoesNotReopen
PROPERTY ClaimOwnerImmutable
PROPERTY ClaimRequiresReady
PROPERTY IndeterminateOnlyReconcilesOrInvalidates
PROPERTY AuthenticatedReconciliationTransition
PROPERTY TerminalExecutionIrreversible
PROPERTY NoResurrection
