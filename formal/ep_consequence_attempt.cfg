\* TLC Configuration for ep_consequence_attempt.tla
\* Run from formal/ with the repository-pinned TLA+ v1.7.4 tool:
\*   java -Xmx2G -jar ../tla2tools.jar \
\*     -config ep_consequence_attempt.cfg ep_consequence_attempt.tla
\*
\* Two attempt IDs and requests expose cross-attempt/AEB binding mistakes.
\* Three opaque owners allow custody to rotate twice, making stale-owner and
\* expired-lease recovery checks non-vacuous. The evidence set covers all
\* terminal outcomes plus unauthenticated exact-looking evidence.

CONSTANTS
    AttemptA = attemptA
    AttemptB = attemptB
    RequestA = requestA
    RequestB = requestB
    OwnerA = ownerA
    OwnerB = ownerB
    OwnerC = ownerC
    EvidenceCommitA = evidenceCommitA
    EvidenceReleaseA = evidenceReleaseA
    EvidenceEscalateA = evidenceEscalateA
    EvidenceCommitB = evidenceCommitB
    EvidenceUnauthenticatedA = evidenceUnauthenticatedA

SPECIFICATION Spec

CONSTRAINT BoundedExploration

\* Single-state safety invariants
INVARIANT TypeInvariant
INVARIANT DormantSlotsClean
INVARIANT UniqueAttemptRequestBinding
INVARIANT StaleOwnerExcluded
INVARIANT LifecycleConsistency
INVARIANT InvokeAtMostOnce
INVARIANT UncertainAttemptBlocksReplay
INVARIANT AuthenticatedExactAttemptReconciliation
INVARIANT PendingCommitEvidenceSound
INVARIANT TerminalOutcomeConsistency
INVARIANT AebAttemptCoupling
INVARIANT CommittedRequiresAebConsumed
INVARIANT ProviderInvocationRequiresAebAuthority
INVARIANT ConsumedAebHasAttempt

\* Transition-level safety properties
PROPERTY AttemptAllocationAndBindingStable
PROPERTY AttemptReservationRequiresAebReserved
PROPERTY OwnerRotationFencesPriorOwner
PROPERTY RecoveryCannotTakeLiveLease
PROPERTY InvocationCountMonotonic
PROPERTY NoBlindReplayWhileUncertain
PROPERTY EffectUncertaintyOnlyClearsToReleased
PROPERTY TerminalStateIrreversibility
PROPERTY ReconciliationStartsIndeterminate
PROPERTY ReconciliationEvidenceImmutable
PROPERTY AebConsumptionAfterInvocation
PROPERTY AebConsumedNeverReopens
PROPERTY AebReleaseCoupledToReleasedAttempt
