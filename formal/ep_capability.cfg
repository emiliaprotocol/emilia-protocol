\* TLC Configuration for ep_capability.tla
\* Run with: java -jar tla2tools.jar -config ep_capability.cfg ep_capability.tla
\*
\* CONSTANTS bounded to small finite sets for tractable model checking.
\* Capabilities = {cap0, cap1, cap2}  cap0 is the registrable root; cap1, cap2 are
\*                                    delegatable children (a chain cap0->cap1->cap2
\*                                    reaches depth 2 = MaxDelegates).
\* Operations = {op1, op2}            two operation slots — enough for a two-hop
\*                                    delegation chain or two concurrent spends, which
\*                                    is what makes the reserved-sum identity non-trivial
\*                                    (one commit can leave reserved > 0).
\* MaxBudget = 2                      budgets/amounts in 0..2.
\* MaxDelegates = 2                   delegation chain length bound.
\* MaxTick = 2                        modeled clock 0..2, drives the expiry path.
\*
\* Model values cap0, cap1, cap2, op1, op2 are distinct uninterpreted atoms.

CONSTANTS
    Capabilities = {cap0, cap1, cap2}
    Operations = {op1, op2}
    RootCap = cap0
    MaxBudget = 2
    MaxDelegates = 2
    MaxTick = 2

SPECIFICATION Spec

CONSTRAINT BoundedExploration

\* Safety invariants (single-state)
INVARIANT TypeInvariant
INVARIANT BudgetNonNegative
INVARIANT ReserveWithinBudget
INVARIANT ConsumedIsCommittedSum
INVARIANT ReservedIsReservedSum
INVARIANT ThresholdSatisfied
INVARIANT DelegationBounded
INVARIANT DelegationAuthorityNonIncreasing
INVARIANT ChildExpiryBoundedByParent
INVARIANT DelegationAcyclic

\* Transition-level (action) properties
PROPERTY ConsumptionMonotonic
PROPERTY BudgetImmutable
PROPERTY NoDoubleCommit
PROPERTY CommitRequiresReserve
