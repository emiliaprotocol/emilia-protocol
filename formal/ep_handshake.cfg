\* TLC Configuration for ep_handshake.tla
\* Run with: java -jar tla2tools.jar -config ep_handshake.cfg ep_handshake.tla
\*
\* CONSTANTS are assigned small finite sets for tractable model checking.
\* Handshakes = {h1}       ONE handshake is the CI default: it exhausts the full
\*                         lifecycle, signoff, and continuity state machine quickly
\*                         and deterministically (413K states, depth 20, ~1s). The
\*                         two-handshake configuration that probes cross-handshake
\*                         concurrency is much larger; its result is recorded
\*                         separately in PROOF_STATUS.md rather than run on every push.
\* Actors = {a1, a2}       two actors, enough to catch delegation cycle bugs.
\* Policies = {p1}         one policy is sufficient; the spec uses it only as a set.
\*
\* Model values h1, a1, a2, p1 are distinct uninterpreted atoms.

CONSTANTS
    Handshakes = {h1}
    Actors = {a1, a2}
    Policies = {p1}
    MaxPolicyVer = 2
    Claims = {c1}

SPECIFICATION Spec

\* Bound the events sequence to keep the state space finite for TLC.
\* BoundedExploration == Len(events) <= 10 (defined in the TLA+ spec) covers all
\* reachable lifecycle paths for one handshake, about 7 normal transitions plus
\* signoff and continuity transitions, with margin. The complete state-graph
\* search reaches depth 20 under this bound.
CONSTRAINT BoundedExploration

\* Core safety invariants
INVARIANT TypeInvariant
INVARIANT ConsumeOnceSafety
INVARIANT ConsumeRequiresVerified
INVARIANT RevokedIsTerminal
INVARIANT EventCoverage
INVARIANT PolicyRequired
INVARIANT ExpiredIsTerminal
INVARIANT RejectedIsTerminal
INVARIANT WriteBypassSafety
INVARIANT TerminalStateIrreversibility
INVARIANT DelegateCannotExceedPrincipal
INVARIANT DelegationAcyclicity
INVARIANT PolicyHashMismatchDetection
INVARIANT EventCompleteness

\* Accountable Signoff safety invariants
INVARIANT SignoffRequiresVerifiedHandshake
INVARIANT SignoffConsumeOnce
INVARIANT SignoffBindingMatch
INVARIANT SignoffTerminalIrreversible
INVARIANT DenyCannotBeApproved
INVARIANT SignoffAuthorityMatch

\* EP-IX Identity Continuity safety invariants
INVARIANT ContinuityTypeInvariant
INVARIANT ContinuityTerminalIrreversibility
INVARIANT FrozenClaimBlocksResolution
INVARIANT ChallengeRateLimit
INVARIANT SelfContestImpossible
INVARIANT WithdrawnClaimIsTerminal
