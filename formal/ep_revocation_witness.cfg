\* TLC configuration for ep_revocation_witness.tla.
\*
\* Run from formal/ with the repository-pinned TLA+ v1.7.4 tool:
\*   java -Xmx2G -jar ../tla2tools.jar \
\*     -config ep_revocation_witness.cfg ep_revocation_witness.tla
\*
\* MaxTime 4 reaches future-effective revocation, status expiry, stale witness
\* evidence, and an old terminal revocation that remains accepted.  Five steps
\* reach A/1 -> time 1 -> A/2 -> conflicting A/2 -> refused A/3.  Five exact
\* streams vary tenant, gate, witness, and capture point one coordinate at a
\* time.  Separate bounded traces cover independent-stream advancement and
\* every hostile revocation/status presentation.  TLC action coverage is the
\* non-vacuity witness.

CONSTANTS
    TargetA = target_a
    TargetB = target_b

    RevGoodA = rev_good_a
    RevFutureA = rev_future_a
    RevUnpinnedA = rev_unpinned_a
    RevForgedA = rev_forged_a
    RevMalformedA = rev_malformed_a
    RevGoodB = rev_good_b

    StatusFreshA = status_fresh_a
    StatusShortA = status_short_a
    StatusFutureA = status_future_a
    StatusUnpinnedA = status_unpinned_a
    StatusForgedA = status_forged_a
    StatusFreshB = status_fresh_b

    TenantA = tenant_a
    TenantB = tenant_b
    GateA = gate_a
    GateB = gate_b
    WitnessA = witness_a
    WitnessB = witness_b
    CaptureA = capture_a
    CaptureB = capture_b

    WitnessASeq1 = witness_a_seq_1
    WitnessASeq2 = witness_a_seq_2
    WitnessASeq2Replay = witness_a_seq_2_replay
    WitnessASeq2Conflict = witness_a_seq_2_conflict
    WitnessASeq3 = witness_a_seq_3
    WitnessTenantBSeq1 = witness_tenant_b_seq_1
    WitnessGateBSeq1 = witness_gate_b_seq_1
    WitnessBSeq1 = witness_b_seq_1
    WitnessCaptureBSeq1 = witness_capture_b_seq_1
    WitnessASeq3Unpinned = witness_a_seq_3_unpinned
    WitnessASeq3Forged = witness_a_seq_3_forged
    WitnessASeq3Future = witness_a_seq_3_future
    WitnessASeq3Stale = witness_a_seq_3_stale

    DigestA1 = digest_a_1
    DigestA2 = digest_a_2
    DigestA2Conflict = digest_a_2_conflict
    DigestA3 = digest_a_3
    DigestTenantB1 = digest_tenant_b_1
    DigestGateB1 = digest_gate_b_1
    DigestB1 = digest_b_1
    DigestCaptureB1 = digest_capture_b_1

    MaxTime = 4
    MaxWitnessAge = 2
    MaxSequence = 3
    MaxSteps = 5

SPECIFICATION Spec

CONSTRAINT BoundedExploration

INVARIANT ModelShape
INVARIANT TypeInvariant
INVARIANT TerminalRevocationStateSound
INVARIANT TerminalRevocationDoesNotAgeOut
INVARIANT FreshStatusRelianceSound
INVARIANT TerminalRevocationOverridesStatus
INVARIANT WitnessHeadSound
INVARIANT PoisonEvidenceSound
INVARIANT PoisonIrreversibilityState
INVARIANT PoisonedStreamClosed
INVARIANT AdversaryObservationsTyped

PROPERTY TrustedTimeMonotonic
PROPERTY TerminalRevocationIrreversible
PROPERTY RefusedRevocationIsInert
PROPERTY StatusRefusalCannotInstallEvidence
PROPERTY WitnessSequenceMonotonic
PROPERTY WitnessAdvanceAuthenticatedFreshPinned
PROPERTY WitnessRefusalCannotAdvance
PROPERTY WitnessPoisonIrreversible
PROPERTY PoisonedWitnessHeadImmutable
PROPERTY PoisonedStreamCannotRestoreAcceptance
PROPERTY ExactWitnessStreamIsolation
