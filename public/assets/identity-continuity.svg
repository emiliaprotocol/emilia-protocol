<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
<style>
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #D3D1C7; } .ts { fill: #888780; } .arr { stroke: #5F5E5A; }
    .bg-purple rect { fill: #3C3489; stroke: #AFA9EC; }
    .bg-teal rect { fill: #085041; stroke: #5DCAA5; }
    .bg-gray rect { fill: #444441; stroke: #B4B2A9; }
    .bg-green rect { fill: #27500A; stroke: #97C459; }
    .bg-amber rect { fill: #633806; stroke: #FAC775; }
    .bg-purple .th { fill: #CECBF6; } .bg-purple .ts { fill: #AFA9EC; }
    .bg-teal .th { fill: #9FE1CB; } .bg-gray .th { fill: #D3D1C7; }
    .bg-green .th { fill: #C0DD97; } .bg-green .ts { fill: #97C459; }
    .bg-amber .th { fill: #FAC775; } .bg-amber .ts { fill: #EF9F27; }
  }
  .bg-purple rect { fill: #EEEDFE; stroke: #7F77DD; }
  .bg-teal rect { fill: #E1F5EE; stroke: #1D9E75; }
  .bg-gray rect { fill: #F1EFE8; stroke: #B4B2A9; }
  .bg-green rect { fill: #EAF3DE; stroke: #639922; }
  .bg-amber rect { fill: #FAEEDA; stroke: #BA7517; }
  .bg-purple .th { fill: #3C3489; } .bg-purple .ts { fill: #534AB7; }
  .bg-teal .th { fill: #085041; } .bg-gray .th { fill: #444441; }
  .bg-green .th { fill: #27500A; } .bg-green .ts { fill: #3B6D11; }
  .bg-amber .th { fill: #633806; } .bg-amber .ts { fill: #854F0B; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="30" text-anchor="middle">Identity continuity (EP-IX)</text>
<text class="ts" x="340" y="48" text-anchor="middle">Principals persist. Entities rotate. Trust follows.</text>

<g class="bg-purple"><rect x="230" y="70" width="220" height="56" rx="12" stroke-width="0.5"/>
<text class="th" x="340" y="90" text-anchor="middle" dominant-baseline="central">Principal</text>
<text class="ts" x="340" y="108" text-anchor="middle" dominant-baseline="central">Enduring actor identity</text></g>

<line x1="280" y1="126" x2="130" y2="175" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="126" x2="340" y2="175" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="126" x2="540" y2="175" class="arr" marker-end="url(#arrow)"/>

<g class="bg-teal"><rect x="60" y="176" width="140" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="198" text-anchor="middle" dominant-baseline="central">Entity A (old)</text></g>

<g class="bg-teal"><rect x="270" y="176" width="140" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="198" text-anchor="middle" dominant-baseline="central">Entity B (new)</text></g>

<g class="bg-gray"><rect x="480" y="176" width="140" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="198" text-anchor="middle" dominant-baseline="central">Device / API</text></g>

<line x1="200" y1="198" x2="268" y2="198" class="arr" marker-end="url(#arrow)" stroke="#534AB7"/>
<text class="ts" x="234" y="188" text-anchor="middle">Continuity claim</text>

<g class="bg-green"><rect x="170" y="270" width="340" height="56" rx="12" stroke-width="0.5"/>
<text class="th" x="340" y="290" text-anchor="middle" dominant-baseline="central">Continuity profile</text>
<text class="ts" x="340" y="308" text-anchor="middle" dominant-baseline="central">History linked · fraud checked · trust preserved</text></g>

<line x1="130" y1="220" x2="270" y2="270" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="220" x2="340" y2="268" class="arr" marker-end="url(#arrow)"/>

<g class="bg-amber"><rect x="530" y="270" width="120" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="590" y="284" text-anchor="middle" dominant-baseline="central">7-day</text>
<text class="ts" x="590" y="302" text-anchor="middle" dominant-baseline="central">Challenge window</text></g>
<path d="M510 292L528 292" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

<text class="ts" x="340" y="350" text-anchor="middle">Fission does not multiply trust. Continuity during active disputes is frozen.</text>
</svg>
