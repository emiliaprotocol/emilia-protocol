<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
<style>
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #D3D1C7; } .ts { fill: #888780; } .arr { stroke: #5F5E5A; }
    .bg-gray rect { fill: #444441; stroke: #B4B2A9; }
    .bg-teal rect { fill: #085041; stroke: #5DCAA5; }
    .bg-purple rect { fill: #3C3489; stroke: #AFA9EC; }
    .bg-green rect { fill: #27500A; stroke: #97C459; }
    .bg-red rect { fill: #791F1F; stroke: #F09595; }
    .bg-amber rect { fill: #633806; stroke: #FAC775; }
    .bg-teal .th { fill: #9FE1CB; } .bg-teal .ts { fill: #5DCAA5; }
    .bg-purple .th { fill: #CECBF6; } .bg-green .th { fill: #C0DD97; }
    .bg-red .th { fill: #F7C1C1; } .bg-amber .th { fill: #FAC775; }
    .bg-gray .th { fill: #D3D1C7; }
  }
  .bg-gray rect { fill: #F1EFE8; stroke: #B4B2A9; }
  .bg-teal rect { fill: #E1F5EE; stroke: #1D9E75; }
  .bg-purple rect { fill: #EEEDFE; stroke: #7F77DD; }
  .bg-green rect { fill: #EAF3DE; stroke: #639922; }
  .bg-red rect { fill: #FCEBEB; stroke: #E24B4A; }
  .bg-amber rect { fill: #FAEEDA; stroke: #BA7517; }
  .bg-teal .th { fill: #085041; } .bg-teal .ts { fill: #0F6E56; }
  .bg-purple .th { fill: #3C3489; } .bg-green .th { fill: #27500A; }
  .bg-red .th { fill: #791F1F; } .bg-amber .th { fill: #633806; }
  .bg-gray .th { fill: #444441; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="30" text-anchor="middle">Trust evaluation process</text>
<text class="ts" x="340" y="48" text-anchor="middle">Any principal submits interactions → engine evaluates → policy decides</text>

<g class="bg-gray"><rect x="40" y="74" width="120" height="44" rx="8" stroke-width="0.5"/><text class="th" x="100" y="96" text-anchor="middle" dominant-baseline="central">Human</text></g>
<g class="bg-gray"><rect x="186" y="74" width="120" height="44" rx="8" stroke-width="0.5"/><text class="th" x="246" y="96" text-anchor="middle" dominant-baseline="central">AI agent</text></g>
<g class="bg-gray"><rect x="332" y="74" width="120" height="44" rx="8" stroke-width="0.5"/><text class="th" x="392" y="96" text-anchor="middle" dominant-baseline="central">Software</text></g>
<g class="bg-gray"><rect x="478" y="74" width="120" height="44" rx="8" stroke-width="0.5"/><text class="th" x="538" y="96" text-anchor="middle" dominant-baseline="central">Marketplace</text></g>

<line x1="100" y1="118" x2="240" y2="174" class="arr" marker-end="url(#arrow)"/>
<line x1="246" y1="118" x2="280" y2="174" class="arr" marker-end="url(#arrow)"/>
<line x1="392" y1="118" x2="340" y2="174" class="arr" marker-end="url(#arrow)"/>
<line x1="538" y1="118" x2="380" y2="174" class="arr" marker-end="url(#arrow)"/>

<g class="bg-teal"><rect x="190" y="176" width="240" height="56" rx="12" stroke-width="0.5"/>
<text class="th" x="310" y="196" text-anchor="middle" dominant-baseline="central">EMILIA trust engine</text>
<text class="ts" x="310" y="214" text-anchor="middle" dominant-baseline="central">Profiles, evidence, context</text></g>

<line x1="430" y1="204" x2="480" y2="204" class="arr" marker-end="url(#arrow)"/>

<g class="bg-purple"><rect x="482" y="182" width="140" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="552" y="204" text-anchor="middle" dominant-baseline="central">Policy check</text></g>

<line x1="522" y1="226" x2="500" y2="270" class="arr" marker-end="url(#arrow)" stroke="#0F6E56"/>
<line x1="582" y1="226" x2="610" y2="270" class="arr" marker-end="url(#arrow)" stroke="#A32D2D"/>

<g class="bg-green"><rect x="445" y="272" width="110" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="500" y="294" text-anchor="middle" dominant-baseline="central">Allow</text></g>
<g class="bg-red"><rect x="565" y="272" width="90" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="610" y="294" text-anchor="middle" dominant-baseline="central">Deny</text></g>

<g class="bg-amber"><rect x="40" y="272" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="294" text-anchor="middle" dominant-baseline="central">Appeal / dispute</text></g>
<path d="M120 272L120 204L188 204" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<text class="ts" x="80" y="254">Challenges feed back</text>
</svg>
