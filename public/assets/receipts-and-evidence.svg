<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg">
<style>
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #D3D1C7; } .ts { fill: #888780; } .arr { stroke: #5F5E5A; }
    .bg-teal rect { fill: #085041; stroke: #5DCAA5; }
    .bg-purple rect { fill: #3C3489; stroke: #AFA9EC; }
    .bg-coral rect { fill: #712B13; stroke: #F0997B; }
    .bg-green rect { fill: #27500A; stroke: #97C459; }
    .bg-blue rect { fill: #0C447C; stroke: #85B7EB; }
    .bg-gray rect { fill: #444441; stroke: #B4B2A9; }
    .bg-amber rect { fill: #633806; stroke: #FAC775; }
    .bg-teal .th { fill: #9FE1CB; } .bg-teal .ts { fill: #5DCAA5; }
    .bg-purple .th { fill: #CECBF6; } .bg-purple .ts { fill: #AFA9EC; }
    .bg-coral .th { fill: #F5C4B3; } .bg-coral .ts { fill: #F0997B; }
    .bg-green .th { fill: #C0DD97; } .bg-blue .th { fill: #B5D4F4; }
    .bg-gray .th { fill: #D3D1C7; } .bg-amber .th { fill: #FAC775; }
  }
  .bg-teal rect { fill: #E1F5EE; stroke: #1D9E75; }
  .bg-purple rect { fill: #EEEDFE; stroke: #7F77DD; }
  .bg-coral rect { fill: #FAECE7; stroke: #D85A30; }
  .bg-green rect { fill: #EAF3DE; stroke: #639922; }
  .bg-blue rect { fill: #E6F1FB; stroke: #378ADD; }
  .bg-gray rect { fill: #F1EFE8; stroke: #B4B2A9; }
  .bg-amber rect { fill: #FAEEDA; stroke: #BA7517; }
  .bg-teal .th { fill: #085041; } .bg-teal .ts { fill: #0F6E56; }
  .bg-purple .th { fill: #3C3489; } .bg-purple .ts { fill: #534AB7; }
  .bg-coral .th { fill: #712B13; } .bg-coral .ts { fill: #993C1D; }
  .bg-green .th { fill: #27500A; } .bg-blue .th { fill: #0C447C; }
  .bg-gray .th { fill: #444441; } .bg-amber .th { fill: #633806; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="30" text-anchor="middle">Receipts and evidence</text>
<text class="ts" x="340" y="48" text-anchor="middle">Interactions create verifiable trust records between counterparties</text>

<g class="bg-teal"><rect x="30" y="76" width="140" height="56" rx="10" stroke-width="0.5"/>
<text class="th" x="100" y="96" text-anchor="middle" dominant-baseline="central">Counterparty A</text>
<text class="ts" x="100" y="114" text-anchor="middle" dominant-baseline="central">Buyer, agent, system</text></g>

<g class="bg-purple"><rect x="250" y="76" width="180" height="56" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="96" text-anchor="middle" dominant-baseline="central">EMILIA Protocol</text>
<text class="ts" x="340" y="114" text-anchor="middle" dominant-baseline="central">Evaluate + record</text></g>

<g class="bg-coral"><rect x="510" y="76" width="140" height="56" rx="10" stroke-width="0.5"/>
<text class="th" x="580" y="96" text-anchor="middle" dominant-baseline="central">Counterparty B</text>
<text class="ts" x="580" y="114" text-anchor="middle" dominant-baseline="central">Seller, server, plugin</text></g>

<line x1="170" y1="104" x2="248" y2="104" class="arr" marker-end="url(#arrow)"/>
<line x1="430" y1="104" x2="508" y2="104" class="arr" marker-end="url(#arrow)"/>

<g class="bg-green"><rect x="52" y="190" width="130" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="117" y="212" text-anchor="middle" dominant-baseline="central">Receipts</text></g>

<g class="bg-blue"><rect x="198" y="190" width="130" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="263" y="212" text-anchor="middle" dominant-baseline="central">Evidence data</text></g>

<g class="bg-gray"><rect x="344" y="190" width="130" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="409" y="212" text-anchor="middle" dominant-baseline="central">Trust record</text></g>

<g class="bg-amber"><rect x="490" y="190" width="130" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="555" y="212" text-anchor="middle" dominant-baseline="central">Appeal / dispute</text></g>

<line x1="280" y1="132" x2="117" y2="188" class="arr" marker-end="url(#arrow)"/>
<line x1="310" y1="132" x2="263" y2="188" class="arr" marker-end="url(#arrow)"/>
<line x1="370" y1="132" x2="409" y2="188" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="132" x2="555" y2="188" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="340" y="264" text-anchor="middle">Every record is append-only. Corrections supersede, never erase.</text>
<text class="ts" x="340" y="282" text-anchor="middle">Chain-linked hashing + Merkle root anchoring on Base L2.</text>
</svg>
