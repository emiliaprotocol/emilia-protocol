\* TLC configuration for the private DTC Base settlement state machine.
\* The state space includes both withdrawals and both reconciliation outcomes.

CONSTANTS
    Budget = 2
    Spend = 1

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

INVARIANT TypeInvariant
INVARIANT MoneyConservation
INVARIANT ReceiptMatchesLifecycle
INVARIANT NoClaimsBeforeTerminal
INVARIANT IndeterminateFreezesFullBudget
INVARIANT TerminalUnlocksBudget
INVARIANT SuccessAllocationBounded
INVARIANT NoMerchantPaymentOnFailure

PROPERTY ProviderRevocationMonotonic
