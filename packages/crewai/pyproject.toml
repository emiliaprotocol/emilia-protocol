[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "emilia-crewai"
version = "0.1.0"
description = "Guard CrewAI tools with EMILIA Protocol — require an offline-verifiable authorization receipt (EP-RECEIPT-v1) before an irreversible tool runs: missing -> refused, valid -> runs, replay -> refused, forged -> refused (RR-1)."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "Iman Schrock", email = "team@emiliaprotocol.ai" }]
keywords = ["crewai", "ai-agent", "authorization", "human-in-the-loop", "guardrails", "emilia-protocol", "agent-safety", "multi-agent"]
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Intended Audience :: Developers",
  "Topic :: Security",
]
dependencies = [
  "emilia-verify>=1.0.0",
]

[project.optional-dependencies]
crewai = ["crewai>=0.1.0"]
test = ["cryptography>=41", "pytest>=7"]

[project.urls]
Homepage = "https://www.emiliaprotocol.ai/agent-guard"
Repository = "https://github.com/emiliaprotocol/emilia-protocol"

[tool.setuptools]
packages = ["emilia_crewai"]
