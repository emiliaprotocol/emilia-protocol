name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Tests — must pass 100% ────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run test suite with coverage (vitest)
        run: npx vitest run --coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  # ── Job 2: Build — Next.js production build must succeed ─────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Next.js production build
        run: npx next build

  # ── Job 3: Write discipline ──────────────────────────────────────
  write-discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check write discipline
        run: node scripts/check-write-discipline.js

  # ── Job 4: Invariant coverage ────────────────────────────────────
  invariant-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check invariant coverage
        run: node scripts/check-invariant-coverage.js

  # ── Job 5: Language governance ───────────────────────────────────
  language-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check language governance
        run: node scripts/check-language-governance.js

  # ── Job 6a: License headers ──────────────────────────────────────
  license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
      - name: Check license headers
        run: node scripts/check-license-headers.js

  # ── Job 6b: Type check (conditional — only if tsconfig exists) ───
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Check for tsconfig
        id: tsconfig
        run: |
          if [ -f tsconfig.json ] || [ -f tsconfig.ts ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        if: steps.tsconfig.outputs.exists == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.tsconfig.outputs.exists == 'true'
      - name: TypeScript type check
        if: steps.tsconfig.outputs.exists == 'true'
        run: npx tsc --noEmit
      - name: Skip — no tsconfig found
        if: steps.tsconfig.outputs.exists == 'false'
        run: echo "No tsconfig.json found — skipping type check."

  # ── Job 7: Lint — Next.js lint must pass or warn only ────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Next.js lint
        run: npx next lint

  # ── Job 8: Protocol discipline — trust-model violation guardrails
  protocol-discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run protocol discipline checks
        run: node scripts/check-protocol-discipline.js

      - name: No direct receipt inserts outside canonical path
        run: |
          hits=$(grep -rn "\.from('receipts')\.insert\|\.from(\"receipts\")\.insert" app/ lib/ mcp-server/ --include='*.js' --include='*.mjs' | grep -v "lib/create-receipt.js" | grep -v "lib/canonical-writer.js" || true)
          if [ -n "$hits" ]; then
            echo "::error::Direct receipt inserts found outside canonical path:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no direct receipt inserts outside canonical path."

      - name: No raw EP_ env reads outside lib/env.js
        run: |
          hits=$(grep -rn "process\.env\.EP_" lib/ app/ --include='*.js' --include='*.mjs' | grep -v "lib/env.js" || true)
          if [ -n "$hits" ]; then
            echo "::error::Raw process.env.EP_ reads found outside lib/env.js:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no raw EP_ env reads outside lib/env.js."

  # ── Job 9: MCP server packaging smoke test ───────────────────────
  mcp-server-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        working-directory: mcp-server
        run: npm install
      - name: Verify npm pack succeeds
        working-directory: mcp-server
        run: npm pack
      - name: Smoke test — verify entry point loads
        working-directory: mcp-server
        run: node -e "import('./index.js').then(() => console.log('MCP server entry OK'))"

  # ── Job 9b: Benchmark gate — performance regression check ────────
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run benchmark tests
        run: npx vitest run tests/benchmark.test.js tests/adversarial-benchmarks.test.js
        env:
          BENCHMARK_CI: '1'

  # ── Job 10: TypeScript SDK ───────────────────────────────────────
  sdk-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm install
      - name: Build SDK
        working-directory: sdks/typescript
        run: npm run build
      - name: Type-check
        working-directory: sdks/typescript
        run: npx tsc --noEmit
      - name: Run tests
        working-directory: sdks/typescript
        run: npm test

  # ── Job 11: Python SDK ──────────────────────────────────────────
  sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - name: Install SDK and dev dependencies
        working-directory: sdks/python
        run: pip install -e ".[dev]"
      - name: Verify import
        run: python -c "from emilia_protocol import EPClient; print('Python SDK import OK')"
      - name: Run tests
        working-directory: sdks/python
        run: python -m pytest tests/ -v

  # ── Job 12: OpenAPI spec linting ─────────────────────────────────
  openapi-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
      - name: Lint OpenAPI spec
        run: npx @redocly/cli lint openapi.yaml

  # ── Job 13: Docs consistency ─────────────────────────────────────
  docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: No stale tool counts outside CHANGELOG
        run: |
          hits=$(grep -rn '"15 tools"\|"20 tools"\|"22 tools"\|"23 tools"\|15 tools\|20 tools\|22 tools\|23 tools' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' . | grep -v CHANGELOG | grep -v node_modules || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale tool counts found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no stale tool counts found."

      - name: No stale test counts outside CHANGELOG
        run: |
          hits=$(grep -rn '"152 tests"\|"152 passing"\|152 tests\|152 passing' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' . | grep -v CHANGELOG | grep -v node_modules || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale test counts found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no stale test counts found."

      - name: No old SDK name EmiliaClient outside CHANGELOG
        run: |
          hits=$(grep -rn 'EmiliaClient' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' . | grep -v CHANGELOG | grep -v node_modules || true)
          if [ -n "$hits" ]; then
            echo "::error::Old SDK name 'EmiliaClient' found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no old SDK name found."

      - name: No references to v0.2.0
        run: |
          hits=$(grep -rn 'v0\.2\.0' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' . | grep -v node_modules || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale version 'v0.2.0' references found:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no v0.2.0 references found."

      - name: Tool count in mcp-server/index.js matches README badge
        run: |
          tool_count=$(grep -c 'ep_' mcp-server/index.js || echo 0)
          echo "Found $tool_count ep_ tool entries in mcp-server/index.js"
          badge_count=$(grep -oP '\d+(?=\+? tools)' README.md | head -1 || echo "NOT_FOUND")
          echo "README badge claims: $badge_count tools"
          if [ "$badge_count" = "NOT_FOUND" ]; then
            echo "::warning::Could not parse tool count from README badge — skipping match check."
          elif [ "$tool_count" != "$badge_count" ]; then
            echo "::error::Mismatch: mcp-server/index.js has $tool_count ep_ entries but README badge says $badge_count"
            exit 1
          else
            echo "OK — tool count matches ($tool_count)."
          fi

      - name: OpenAPI path coverage (core routes must be documented)
        run: |
          spec_paths=$(grep -c '^\s\+/api/' openapi.yaml || echo 0)
          route_files=$(find app/api -name route.js 2>/dev/null | wc -l | tr -d ' ')
          echo "openapi.yaml paths: $spec_paths"
          echo "app/api route.js files: $route_files"
          # Enforce minimum 75% coverage — cloud/operational routes may be documented separately.
          # Full parity target: Q2 2026 (tracked in GOVERNANCE.md).
          min_paths=$(( route_files * 75 / 100 ))
          if [ "$spec_paths" -lt "$min_paths" ]; then
            echo "::error::OpenAPI coverage too low: $spec_paths/$route_files paths documented (minimum: $min_paths)"
            exit 1
          fi
          echo "OK — OpenAPI coverage $spec_paths/$route_files ($(( spec_paths * 100 / route_files ))%)."

  # ── Job 14: Secret scanning (gitleaks) ──────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 15: Docs secrets lint ──────────────────────────────────
  docs-secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
      - name: Check docs for leaked secrets
        run: node scripts/check-docs-secrets.js

  # ── Job 16: Docker build smoke test ──────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Build Docker image
        run: docker build -t ep-test .

  # ── Job 17: Postgres integration tests ───────────────────────────
  integration-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     ep_test
          POSTGRES_PASSWORD: ep_test
          POSTGRES_DB:       ep_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ep_test -d ep_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Postgres integration tests
        run: npx vitest run tests/postgres-integration.test.js
        env:
          INTEGRATION_POSTGRES: "1"
          PGHOST:     localhost
          PGPORT:     "5433"
          PGUSER:     ep_test
          PGPASSWORD: ep_test
          PGDATABASE: ep_test
