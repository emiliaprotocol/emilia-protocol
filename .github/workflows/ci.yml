name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Test matrix across Node 18, 20, 22 ──────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/
          retention-days: 14

  # ── Job 2: Lint ────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run Next.js lint
        run: npx next lint

  # ── Job 3: Verify Next.js production build ──────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx next build

  # ── Job 3: MCP server packaging smoke test ──────────────────────────
  mcp-server-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: mcp-server
        run: npm install
      - name: Verify npm pack succeeds
        working-directory: mcp-server
        run: npm pack
      - name: Smoke test — verify entry point loads
        working-directory: mcp-server
        run: node -e "import('./index.js').then(() => console.log('MCP server entry OK'))"

  # ── Job 4: TypeScript SDK ───────────────────────────────────────────
  sdk-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm install
      - name: Build SDK
        working-directory: sdks/typescript
        run: npm run build
      - name: Type-check
        working-directory: sdks/typescript
        run: npx tsc --noEmit

  # ── Job 5: Python SDK ──────────────────────────────────────────────
  sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SDK
        working-directory: sdks/python
        run: pip install -e .
      - name: Verify import
        run: python -c "from emilia_protocol import EPClient; print('Python SDK import OK')"

  # ── Job 6: OpenAPI spec linting ─────────────────────────────────────
  openapi-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint OpenAPI spec
        run: npx @redocly/cli lint openapi.yaml

  # ── Job 7: Docs consistency grep job ──────────────────────────────
  docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No stale tool counts outside CHANGELOG
        run: |
          hits=$(grep -rn '"15 tools"\|"20 tools"\|"22 tools"\|"23 tools"\|15 tools\|20 tools\|22 tools\|23 tools' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' . | grep -v CHANGELOG | grep -v node_modules || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale tool counts found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no stale tool counts found."

      - name: No stale test counts outside CHANGELOG
        run: |
          hits=$(grep -rn '"152 tests"\|"152 passing"\|152 tests\|152 passing' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' . | grep -v CHANGELOG | grep -v node_modules || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale test counts found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no stale test counts found."

      - name: No old SDK name EmiliaClient outside CHANGELOG
        run: |
          hits=$(grep -rn 'EmiliaClient' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' . | grep -v CHANGELOG | grep -v node_modules || true)
          if [ -n "$hits" ]; then
            echo "::error::Old SDK name 'EmiliaClient' found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no old SDK name found."

      - name: No references to v0.2.0
        run: |
          hits=$(grep -rn 'v0\.2\.0' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' . | grep -v node_modules || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale version 'v0.2.0' references found:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no v0.2.0 references found."

      - name: Tool count in mcp-server/index.js matches README badge
        run: |
          tool_count=$(grep -c 'ep_' mcp-server/index.js || echo 0)
          echo "Found $tool_count ep_ tool entries in mcp-server/index.js"
          badge_count=$(grep -oP '\d+(?=\+? tools)' README.md | head -1 || echo "NOT_FOUND")
          echo "README badge claims: $badge_count tools"
          if [ "$badge_count" = "NOT_FOUND" ]; then
            echo "::warning::Could not parse tool count from README badge — skipping match check."
          elif [ "$tool_count" != "$badge_count" ]; then
            echo "::error::Mismatch: mcp-server/index.js has $tool_count ep_ entries but README badge says $badge_count"
            exit 1
          else
            echo "OK — tool count matches ($tool_count)."
          fi

      - name: OpenAPI path count matches API route files
        run: |
          spec_paths=$(grep -c '^\s\+/api/' openapi.yaml || echo 0)
          route_files=$(find app/api -name route.js 2>/dev/null | wc -l | tr -d ' ')
          echo "openapi.yaml paths: $spec_paths"
          echo "app/api route.js files: $route_files"
          if [ "$spec_paths" != "$route_files" ]; then
            echo "::error::Mismatch: openapi.yaml has $spec_paths paths but found $route_files route.js files"
            exit 1
          fi
          echo "OK — path counts match ($spec_paths)."

  # ── Job 8: Docker build smoke test ────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ep-test .
