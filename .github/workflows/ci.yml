name: CI

# Opt every JavaScript-based action into the Node.js 24 runner.
# GitHub forces this default in June 2026; doing it now eliminates the
# deprecation-warning noise on every run and surfaces any Node-24 incompat
# early. Affects actions/checkout, actions/setup-node, actions/upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least privilege for the default GITHUB_TOKEN (otherwise write-all). No job in
# this workflow pushes commits, comments on PRs, or cuts releases — read is
# enough. A job that ever needs more must declare its own job-level permissions.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # enables manual run; required for the gated e2e job

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Tests — must pass 100% ────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run test suite with coverage (vitest)
        # A handful of individual tests spawn `node` as a subprocess to run a
        # script/example that imports from lib/ (now .ts; import specifiers
        # unchanged, per the bundler/NodeNext convention used repo-wide). This
        # step-scoped env (never $GITHUB_ENV, which GitHub blocks for
        # NODE_OPTIONS; never workflow/job-level, which would also apply to
        # actions/checkout before the repo exists) resolves that for just this
        # step's subprocesses. See scripts/ts-loader/README.md.
        env:
          NODE_OPTIONS: "--import ${{ github.workspace }}/scripts/ts-loader/register.mjs"
        run: npx vitest run --coverage
      - name: Verify package suites (node:test)
        # packages/verify and packages/issue ship zero-dependency standalone
        # suites on Node's built-in runner (excluded from vitest). The glob runs
        # EVERY packages/verify suite — quorum, revocation, time-attestation,
        # evidence-chain (AEC incl. relying-party requirement pinning),
        # federation, consistency, agent-binding, no-symmetric, CLI — plus the
        # Web Crypto equivalence suite (browser verifier proven byte-identical
        # to the audited Node build) and the issuer round-trip suite (a
        # locally-issued receipt proven to pass all seven §6.3 checks under
        # @emilia-protocol/verify). "issue locally, verify anywhere", enforced
        # every push. Do NOT go back to an explicit file list — that silently
        # dropped 8 of 11 suites from CI until 2026-07-02.
        # packages/require-receipt ships the shared makeReceiptGate reused by
        # packages/langchain, packages/openai-guard and packages/openai-agents.
        # Its suite ran in NO runner until 2026-07-19 (vitest collects zero
        # files under packages/), which is how the gate drifted out of the
        # missing_receipt_id contract that packages/gate redteam HI-5 and
        # app/api/v1/guarded both enforce. Keep it wired in.
        run: node --test packages/verify/test.js packages/verify/*.test.js packages/issue/test.js packages/attest/test.js packages/require-receipt/*.test.js
      - name: Verify every remaining package suite (discovered, not listed)
        # The step above still enumerates packages. That is the bug pattern that
        # dropped 8 of 11 verify suites until 2026-07-02 and left eight whole
        # packages (langchain, openai-guard, openai-agents, scan, ep-verify,
        # crash-test, fire-drill, fire-drill-mcp) in NO runner until 2026-07-19.
        # This step inverts the default: it DISCOVERS every packages/* that
        # declares a test script and runs the ones no other job covers, so a new
        # package is gated the moment it lands. Handing one off to another job
        # requires naming that job in COVERED_ELSEWHERE, and a stale handoff
        # fails the step instead of quietly shrinking coverage.
        run: node scripts/run-package-suites.mjs
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  # ── Job 1b: Consequence Firewall product + deployment ───────────
  gate-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
          cache: npm
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4
        with:
          version: v3.16.4
      - run: npm ci --ignore-scripts
      - name: Install the PostgreSQL client used by the live isolation test
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends postgresql-client
      - name: Run the complete Gate package suite
        working-directory: packages/gate
        run: npm test
      - name: Run the hardened Gate service suite
        working-directory: apps/gate-service
        run: npm test
      - name: Verify the SQL contract and live cross-tenant isolation
        env:
          POSTGRES_IMAGE: postgres@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        run: |
          bash packages/gate/deploy/sql/tests/contract-check.sh
          bash packages/gate/deploy/sql/tests/runtime-isolation.sh
      - name: Verify Helm charts
        run: |
          bash packages/gate/deploy/helm/emilia-gate/tests/render-check.sh
          bash packages/gate/deploy/helm/emilia-gate-service/tests/render-check.sh
      - name: Verify Terraform modules
        run: |
          bash packages/gate/deploy/terraform/tests/validate.sh
          bash packages/gate/deploy/terraform/service/tests/validate.sh
      - name: Verify the publishable package contents
        working-directory: packages/gate
        run: npm pack --dry-run --json
      - name: Build the production service image
        run: docker build --file Dockerfile.gate --tag emilia-gate-service:ci .
      - name: Refuse high or critical runtime vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: emilia-gate-service:ci
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: '1'
          hide-progress: true

  # ── Job 2: Build — Next.js production build must succeed ─────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Next.js production build
        run: npx next build

  # ── Job 2c: Security-core type gate (tsc --checkJs, zero errors) ─
  # The security core (packages/verify, lib/handshake, packages/gate) is kept
  # clean under `tsc -p tsconfig.core.json` (allowJs + checkJs, JSDoc types
  # only). This job fails on ANY type error so the core stays typed as it
  # evolves. It is types-only: `noEmit` is set, so it never produces output
  # and never affects runtime behavior. typescript is pinned in devDependencies.
  typecheck-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Type-check the security core (checkJs)
        run: npx tsc -p tsconfig.core.json

  # ── Job 2d: lib/ type gate (tsc --checkJs, zero errors) ──────────
  # The full lib/ tree is kept clean under `tsc -p tsconfig.lib.json`
  # (allowJs + checkJs, JSDoc types only — mirrors typecheck-core above).
  # This job fails on ANY type error so lib/ stays typed as it evolves. It
  # is types-only: `noEmit` is set, so it never produces output and never
  # affects runtime behavior. typescript is pinned in devDependencies.
  typecheck-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Type-check lib/ (checkJs)
        run: npx tsc -p tsconfig.lib.json

  # ── Job 2e: backend/tooling type gate (tsc --checkJs, zero errors) ──
  # scripts/, examples/, conformance/, mcp-server/, and packages/{mcp-guard,
  # require-receipt,langchain,openai-guard,mobile} are kept clean under
  # `tsc -p tsconfig.rest.json` (allowJs + checkJs, JSDoc types only —
  # mirrors typecheck-core/typecheck-lib above). This job fails on ANY type
  # error so this tier stays typed as it evolves. It is types-only: `noEmit`
  # is set, so it never produces output and never affects runtime behavior.
  # typescript is pinned in devDependencies.
  typecheck-rest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Type-check backend/tooling tier (checkJs)
        run: npx tsc -p tsconfig.rest.json

  # ── Job 2f: app/ type gate (tsc --checkJs, zero errors) ──────────
  # The React/Next tier (app/**) is kept clean under `tsc -p tsconfig.app.json`
  # (allowJs + checkJs, JSX preserved, JSDoc types only — mirrors
  # typecheck-core/typecheck-lib/typecheck-rest above). This job fails on ANY
  # type error so app/ stays typed as it evolves. It is types-only: `noEmit`
  # is set, so it never produces output and never affects runtime behavior.
  # typescript is pinned in devDependencies.
  typecheck-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Type-check app/ (checkJs)
        run: npx tsc -p tsconfig.app.json

  # ── Job 2g: remaining production compiler surfaces ───────────────
  # The secure mobile app has its own dependency graph. Declaration files and
  # the public TypeScript SDK use strict TypeScript. Together with the four
  # checkJs jobs above, this closes every production implementation surface;
  # only test-runner/linter/mutation-test configuration files are intentionally
  # excluded from the production compiler programs.
  typecheck-production-surfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm ci --prefix apps/secure-app --ignore-scripts
      - name: Type-check secure app, declarations, and TypeScript SDK
        run: |
          npm run typecheck:secure-app
          npm run typecheck:declarations
          npm run typecheck:sdk

  # ── Job 2b: Continuous adversarial fuzzing (audit GAP 7) ─────────
  # A seeded, deterministic property fuzzer for the concurrency-sensitive
  # surfaces. The async-guard bypass was a parallel-consumption race; this
  # bounded fixed-seed batch drives many interleaved reserve/commit and
  # consume-once attempts against the REAL capability and consumption stores
  # every push and asserts the safety invariants. A regression fails at a named
  # seed the author can replay locally. The deeper nightly sweep is documented
  # in fuzz/README.md. No product deps, no network — Node built-ins only.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - name: Run the bounded fixed-seed fuzz batch (<60s)
        run: node fuzz/ci-batch.mjs

  # ── Job 2c: Witness equivocation proof ───────────────────────────
  # Starts three real witness HTTP servers, proves an honest 2-of-3 quorum,
  # then presents two quorum-backed roots at the same tree size and requires
  # cross-view gossip to identify the split view. This continuously proves the
  # deploy-kit mechanism; independent administration remains an external
  # operational property and is not claimed by this in-process test.
  witness-equivocation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - name: Prove quorum and gossip equivocation detection
        run: node --test witness/deploy/equivocation.node-test.mjs

  # ── Job 2d: Preprint evidence synchronization ────────────────────
  # The paper is not published by CI. This checks the declared source
  # fingerprints and evidence-bearing claims in source and rendered PDF.
  # Full TeX -> PDF derivation is separately reproducible with preprint:build.
  preprint-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install the PDF text extractor used by the evidence checker
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends poppler-utils
      - name: Verify source, PDF, standards, conformance, and proof evidence agree
        run: npm run check:preprint
      - name: Exercise preprint drift refusals
        run: npm run test:preprint

  # ── Job 3: Write discipline ──────────────────────────────────────
  write-discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Check write discipline
        run: node scripts/check-write-discipline.js

  # ── Job 4: Exact, content-addressed security case ────────────────
  security-case:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          # Must match the npm publication workflows: the security case binds
          # the exact tarball bytes produced by this runtime.
          node-version: 24
          cache: npm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: '1.22'
      - run: python -m pip install --require-hashes -r .github/workflow-requirements/cryptography.txt
      - run: npm ci --ignore-scripts
      - name: Execute exact claims and require the checked-in security case to be current
        run: npm run check:security-case
      - name: Run deterministic cross-language hostile corpus
        env:
          NODE_OPTIONS: "--import ${{ github.workspace }}/scripts/ts-loader/register.mjs"
        run: npm run conformance:hostility
      - name: Run Model-to-Matter executor profile vectors
        env:
          NODE_OPTIONS: "--import ${{ github.workspace }}/scripts/ts-loader/register.mjs"
        run: npm run m2m:conformance
      - name: Exercise external implementation intake protocol
        run: npm run conformance:clean-room:contract
      - name: Require the checked-in cross-language conformance manifest to be current
        env:
          NODE_OPTIONS: "--import ${{ github.workspace }}/scripts/ts-loader/register.mjs"
        run: npm run conformance:manifest:check
      - name: Verify exact frozen clean-room evidence baseline
        run: npm run conformance:manifest:clean-room
      - name: Attest exact security case on protected-branch runs
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6  # v4.2.0
        with:
          subject-path: security/security-case.json
      - name: Attest exact conformance manifest on protected-branch runs
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6  # v4.2.0
        with:
          subject-path: conformance/conformance-manifest.json
      - name: Attest exact frozen clean-room manifest on protected-branch runs
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6  # v4.2.0
        with:
          subject-path: conformance/clean-room/conformance-manifest.v1.json
      - name: Upload resolved security and conformance cases
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: security-and-conformance-case
          path: |
            security/security-case.json
            conformance/conformance-manifest.json
            conformance/clean-room/conformance-manifest.v1.json
          retention-days: 90

  # ── Job 5: Language governance ───────────────────────────────────
  language-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Check language governance
        run: node scripts/check-language-governance.js
      - name: Check public conformance claims against the current manifest
        run: npm run check:public-conformance-claims
      - name: Check published proof statistics against an executed test run
        run: npm run check:proof-stats
      - name: Check generated LLM context against current evidence manifests
        run: npm run check:llm-context
      - name: Check standards observatory snapshot freshness
        run: npm run observatory:check

  # ── Job 6a: License headers ──────────────────────────────────────
  license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - name: Check license headers
        run: node scripts/check-license-headers.js

  # ── Job 5b: Demo key isolation ──────────────────────────────────
  # Guard the hardcoded /r/example demo Ed25519 private key against
  # copy-paste leakage into production code paths.
  demo-key-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - name: Check demo key isolation
        run: node scripts/check-demo-key-isolation.js

  # ── Job 5c: Air-gap artifact audit ──────────────────────────────
  # Static self-containment audit (no Docker) + proof that EP receipt
  # verification runs with zero network. The full containerized no-egress
  # run is operator-side / workflow_dispatch (see deploy/airgap/README.md).
  airgap-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - name: Air-gap self-containment audit
        run: bash deploy/airgap/audit.sh
      - name: Offline verification proof
        run: bash deploy/airgap/verify-offline.sh

  # ── Job 5d: Secure App signoff round-trip ───────────────────────
  # Proves the native Secure App produces a Class-A signoff that verifies
  # offline under @emilia-protocol/verify. Needs no install (node + repo only).
  secure-app-signoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - name: Secure App signoff verifies under @emilia-protocol/verify
        run: node --test apps/secure-app/lib/ep-signoff.test.mjs

  # ── Job 7: Lint — Next.js lint must pass or warn only ────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run ESLint
        # `next lint` is deprecated in Next.js 16 and breaks with a
        # circular-structure error under eslint-config-next v16+. The repo
        # already uses flat config (eslint.config.mjs), so invoke ESLint
        # directly. No --max-warnings=0 because `next lint` didn't enforce
        # that and adding it now would surface 8 pre-existing default-export
        # warnings as CI failures (separate cleanup task).
        run: npx eslint .

  # ── Job 8: Protocol discipline — trust-model violation guardrails
  protocol-discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run protocol discipline checks
        run: node scripts/check-protocol-discipline.js

      - name: Admissibility invariant registry (every claim maps to code, negative vector, parity, pinned acceptance)
        run: node scripts/check-admissibility-registry.mjs

      - name: Authority-claim guard (no public "authority enforced"/"scoped authority" claim without registry entry + passing vectors)
        run: node scripts/check-authority-claims.mjs

      - name: No direct receipt inserts outside canonical path
        run: |
          hits=$(grep -rn "\.from('receipts')\.insert\|\.from(\"receipts\")\.insert" app/ lib/ mcp-server/ --include='*.js' --include='*.mjs' | grep -v "lib/create-receipt.js" | grep -v "lib/canonical-writer.js" || true)
          if [ -n "$hits" ]; then
            echo "::error::Direct receipt inserts found outside canonical path:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no direct receipt inserts outside canonical path."

      - name: No raw EP_ env reads outside lib/env.js (or allowlisted files)
        run: |
          # Allowlist matches the constants in scripts/check-protocol-discipline.js:ENV_ALLOWLIST.
          # Keep these in sync; the CI grep is the authoritative gate.
          #   lib/env.js              — the canonical env accessor (by definition)
          #   lib/operator-auth.js    — reads EP_OPERATOR_KEYS at module init;
          #                             refactor to env.js TODO'd in the script
          hits=$(grep -rn "process\.env\.EP_" lib/ app/ --include='*.js' --include='*.mjs' \
            | grep -v "lib/env.js" \
            | grep -v "lib/operator-auth.js" \
            || true)
          if [ -n "$hits" ]; then
            echo "::error::Raw process.env.EP_ reads found outside lib/env.js (and allowlist):"
            echo "$hits"
            exit 1
          fi
          echo "OK — no raw EP_ env reads outside lib/env.js."

  # ── Job 9: MCP server packaging smoke test ───────────────────────
  mcp-server-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies against the local unreleased verifier
        run: |
          npm pack ./packages/verify --json --pack-destination "$RUNNER_TEMP" > "$RUNNER_TEMP/verify-pack.json"
          VERIFY_TARBALL=$(node -e "const r=require(process.argv[1]); if(r.length!==1) process.exit(2); process.stdout.write(r[0].filename)" "$RUNNER_TEMP/verify-pack.json")
          cd mcp-server
          npm ci --ignore-scripts
          rm -rf node_modules/@emilia-protocol/verify
          mkdir -p node_modules/@emilia-protocol/verify
          tar -xzf "$RUNNER_TEMP/$VERIFY_TARBALL" \
            --strip-components=1 \
            -C node_modules/@emilia-protocol/verify
      - name: Verify npm pack succeeds
        working-directory: mcp-server
        run: npm pack
      - name: Smoke test — verify entry point loads
        working-directory: mcp-server
        run: node -e "import('./index.js').then(() => console.log('MCP server entry OK'))"

  # ── Job 9b: Benchmark gate — performance regression check ────────
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run benchmark tests
        run: npx vitest run tests/benchmark.test.js tests/adversarial-benchmarks.test.js
        env:
          BENCHMARK_CI: '1'

  # ── Job 10: TypeScript SDK ───────────────────────────────────────
  sdk-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: sdks/typescript
        # Committed package-lock.json → deterministic install (scripts disabled).
        run: npm ci --ignore-scripts
      - name: Build SDK
        working-directory: sdks/typescript
        run: npm run build
      - name: Type-check
        working-directory: sdks/typescript
        run: npx tsc --noEmit
      - name: Run tests
        working-directory: sdks/typescript
        run: npm test

  # ── Job 11: Python SDK ──────────────────────────────────────────
  sdk-python:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/sdks/python/src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"
      - name: Install hash-locked SDK test dependencies
        working-directory: sdks/python
        run: python -m pip install --require-hashes -r "$GITHUB_WORKSPACE/.github/workflow-requirements/python-sdk-test.txt"
      - name: Verify import
        run: python -c "from emilia_protocol import EPClient; print('Python SDK import OK')"
      - name: Run tests
        working-directory: sdks/python
        run: python -m pytest tests/ -v

  # ── Job 11b: Cross-language conformance ──────────────────────────
  # Proves the JavaScript, Python, and Go reference verifiers all agree with
  # each other and the expected outcome on the canonical EP vectors. These are
  # one team's ports in one repository: a consistency check, not independent
  # clean-room implementations. The separately pinned Rust implementation runs
  # in the external-rust-evidence job below.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: "1.22"
      - run: python -m pip install --require-hashes -r .github/workflow-requirements/cryptography.txt
      - name: Cross-language conformance (EP-RECEIPT-v1, JS + Python + Go)
        env:
          NODE_OPTIONS: "--import ${{ github.workspace }}/scripts/ts-loader/register.mjs"
        run: node conformance/run.mjs
      - name: Conformance docs count guard
        run: npm run check:conformance-docs
      - name: Class-A signoff conformance (EP-SIGNOFF-v1, Node + Web Crypto)
        run: node conformance/run-signoffs.mjs
      - name: TLA+-invariant conformance (JS lane drives the real store + guards)
        env:
          NODE_OPTIONS: "--import ${{ github.workspace }}/scripts/ts-loader/register.mjs"
        run: node conformance/runners/run-invariants.mjs
      - name: TLA+-invariant conformance (Python lane — faithful state-machine port)
        run: python3 conformance/runners/run_invariants.py
      - name: TLA+-invariant conformance (Go lane — faithful state-machine port)
        run: go run conformance/runners/run_invariants.go

  # ── Job 11c: Pinned external Rust implementation evidence ────────
  # Rebuilds an externally authored verifier from an immutable source tree and
  # evaluates it with its immutable, time-pinned vector and hostility snapshots.
  # Both lanes must pass; a green standard suite cannot conceal parser or
  # type-confusion failures in the adversarial corpus.
  external-rust-evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out EMILIA evaluator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Check out pinned external implementation
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: jdieselny/ecr-wg
          ref: 7faba36010e7590727bebbc5b9dcceee60539b9b
          path: .external/ecr-wg
          persist-credentials: false
      - name: Check out immutable hostility evaluator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: emiliaprotocol/emilia-protocol
          ref: 18739076c822bdc757147326e8d36716432d1b41
          path: .external/emilia-hostility-evaluator
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.94.1 --profile minimal --no-self-update
      - name: Rebuild external verifier from Cargo.lock
        run: >-
          cargo +1.94.1 build --release --locked
          --manifest-path .external/ecr-wg/rust/ep-cleanroom-verifier/Cargo.toml
          --bin conformance
      - name: Evaluate immutable byte-pinned conformance bundle
        run: |
          mkdir -p test-results
          node scripts/evaluate-external-implementation.mjs \
            --pin conformance/external/rust-cleanroom-jdieselny.v1.json \
            --source .external/ecr-wg \
            --runner .external/ecr-wg/rust/ep-cleanroom-verifier/target/release/conformance \
            --bundle conformance/clean-room/frozen-v1/conformance/clean-room/bundle.v1.json \
            --suite-root conformance/clean-room/frozen-v1 \
            --emit test-results/external-rust-conformance.json
      - name: Prepare suite-dispatch hostility runner
        run: |
          node --input-type=module -e \
            'import fs from "node:fs"; fs.writeFileSync(process.argv[1], `${JSON.stringify({ runners: [{ name: "rust-cleanroom-jdieselny", command: process.argv[2], args: [], cwd: ".", dispatch: "suite" }] }, null, 2)}\n`);' \
            test-results/external-rust-runner.json \
            "$GITHUB_WORKSPACE/.external/ecr-wg/rust/ep-cleanroom-verifier/target/release/conformance"
      - name: Run external differential hostility campaign
        run: |
          node "$GITHUB_WORKSPACE/.external/emilia-hostility-evaluator/scripts/differential-hostility.mjs" \
            --external-runners "$GITHUB_WORKSPACE/test-results/external-rust-runner.json" \
            --emit "$GITHUB_WORKSPACE/test-results/external-rust-hostility.json"
      - name: Enforce pinned accepting hostility result
        run: |
          node --input-type=module -e '
            import fs from "node:fs";
            const pin = JSON.parse(fs.readFileSync("conformance/external/rust-cleanroom-jdieselny.v1.json", "utf8"));
            const report = JSON.parse(fs.readFileSync("test-results/external-rust-hostility.json", "utf8"));
            const expected = pin.hostility;
            if (expected.evaluator_commit !== "18739076c822bdc757147326e8d36716432d1b41") throw new Error("external hostility evaluator pin drifted");
            if (report.status !== expected.required_status || report.divergences.length !== 0) throw new Error("external hostility campaign is not clean");
            if (report.corpus?.suite !== expected.suite || report.corpus?.sha256 !== expected.corpus_sha256) throw new Error("external hostility corpus drifted from the reviewed pin");
            if (report.corpus?.structured_cases !== expected.structured_cases || report.corpus?.raw_parser_cases !== expected.raw_parser_cases) throw new Error("external hostility case counts drifted from the reviewed pin");
            if (!report.implementations?.some((implementation) => implementation.name === expected.runner_name && implementation.relationship === "external-submission")) throw new Error("external implementation is absent from hostility report");
          '
      - name: Upload external evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: external-rust-evidence
          path: |
            test-results/external-rust-conformance.json
            test-results/external-rust-hostility.json
          retention-days: 90

  # ── Job 11d: Aggregate, attested conformance acceptance case ─────
  # Joins the same-team manifest over the frozen external bundle and separately produced external evidence
  # only after both jobs pass. The assembler revalidates every source pin,
  # suite hash, hostility result, evaluator commit, and attestation boundary;
  # it cannot promote implementer-signed legacy evidence to strict independent
  # clean-room acceptance.
  aggregate-conformance-case:
    needs: [security-case, external-rust-evidence]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - name: Download exact base conformance manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: security-and-conformance-case
          path: .ci/base
      - name: Download exact external evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: external-rust-evidence
          path: .ci/external
      - name: Assemble strict aggregate conformance case
        run: >-
          node scripts/assemble-conformance-case.mjs
          --manifest .ci/base/conformance/clean-room/conformance-manifest.v1.json
          --pin conformance/external/rust-cleanroom-jdieselny.v1.json
          --external-conformance .ci/external/external-rust-conformance.json
          --external-hostility .ci/external/external-rust-hostility.json
          --evaluator-commit "$GITHUB_SHA"
          --emit conformance/conformance-case.json
      - name: Attest aggregate conformance case on protected-branch runs
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6  # v4.2.0
        with:
          subject-path: conformance/conformance-case.json
      - name: Upload aggregate conformance case
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: aggregate-conformance-case
          path: conformance/conformance-case.json
          retention-days: 90

  # ── langchain-emilia (Python) — executor-side guard for LangChain tools ──
  langchain-emilia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install hash-locked test dependencies
        run: python -m pip install --require-hashes -r .github/workflow-requirements/langchain-test.txt
      - name: Tests (digest parity, gate semantics, fail-closed tool wrapping)
        env:
          PYTHONPATH: ${{ github.workspace }}/integrations/langchain-emilia
        run: pytest -q integrations/langchain-emilia/tests

  # ── examples/grok_guard red-team regression ─────────────────────
  # Re-runs all six adversarial vectors against the grok_guard offline gate
  # (request-binding, signer-pinning, replay, anchor, defense-in-depth) plus the
  # genuine-fixture control. Uses the local JS-signed fixture + locally generated
  # attacker keys — NO network, NO prod. Also exercises the pure-Python verifier.
  examples-grok-guard-redteam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install verifier deps (cryptography)
        run: python -m pip install --require-hashes -r .github/workflow-requirements/cryptography.txt
      - name: Compile grok_guard.py
        run: python -m py_compile examples/grok_guard.py
      - name: Red-team regression suite (six vectors + control)
        env:
          PYTHONPATH: packages/python-verify
        run: python examples/tests/test_grok_guard_redteam.py

  # ── Job 12: OpenAPI spec linting ─────────────────────────────────
  openapi-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - name: Lint OpenAPI spec
        run: npx @redocly/cli lint openapi.yaml

  # ── Job 13: Docs consistency ─────────────────────────────────────
  docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # NOTE on --exclude-dir=.github: every grep here scans the working tree
      # for stale strings. The grep patterns themselves live in this
      # workflow file (and any future PR description / CHANGELOG entry).
      # Without --exclude-dir=.github, each check would self-match the
      # pattern literal in this file and fail. The CHANGELOG-filter on the
      # tool-count and SDK-name checks works only by accident (every line
      # containing those literals also contains "CHANGELOG"); the v0.2.0
      # check did not have that accident and broke. Adding the exclude
      # makes the no-self-match guarantee structural, not accidental.

      - name: No stale tool counts outside CHANGELOG
        run: |
          hits=$(grep -rn '"15 tools"\|"20 tools"\|"22 tools"\|"23 tools"\|15 tools\|20 tools\|22 tools\|23 tools' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' --exclude-dir=node_modules --exclude-dir=.github . | grep -v CHANGELOG || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale tool counts found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no stale tool counts found."

      - name: No stale test counts outside CHANGELOG
        run: |
          hits=$(grep -rn '"152 tests"\|"152 passing"\|152 tests\|152 passing' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' --exclude-dir=node_modules --exclude-dir=.github . | grep -v CHANGELOG || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale test counts found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no stale test counts found."

      - name: No old SDK name EmiliaClient outside CHANGELOG
        run: |
          hits=$(grep -rn 'EmiliaClient' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' --exclude-dir=node_modules --exclude-dir=.github . | grep -v CHANGELOG || true)
          if [ -n "$hits" ]; then
            echo "::error::Old SDK name 'EmiliaClient' found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no old SDK name found."

      - name: No references to v0.2.0
        run: |
          hits=$(grep -rn 'v0\.2\.0' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' --exclude-dir=node_modules --exclude-dir=.github . || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale version 'v0.2.0' references found:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no v0.2.0 references found."

      - name: Tool count in mcp-server/index.js matches README badge
        run: |
          # Count ACTUAL tool registrations, not any substring containing ep_.
          # Tool registrations look like:  name: 'ep_xxx'  or  name: "ep_xxx"
          # The previous `grep -c 'ep_'` matched comments, docstrings, type
          # imports, and other incidental occurrences (122 false matches vs
          # 34 real tool definitions).
          tool_count=$(grep -cE "name:\s*['\"]ep_" mcp-server/index.js || echo 0)
          echo "Found $tool_count ep_ tool registrations in mcp-server/index.js"
          badge_count=$(grep -oP '\d+(?=\+? tools)' README.md | head -1 || echo "NOT_FOUND")
          echo "README badge claims: $badge_count tools"
          if [ "$badge_count" = "NOT_FOUND" ] || [ -z "$badge_count" ]; then
            # README intentionally no longer states a tool count — nothing to drift.
            echo "README states no tool count — nothing to check."
          elif [ "$tool_count" != "$badge_count" ]; then
            echo "::error::Mismatch: mcp-server/index.js has $tool_count ep_ tool registrations but README badge says $badge_count"
            exit 1
          else
            echo "OK — tool count matches ($tool_count)."
          fi

      - name: OpenAPI path coverage (core routes must be documented)
        run: |
          spec_paths=$(grep -c '^\s\+/api/' openapi.yaml || echo 0)
          # Exclude surfaces that are intentionally documented OUTSIDE EP's
          # protocol OpenAPI (mirrors the OPENAPI_EXEMPTIONS in
          # tests/route-coverage.test.js): SCIM is RFC 7643/7644 + its own
          # ServiceProviderConfig; the pilot sandbox is GTM onboarding tooling.
          route_files=$(find app/api -name route.js 2>/dev/null | grep -vE '/api/scim/|/api/sso/|/api/pilot/|/api/badge/|/api/demo/|/api/score/' | wc -l | tr -d ' ')
          echo "openapi.yaml paths: $spec_paths"
          echo "core app/api route.js files (excl. scim, sso, pilot): $route_files"
          # Enforce minimum 75% coverage — cloud/operational routes may be documented separately.
          # Full parity remains an open hardening milestone. The enforced
          # current floor is 75%; no completed full-parity claim is made.
          min_paths=$(( route_files * 75 / 100 ))
          if [ "$spec_paths" -lt "$min_paths" ]; then
            echo "::error::OpenAPI coverage too low: $spec_paths/$route_files paths documented (minimum: $min_paths)"
            exit 1
          fi
          echo "OK — OpenAPI coverage $spec_paths/$route_files ($(( spec_paths * 100 / route_files ))%)."

  # ── Job 14: Secret scanning (gitleaks) ──────────────────────────
  # Uses gitleaks CLI directly (MIT, free) instead of the gitleaks-action
  # wrapper (now requires paid GITLEAKS_LICENSE secret).
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Install gitleaks CLI
        # Pin the version AND verify the SHA-256 (from the release's published
        # checksums.txt) so a re-cut/compromised asset can't inject a binary.
        # To bump: change GITLEAKS_VERSION and update GITLEAKS_SHA256.
        run: |
          GITLEAKS_VERSION=8.21.2
          GITLEAKS_SHA256=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          # --fail: error out on HTTP 4xx/5xx instead of saving an error page that
          # tar then chokes on (a rate-limited download saved as HTML — not a real
          # leak — was the historical "exit code 2"). Retry transient 429/5xx.
          curl --fail --location --show-error --silent \
            --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 20 \
            "$url" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Run gitleaks
        run: |
          gitleaks detect --source . --verbose --redact --exit-code 1 --no-banner

  # ── Job 15: Docs secrets lint ──────────────────────────────────
  docs-secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
      - name: Check docs for leaked secrets
        run: node scripts/check-docs-secrets.js

  # ── Job 16: Docker build smoke test ──────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Build Docker image
        run: docker build -t ep-test .

  # ── Job 17: E2E smoke tests (Playwright) ─────────────────────────
  # Runs the Playwright smoke suite against the **production** Next.js
  # server (`npm run build` + `npm run start`), not `npm run dev`. The
  # dev-server route was previously gated as workflow_dispatch because it
  # was slow (~5 min), flaky, and pulled vitest into Playwright's runner.
  # Production server boots in ~3s, behaves like prod, and the vitest
  # confusion is resolved by the e2e/** exclude in vitest.config.js.
  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build production bundle
        run: npm run build
        env:
          # next build needs valid envs at compile time; supply minimal stubs
          # so the build doesn't fail trying to read real secrets.
          NEXT_PUBLIC_SUPABASE_URL: 'https://e2e.supabase.local'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'e2e-anon-key'
      - name: Run E2E smoke tests
        run: npx playwright test
        env:
          CI: 'true'
          # `next start` re-reads NEXT_PUBLIC_* at boot for runtime config —
          # keep parity with the build step so the production server starts.
          NEXT_PUBLIC_SUPABASE_URL: 'https://e2e.supabase.local'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'e2e-anon-key'
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Job 18: Postgres integration tests ───────────────────────────
  integration-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        # AWS Public ECR mirror of the official image — identical bits, but not
        # subject to Docker Hub's anonymous pull rate limits, which were
        # intermittently failing this job on shared GitHub runners.
        image: public.ecr.aws/docker/library/postgres:17-alpine
        env:
          POSTGRES_USER:     ep_test
          # Per-run password (never reused) for this ephemeral, network-isolated
          # CI service — no static credential in the repo.
          POSTGRES_PASSWORD: ci-${{ github.run_id }}-${{ github.run_attempt }}
          POSTGRES_DB:       ep_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ep_test -d ep_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run Postgres integration tests
        run: npx vitest run tests/postgres-integration.test.js
        env:
          INTEGRATION_POSTGRES: "1"
          PGHOST:     localhost
          PGPORT:     "5433"
          PGUSER:     ep_test
          PGPASSWORD: ci-${{ github.run_id }}-${{ github.run_attempt }}
          PGDATABASE: ep_test
