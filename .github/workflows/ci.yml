name: CI

# Opt every JavaScript-based action into the Node.js 24 runner.
# GitHub forces this default in June 2026; doing it now eliminates the
# deprecation-warning noise on every run and surfaces any Node-24 incompat
# early. Affects actions/checkout, actions/setup-node, actions/upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least privilege for the default GITHUB_TOKEN (otherwise write-all). No job in
# this workflow pushes commits, comments on PRs, or cuts releases — read is
# enough. A job that ever needs more must declare its own job-level permissions.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # enables manual run; required for the gated e2e job

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Tests — must pass 100% ────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run test suite with coverage (vitest)
        run: npx vitest run --coverage
      - name: Verify package suites (node:test)
        # packages/verify and packages/issue ship zero-dependency standalone
        # suites on Node's built-in runner (excluded from vitest). The glob runs
        # EVERY packages/verify suite — quorum, revocation, time-attestation,
        # evidence-chain (AEC incl. relying-party requirement pinning),
        # federation, consistency, agent-binding, no-symmetric, CLI — plus the
        # Web Crypto equivalence suite (browser verifier proven byte-identical
        # to the audited Node build) and the issuer round-trip suite (a
        # locally-issued receipt proven to pass all seven §6.3 checks under
        # @emilia-protocol/verify). "issue locally, verify anywhere", enforced
        # every push. Do NOT go back to an explicit file list — that silently
        # dropped 8 of 11 suites from CI until 2026-07-02.
        run: node --test packages/verify/test.js packages/verify/*.test.js packages/issue/test.js packages/attest/test.js
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  # ── Job 2: Build — Next.js production build must succeed ─────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Next.js production build
        run: npx next build

  # ── Job 3: Write discipline ──────────────────────────────────────
  write-discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Check write discipline
        run: node scripts/check-write-discipline.js

  # ── Job 4: Exact, content-addressed security case ────────────────
  security-case:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: '1.22'
      - run: python -m pip install cryptography==46.0.6
      - run: npm ci --ignore-scripts
      - name: Execute exact claims and bind reproducible release artifacts
        run: npm run security-case:emit
      - name: Run deterministic cross-language hostile corpus
        run: npm run conformance:hostility
      - name: Exercise external implementation intake protocol
        run: npm run conformance:clean-room:contract
      - name: Resolve exact cross-language conformance manifest
        run: npm run conformance:manifest
      - name: Attest exact security case on protected-branch runs
        if: github.event_name != 'pull_request'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-path: security/security-case.json
      - name: Attest exact conformance manifest on protected-branch runs
        if: github.event_name != 'pull_request'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-path: conformance/conformance-manifest.json
      - name: Upload resolved security and conformance cases
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: security-and-conformance-case
          path: |
            security/security-case.json
            conformance/conformance-manifest.json
          retention-days: 90

  # ── Job 5: Language governance ───────────────────────────────────
  language-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Check language governance
        run: node scripts/check-language-governance.js

  # ── Job 6a: License headers ──────────────────────────────────────
  license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
      - name: Check license headers
        run: node scripts/check-license-headers.js

  # ── Job 5b: Demo key isolation ──────────────────────────────────
  # Guard the hardcoded /r/example demo Ed25519 private key against
  # copy-paste leakage into production code paths.
  demo-key-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
      - name: Check demo key isolation
        run: node scripts/check-demo-key-isolation.js

  # ── Job 5c: Air-gap artifact audit ──────────────────────────────
  # Static self-containment audit (no Docker) + proof that EP receipt
  # verification runs with zero network. The full containerized no-egress
  # run is operator-side / workflow_dispatch (see deploy/airgap/README.md).
  airgap-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
      - name: Air-gap self-containment audit
        run: bash deploy/airgap/audit.sh
      - name: Offline verification proof
        run: bash deploy/airgap/verify-offline.sh

  # ── Job 5d: Secure App signoff round-trip ───────────────────────
  # Proves the native Secure App produces a Class-A signoff that verifies
  # offline under @emilia-protocol/verify. Needs no install (node + repo only).
  secure-app-signoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
      - name: Secure App signoff verifies under @emilia-protocol/verify
        run: node --test apps/secure-app/lib/ep-signoff.test.mjs

  # ── Job 6b: Type check (conditional — only if tsconfig exists) ───
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check for tsconfig
        id: tsconfig
        run: |
          if [ -f tsconfig.json ] || [ -f tsconfig.ts ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        if: steps.tsconfig.outputs.exists == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
        if: steps.tsconfig.outputs.exists == 'true'
      - name: TypeScript type check
        if: steps.tsconfig.outputs.exists == 'true'
        run: npx tsc --noEmit
      - name: Skip — no tsconfig found
        if: steps.tsconfig.outputs.exists == 'false'
        run: echo "No tsconfig.json found — skipping type check."

  # ── Job 7: Lint — Next.js lint must pass or warn only ────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run ESLint
        # `next lint` is deprecated in Next.js 16 and breaks with a
        # circular-structure error under eslint-config-next v16+. The repo
        # already uses flat config (eslint.config.mjs), so invoke ESLint
        # directly. No --max-warnings=0 because `next lint` didn't enforce
        # that and adding it now would surface 8 pre-existing default-export
        # warnings as CI failures (separate cleanup task).
        run: npx eslint .

  # ── Job 8: Protocol discipline — trust-model violation guardrails
  protocol-discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run protocol discipline checks
        run: node scripts/check-protocol-discipline.js

      - name: Admissibility invariant registry (every claim maps to code, negative vector, parity, pinned acceptance)
        run: node scripts/check-admissibility-registry.mjs

      - name: Authority-claim guard (no public "authority enforced"/"scoped authority" claim without registry entry + passing vectors)
        run: node scripts/check-authority-claims.mjs

      - name: No direct receipt inserts outside canonical path
        run: |
          hits=$(grep -rn "\.from('receipts')\.insert\|\.from(\"receipts\")\.insert" app/ lib/ mcp-server/ --include='*.js' --include='*.mjs' | grep -v "lib/create-receipt.js" | grep -v "lib/canonical-writer.js" || true)
          if [ -n "$hits" ]; then
            echo "::error::Direct receipt inserts found outside canonical path:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no direct receipt inserts outside canonical path."

      - name: No raw EP_ env reads outside lib/env.js (or allowlisted files)
        run: |
          # Allowlist matches the constants in scripts/check-protocol-discipline.js:ENV_ALLOWLIST.
          # Keep these in sync; the CI grep is the authoritative gate.
          #   lib/env.js              — the canonical env accessor (by definition)
          #   lib/operator-auth.js    — reads EP_OPERATOR_KEYS at module init;
          #                             refactor to env.js TODO'd in the script
          hits=$(grep -rn "process\.env\.EP_" lib/ app/ --include='*.js' --include='*.mjs' \
            | grep -v "lib/env.js" \
            | grep -v "lib/operator-auth.js" \
            || true)
          if [ -n "$hits" ]; then
            echo "::error::Raw process.env.EP_ reads found outside lib/env.js (and allowlist):"
            echo "$hits"
            exit 1
          fi
          echo "OK — no raw EP_ env reads outside lib/env.js."

  # ── Job 9: MCP server packaging smoke test ───────────────────────
  mcp-server-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci --ignore-scripts
      - name: Verify npm pack succeeds
        working-directory: mcp-server
        run: npm pack
      - name: Smoke test — verify entry point loads
        working-directory: mcp-server
        run: node -e "import('./index.js').then(() => console.log('MCP server entry OK'))"

  # ── Job 9b: Benchmark gate — performance regression check ────────
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run benchmark tests
        run: npx vitest run tests/benchmark.test.js tests/adversarial-benchmarks.test.js
        env:
          BENCHMARK_CI: '1'

  # ── Job 10: TypeScript SDK ───────────────────────────────────────
  sdk-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: sdks/typescript
        # Committed package-lock.json → deterministic install (scripts disabled).
        run: npm ci --ignore-scripts
      - name: Build SDK
        working-directory: sdks/typescript
        run: npm run build
      - name: Type-check
        working-directory: sdks/typescript
        run: npx tsc --noEmit
      - name: Run tests
        working-directory: sdks/typescript
        run: npm test

  # ── Job 11: Python SDK ──────────────────────────────────────────
  sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - name: Install SDK and dev dependencies
        working-directory: sdks/python
        run: pip install -e ".[dev]"
      - name: Verify import
        run: python -c "from emilia_protocol import EPClient; print('Python SDK import OK')"
      - name: Run tests
        working-directory: sdks/python
        run: python -m pytest tests/ -v

  # ── Job 11b: Cross-language conformance ──────────────────────────
  # Proves the JavaScript, Python, and Go reference verifiers all agree with
  # each other and the expected outcome on the canonical EP vectors. These are
  # one team's ports in one repository: a consistency check, not independent
  # clean-room implementations. The separately pinned Rust implementation runs
  # in the external-rust-evidence job below.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: "1.22"
      - run: pip install cryptography
      - name: Cross-language conformance (EP-RECEIPT-v1, JS + Python + Go)
        run: node conformance/run.mjs
      - name: Conformance docs count guard
        run: npm run check:conformance-docs
      - name: Class-A signoff conformance (EP-SIGNOFF-v1, Node + Web Crypto)
        run: node conformance/run-signoffs.mjs

  # ── Job 11c: Pinned external Rust implementation evidence ────────
  # Rebuilds an externally authored verifier from an immutable source tree and
  # evaluates it with this repository's current vectors. Hostility remains a
  # recorded, explicitly non-accepting result until the upstream defects close;
  # the job fails if that known result is hidden, omitted, or changes silently.
  external-rust-evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out EMILIA evaluator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check out pinned external implementation
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: jdieselny/ecr-wg
          ref: 80d191dc2b770a3d54e09eede86ffdea26b029e0
          path: .external/ecr-wg
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.94.1 --profile minimal --no-self-update
      - name: Rebuild external verifier from Cargo.lock
        run: >-
          cargo +1.94.1 build --release --locked
          --manifest-path .external/ecr-wg/rust/ep-cleanroom-verifier/Cargo.toml
          --bin conformance
      - name: Evaluate current byte-pinned conformance bundle
        run: |
          mkdir -p test-results
          node scripts/evaluate-external-implementation.mjs \
            --pin conformance/external/rust-cleanroom-jdieselny.v1.json \
            --source .external/ecr-wg \
            --runner .external/ecr-wg/rust/ep-cleanroom-verifier/target/release/conformance \
            --emit test-results/external-rust-conformance.json
      - name: Prepare suite-dispatch hostility runner
        run: |
          node --input-type=module -e \
            'import fs from "node:fs"; fs.writeFileSync(process.argv[1], `${JSON.stringify({ runners: [{ name: "rust-cleanroom-jdieselny", command: process.argv[2], args: [], cwd: ".", dispatch: "suite" }] }, null, 2)}\n`);' \
            test-results/external-rust-runner.json \
            "$GITHUB_WORKSPACE/.external/ecr-wg/rust/ep-cleanroom-verifier/target/release/conformance"
      - name: Run external differential hostility campaign
        id: external_hostility
        continue-on-error: true
        run: >-
          node scripts/differential-hostility.mjs
          --external-runners test-results/external-rust-runner.json
          --emit test-results/external-rust-hostility.json
      - name: Enforce explicit non-accepting baseline
        run: |
          node --input-type=module -e '
            import fs from "node:fs";
            const report = JSON.parse(fs.readFileSync("test-results/external-rust-hostility.json", "utf8"));
            if (report.status !== "fail" || report.divergences.length !== 15) throw new Error("external hostility baseline changed; review and update the pin instead of hiding it");
            if (!report.divergences.some((finding) => finding.id === "duplicate-root-member")) throw new Error("duplicate-root refusal finding disappeared without a reviewed pin update");
            if (report.divergences.filter((finding) => finding.reason === "runner_crash").length !== 14) throw new Error("external panic baseline changed; review the exact result");
          '
      - name: Upload external evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: external-rust-evidence
          path: |
            test-results/external-rust-conformance.json
            test-results/external-rust-hostility.json
          retention-days: 90

  # ── langchain-emilia (Python) — executor-side guard for LangChain tools ──
  langchain-emilia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install with dev extras
        run: pip install -e './integrations/langchain-emilia[dev]'
      - name: Tests (digest parity, gate semantics, fail-closed tool wrapping)
        run: pytest -q integrations/langchain-emilia/tests

  # ── examples/grok_guard red-team regression ─────────────────────
  # Re-runs all six adversarial vectors against the grok_guard offline gate
  # (request-binding, signer-pinning, replay, anchor, defense-in-depth) plus the
  # genuine-fixture control. Uses the local JS-signed fixture + locally generated
  # attacker keys — NO network, NO prod. Also exercises the pure-Python verifier.
  examples-grok-guard-redteam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install verifier deps (cryptography)
        run: pip install cryptography
      - name: Compile grok_guard.py
        run: python -m py_compile examples/grok_guard.py
      - name: Red-team regression suite (six vectors + control)
        env:
          PYTHONPATH: packages/python-verify
        run: python examples/tests/test_grok_guard_redteam.py

  # ── Job 12: OpenAPI spec linting ─────────────────────────────────
  openapi-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
      - name: Lint OpenAPI spec
        run: npx @redocly/cli lint openapi.yaml

  # ── Job 13: Docs consistency ─────────────────────────────────────
  docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # NOTE on --exclude-dir=.github: every grep here scans the working tree
      # for stale strings. The grep patterns themselves live in this
      # workflow file (and any future PR description / CHANGELOG entry).
      # Without --exclude-dir=.github, each check would self-match the
      # pattern literal in this file and fail. The CHANGELOG-filter on the
      # tool-count and SDK-name checks works only by accident (every line
      # containing those literals also contains "CHANGELOG"); the v0.2.0
      # check did not have that accident and broke. Adding the exclude
      # makes the no-self-match guarantee structural, not accidental.

      - name: No stale tool counts outside CHANGELOG
        run: |
          hits=$(grep -rn '"15 tools"\|"20 tools"\|"22 tools"\|"23 tools"\|15 tools\|20 tools\|22 tools\|23 tools' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' --exclude-dir=node_modules --exclude-dir=.github . | grep -v CHANGELOG || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale tool counts found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no stale tool counts found."

      - name: No stale test counts outside CHANGELOG
        run: |
          hits=$(grep -rn '"152 tests"\|"152 passing"\|152 tests\|152 passing' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' --exclude-dir=node_modules --exclude-dir=.github . | grep -v CHANGELOG || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale test counts found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no stale test counts found."

      - name: No old SDK name EmiliaClient outside CHANGELOG
        run: |
          hits=$(grep -rn 'EmiliaClient' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' --exclude-dir=node_modules --exclude-dir=.github . | grep -v CHANGELOG || true)
          if [ -n "$hits" ]; then
            echo "::error::Old SDK name 'EmiliaClient' found outside CHANGELOG:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no old SDK name found."

      - name: No references to v0.2.0
        run: |
          hits=$(grep -rn 'v0\.2\.0' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' --exclude-dir=node_modules --exclude-dir=.github . || true)
          if [ -n "$hits" ]; then
            echo "::error::Stale version 'v0.2.0' references found:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no v0.2.0 references found."

      - name: Tool count in mcp-server/index.js matches README badge
        run: |
          # Count ACTUAL tool registrations, not any substring containing ep_.
          # Tool registrations look like:  name: 'ep_xxx'  or  name: "ep_xxx"
          # The previous `grep -c 'ep_'` matched comments, docstrings, type
          # imports, and other incidental occurrences (122 false matches vs
          # 34 real tool definitions).
          tool_count=$(grep -cE "name:\s*['\"]ep_" mcp-server/index.js || echo 0)
          echo "Found $tool_count ep_ tool registrations in mcp-server/index.js"
          badge_count=$(grep -oP '\d+(?=\+? tools)' README.md | head -1 || echo "NOT_FOUND")
          echo "README badge claims: $badge_count tools"
          if [ "$badge_count" = "NOT_FOUND" ] || [ -z "$badge_count" ]; then
            # README intentionally no longer states a tool count — nothing to drift.
            echo "README states no tool count — nothing to check."
          elif [ "$tool_count" != "$badge_count" ]; then
            echo "::error::Mismatch: mcp-server/index.js has $tool_count ep_ tool registrations but README badge says $badge_count"
            exit 1
          else
            echo "OK — tool count matches ($tool_count)."
          fi

      - name: OpenAPI path coverage (core routes must be documented)
        run: |
          spec_paths=$(grep -c '^\s\+/api/' openapi.yaml || echo 0)
          # Exclude surfaces that are intentionally documented OUTSIDE EP's
          # protocol OpenAPI (mirrors the OPENAPI_EXEMPTIONS in
          # tests/route-coverage.test.js): SCIM is RFC 7643/7644 + its own
          # ServiceProviderConfig; the pilot sandbox is GTM onboarding tooling.
          route_files=$(find app/api -name route.js 2>/dev/null | grep -vE '/api/scim/|/api/sso/|/api/pilot/|/api/badge/|/api/demo/|/api/score/' | wc -l | tr -d ' ')
          echo "openapi.yaml paths: $spec_paths"
          echo "core app/api route.js files (excl. scim, sso, pilot): $route_files"
          # Enforce minimum 75% coverage — cloud/operational routes may be documented separately.
          # Full parity target: Q2 2026 (tracked in GOVERNANCE.md).
          min_paths=$(( route_files * 75 / 100 ))
          if [ "$spec_paths" -lt "$min_paths" ]; then
            echo "::error::OpenAPI coverage too low: $spec_paths/$route_files paths documented (minimum: $min_paths)"
            exit 1
          fi
          echo "OK — OpenAPI coverage $spec_paths/$route_files ($(( spec_paths * 100 / route_files ))%)."

  # ── Job 14: Secret scanning (gitleaks) ──────────────────────────
  # Uses gitleaks CLI directly (MIT, free) instead of the gitleaks-action
  # wrapper (now requires paid GITLEAKS_LICENSE secret).
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Install gitleaks CLI
        # Pin the version AND verify the SHA-256 (from the release's published
        # checksums.txt) so a re-cut/compromised asset can't inject a binary.
        # To bump: change GITLEAKS_VERSION and update GITLEAKS_SHA256.
        run: |
          GITLEAKS_VERSION=8.21.2
          GITLEAKS_SHA256=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          # --fail: error out on HTTP 4xx/5xx instead of saving an error page that
          # tar then chokes on (a rate-limited download saved as HTML — not a real
          # leak — was the historical "exit code 2"). Retry transient 429/5xx.
          curl --fail --location --show-error --silent \
            --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 20 \
            "$url" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Run gitleaks
        run: |
          gitleaks detect --source . --verbose --redact --exit-code 1 --no-banner

  # ── Job 15: Docs secrets lint ──────────────────────────────────
  docs-secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
      - name: Check docs for leaked secrets
        run: node scripts/check-docs-secrets.js

  # ── Job 16: Docker build smoke test ──────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Build Docker image
        run: docker build -t ep-test .

  # ── Job 17: E2E smoke tests (Playwright) ─────────────────────────
  # Runs the Playwright smoke suite against the **production** Next.js
  # server (`npm run build` + `npm run start`), not `npm run dev`. The
  # dev-server route was previously gated as workflow_dispatch because it
  # was slow (~5 min), flaky, and pulled vitest into Playwright's runner.
  # Production server boots in ~3s, behaves like prod, and the vitest
  # confusion is resolved by the e2e/** exclude in vitest.config.js.
  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build production bundle
        run: npm run build
        env:
          # next build needs valid envs at compile time; supply minimal stubs
          # so the build doesn't fail trying to read real secrets.
          NEXT_PUBLIC_SUPABASE_URL: 'https://e2e.supabase.local'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'e2e-anon-key'
      - name: Run E2E smoke tests
        run: npx playwright test
        env:
          CI: 'true'
          # `next start` re-reads NEXT_PUBLIC_* at boot for runtime config —
          # keep parity with the build step so the production server starts.
          NEXT_PUBLIC_SUPABASE_URL: 'https://e2e.supabase.local'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'e2e-anon-key'
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Job 18: Postgres integration tests ───────────────────────────
  integration-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        # AWS Public ECR mirror of the official image — identical bits, but not
        # subject to Docker Hub's anonymous pull rate limits, which were
        # intermittently failing this job on shared GitHub runners.
        image: public.ecr.aws/docker/library/postgres:16-alpine
        env:
          POSTGRES_USER:     ep_test
          # Per-run password (never reused) for this ephemeral, network-isolated
          # CI service — no static credential in the repo.
          POSTGRES_PASSWORD: ci-${{ github.run_id }}-${{ github.run_attempt }}
          POSTGRES_DB:       ep_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ep_test -d ep_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run Postgres integration tests
        run: npx vitest run tests/postgres-integration.test.js
        env:
          INTEGRATION_POSTGRES: "1"
          PGHOST:     localhost
          PGPORT:     "5433"
          PGUSER:     ep_test
          PGPASSWORD: ci-${{ github.run_id }}-${{ github.run_attempt }}
          PGDATABASE: ep_test
