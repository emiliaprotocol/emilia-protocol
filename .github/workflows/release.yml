name: Release Provenance

# Opt every JavaScript-based action into the Node.js 24 runner.
# GitHub forces this default in June 2026; doing it now eliminates the
# deprecation-warning noise on every run and surfaces any Node-24 incompat
# early. Affects actions/checkout, actions/setup-node, actions/upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20

      - run: npm ci

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      - name: Generate MCP server SBOM
        working-directory: mcp-server
        run: |
          npm ci
          npx @cyclonedx/cyclonedx-npm --output-file sbom.json

      - name: Upload MCP SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: mcp-server-sbom
          path: mcp-server/sbom.json
          retention-days: 90
