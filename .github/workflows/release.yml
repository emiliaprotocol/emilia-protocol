name: Release Provenance

# Opt every JavaScript-based action into the Node.js 24 runner.
# GitHub forces this default in June 2026; doing it now eliminates the
# deprecation-warning noise on every run and surfaces any Node-24 incompat
# early. Affects actions/checkout, actions/setup-node, actions/upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]
  push:
    tags:
      - '*-v*'

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: '1.22'

      - name: Install hash-locked cross-language verifier dependency
        run: python -m pip install --require-hashes -r .github/workflow-requirements/cryptography.txt

      - name: Install hash-locked npm release tooling
        run: |
          npm ci --prefix .github/npm-toolchain --ignore-scripts --min-release-age=0
          echo "$GITHUB_WORKSPACE/.github/npm-toolchain/node_modules/.bin" >> "$GITHUB_PATH"

      - run: npm ci --ignore-scripts

      - name: Verify exact security case
        run: npm run security-case:emit

      - name: Resolve exact conformance manifest
        run: npm run conformance:manifest

      - name: Verify reproducible package bytes
        run: npm run release:verify:reproducible

      - name: Pack verify SDK release artifact
        id: pack-verify
        run: |
          mkdir -p release-artifacts
          npm pack ./packages/verify --json --pack-destination release-artifacts > release-artifacts/pack.json
          TARBALL=$(node -e "const r=require('./release-artifacts/pack.json'); if(r.length!==1) process.exit(2); process.stdout.write(r[0].filename)")
          sha256sum "release-artifacts/$TARBALL" > "release-artifacts/$TARBALL.sha256"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        run: npm sbom --sbom-format=cyclonedx --omit=dev > sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      - name: Attest verify SDK package bytes
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-path: release-artifacts/${{ steps.pack-verify.outputs.tarball }}

      - name: Attest machine-verifiable security case
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-path: security/security-case.json

      - name: Attest machine-verifiable conformance manifest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-path: conformance/conformance-manifest.json

      - name: Upload release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-evidence-${{ github.ref_name }}
          path: |
            release-artifacts/${{ steps.pack-verify.outputs.tarball }}
            release-artifacts/${{ steps.pack-verify.outputs.tarball }}.sha256
            security/security-case.json
            conformance/conformance-manifest.json
          retention-days: 90

      - name: Generate MCP server SBOM
        working-directory: mcp-server
        run: |
          npm ci --ignore-scripts
          npm sbom --sbom-format=cyclonedx --omit=dev > sbom.json

      - name: Upload MCP SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: mcp-server-sbom
          path: mcp-server/sbom.json
          retention-days: 90
