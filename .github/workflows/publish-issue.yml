name: Publish Issue

# npm trusted publisher: @emilia-protocol/issue -> this workflow filename.
on:
  workflow_dispatch:
  push:
    tags: ['issue-v*']

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_publish-npm-package.yml
    with:
      package_dir: packages/issue
      package_name: '@emilia-protocol/issue'
      artifact_id: issue
