name: Publish Gate

# Opt every JavaScript-based action into the Node.js 24 runner (GitHub default
# from June 2026) — matches the other publish workflows.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Publishes on a `gate-v*` tag (e.g. gate-v0.9.0) or a manual run. Uses npm
# Trusted Publishing (OIDC) + provenance — NO NPM_TOKEN.
# Configure the trusted publisher once at:
#   npmjs.com -> @emilia-protocol/gate -> Settings -> Trusted Publishing
#   Repository: emilia-protocol | Workflow: publish-gate.yml
# Requires npm >= 11.5.1 (installed below).
on:
  workflow_dispatch:
  push:
    tags:
      - "gate-v*"

jobs:
  publish:
    name: Publish @emilia-protocol/gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # REQUIRED for npm trusted publishing (OIDC) + provenance

    defaults:
      run:
        working-directory: packages/gate

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (>= 11.5.1 for OIDC trusted publishing + provenance)
        # --min-release-age=0: the repo .npmrc age-gates app dependencies (supply-
        # chain defense); the trusted first-party npm tool is exempt so publish
        # tooling always installs a current npm with full provenance support.
        run: npm install -g npm@latest --min-release-age=0

      # gate has runtime deps (@emilia-protocol/require-receipt + /verify), but
      # `npm publish` only packs the files whitelist and uploads — deps resolve at
      # the CONSUMER's install time, so no `npm ci` is needed here. The syntax
      # check catches a broken entry (index.js uses top-level await import).
      - name: Syntax check
        run: node --check index.js

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm (OIDC trusted publishing + provenance)
        run: npm publish --access public --provenance
