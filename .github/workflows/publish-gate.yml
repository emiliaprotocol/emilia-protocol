name: Publish Gate

# npm trusted publisher: @emilia-protocol/gate -> this workflow filename.
on:
  workflow_dispatch:
  push:
    tags: ['gate-v*']

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_publish-npm-package.yml
    with:
      package_dir: packages/gate
      package_name: '@emilia-protocol/gate'
      artifact_id: gate
