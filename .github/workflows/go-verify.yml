name: go-verify

# Build + test the Go offline receipt verifier. The module lives in
# packages/go-verify with its own go.mod, so it is isolated from the Next app.
on:
  push:
    paths:
      - 'packages/go-verify/**'
      - '.github/workflows/go-verify.yml'
  pull_request:
    paths:
      - 'packages/go-verify/**'
      - '.github/workflows/go-verify.yml'

permissions:
  contents: read

env:
  # Opt into Node 24 now (GitHub forces it on JS-based actions June 16, 2026)
  # to silence the Node 20 deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/go-verify
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false # stdlib-only module, no go.sum — skip cache to avoid a warning
      - run: go vet ./...
      - run: go test -v ./...
