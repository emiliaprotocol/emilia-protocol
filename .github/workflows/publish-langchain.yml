name: Publish LangChain Adapter

# npm trusted publisher: @emilia-protocol/langchain -> this workflow filename.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact tag, for example langchain-v0.1.1
        required: true
        type: string
      confirmation:
        description: Type PUBLISH @emilia-protocol/langchain@<version>
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  approval:
    runs-on: ubuntu-latest
    environment: registry-publishing-approval
    permissions: {}
    steps:
      - run: echo "Owner approved registry publication."

  publish:
    needs: approval
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_publish-npm-package.yml
    with:
      package_dir: packages/langchain
      package_name: '@emilia-protocol/langchain'
      artifact_id: langchain
      release_tag: ${{ inputs.release_tag }}
      confirmation: ${{ inputs.confirmation }}
      tag_prefix: langchain-v
