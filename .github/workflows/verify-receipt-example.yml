name: Verify Sample Receipt

# Self-demonstrating proof that the verify-receipt action works: on every push
# it offline-verifies a committed sample EP-RECEIPT-v1 (no EP server, no secret)
# and goes green. Doubles as a live usage example for integrators and a status
# badge you can show ("receipt verified"). The sample's signer public key is
# inlined below — it's a public key, safe to commit.
on:
  push:
    paths:
      - 'examples/sample-receipt.json'
      - 'actions/verify-receipt/**'
      - '.github/workflows/verify-receipt-example.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-receipt:
    name: Offline-verify a sample EMILIA receipt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
      - name: Verify
        uses: ./actions/verify-receipt
        with:
          receipt: examples/sample-receipt.json
          public-key: MCowBQYDK2VwAyEAcg7JEcz9OAtJQAljN7UMtx-SpTdLnczkjt0rd6PPvSg
