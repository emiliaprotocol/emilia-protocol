name: TLC Model Checker

permissions: read-all

# Opt every JavaScript-based action into the Node.js 24 runner.
# GitHub forces this default in June 2026; doing it now eliminates the
# deprecation-warning noise on every run and surfaces any Node-24 incompat
# early. Affects actions/checkout, actions/setup-node, actions/upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - 'formal/**.tla'
      - 'formal/**.cfg'
      - 'formal/CONSERVATION_OF_AUTHORITY.md'
      - 'formal/PROOF_STATUS.md'
      - 'formal/RUN_TLC.md'
      - '.github/workflows/tlc.yml'
  pull_request:
    paths:
      - 'formal/**.tla'
      - 'formal/**.cfg'
      - 'formal/CONSERVATION_OF_AUTHORITY.md'
      - 'formal/PROOF_STATUS.md'
      - 'formal/RUN_TLC.md'
      - '.github/workflows/tlc.yml'
  workflow_dispatch:

jobs:
  tlc:
    name: Verify handshake + capability + receipt program
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Download tla2tools.jar (pinned release + checksum)
        # Pin to a tagged release (NOT the mutable `latest`) and verify the
        # SHA-256 so a compromised/re-cut release can't inject a different jar.
        # To bump: change TLA_VERSION, download the new jar, recompute the hash
        # with `shasum -a 256 tla2tools.jar`, and update TLA_SHA256.
        env:
          TLA_VERSION: v1.7.4
          TLA_SHA256: 936a262061c914694dfd669a543be24573c45d5aa0ff20a8b96b23d01e050e88
        run: |
          curl -fsSL -o tla2tools.jar \
            "https://github.com/tlaplus/tlaplus/releases/download/${TLA_VERSION}/tla2tools.jar"
          echo "${TLA_SHA256}  tla2tools.jar" | sha256sum -c -

      - name: Run TLC on ep_handshake.tla
        working-directory: formal
        run: |
          java -Xmx2G -jar ../tla2tools.jar \
            -workers auto \
            -config ep_handshake.cfg \
            ep_handshake.tla \
            2>&1 | tee tlc-output.txt
          # TLC exits 0 on success, non-zero if a property is violated or the
          # spec fails to parse. The tee above preserves output for the artifact.

      - name: Check TLC result
        working-directory: formal
        run: |
          if grep -q "Error:" tlc-output.txt; then
            echo "TLC found an error — one or more invariants are violated."
            grep -A 20 "Error:" tlc-output.txt
            exit 1
          fi
          if grep -q "Model checking completed. No error has been found." tlc-output.txt; then
            echo "TLC: all invariants hold. No counterexample found."
          else
            echo "TLC did not produce a clean completion message. Check the artifact."
            cat tlc-output.txt
            exit 1
          fi

      - name: Run TLC on ep_capability.tla
        working-directory: formal
        run: |
          java -Xmx2G -jar ../tla2tools.jar \
            -workers auto \
            -config ep_capability.cfg \
            ep_capability.tla \
            2>&1 | tee tlc-capability-output.txt

      - name: Check ep_capability TLC result
        working-directory: formal
        run: |
          if grep -q "Error:" tlc-capability-output.txt; then
            echo "TLC found an error — one or more capability invariants are violated."
            grep -A 20 "Error:" tlc-capability-output.txt
            exit 1
          fi
          if grep -q "Model checking completed. No error has been found." tlc-capability-output.txt; then
            echo "TLC: all capability invariants hold. No counterexample found."
          else
            echo "TLC did not produce a clean completion message. Check the artifact."
            cat tlc-capability-output.txt
            exit 1
          fi

      - name: Run TLC on ep_receipt_program.tla
        working-directory: formal
        run: |
          java -Xmx2G -jar ../tla2tools.jar \
            -workers auto \
            -config ep_receipt_program.cfg \
            ep_receipt_program.tla \
            2>&1 | tee tlc-receipt-program-output.txt

      - name: Check ep_receipt_program TLC result
        working-directory: formal
        run: |
          if grep -q "Error:" tlc-receipt-program-output.txt; then
            echo "TLC found an error — one or more receipt-program properties are violated."
            grep -A 20 "Error:" tlc-receipt-program-output.txt
            exit 1
          fi
          if grep -q "Model checking completed. No error has been found." tlc-receipt-program-output.txt; then
            echo "TLC: all receipt-program properties hold in the configured bounds."
          else
            echo "TLC did not produce a clean completion message. Check the artifact."
            cat tlc-receipt-program-output.txt
            exit 1
          fi

      - name: Upload TLC output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: tlc-output
          path: |
            formal/tlc-output.txt
            formal/tlc-capability-output.txt
            formal/tlc-receipt-program-output.txt
          retention-days: 90
