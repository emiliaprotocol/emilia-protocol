name: Publish Require-Receipt

# Opt every JavaScript-based action into the Node.js 24 runner (GitHub default
# from June 2026) — matches the other publish workflows.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Publishes on a `require-receipt-v*` tag (e.g. require-receipt-v0.1.0) or a
# manual run. Uses the same secrets.NPM_TOKEN as the verify/sdk publishers.
on:
  workflow_dispatch:
  push:
    tags:
      - "require-receipt-v*"

jobs:
  publish:
    name: Publish @emilia-protocol/require-receipt
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: packages/require-receipt

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      # Zero-dependency package — no install step. The package.json files array
      # publishes only index.js, README.md, and LICENSE.
      - name: Syntax check
        run: node --check index.js

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
