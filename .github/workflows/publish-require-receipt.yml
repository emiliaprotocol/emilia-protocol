name: Publish Require-Receipt

# npm trusted publisher: @emilia-protocol/require-receipt -> this workflow filename.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact tag, for example require-receipt-v0.1.1
        required: true
        type: string
      confirmation:
        description: Type PUBLISH @emilia-protocol/require-receipt@<version>
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  approval:
    runs-on: ubuntu-latest
    environment: registry-publishing-approval
    permissions: {}
    steps:
      - run: echo "Owner approved registry publication."

  publish:
    needs: approval
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_publish-npm-package.yml
    with:
      package_dir: packages/require-receipt
      package_name: '@emilia-protocol/require-receipt'
      artifact_id: require-receipt
      release_tag: ${{ inputs.release_tag }}
      confirmation: ${{ inputs.confirmation }}
      tag_prefix: require-receipt-v
