name: Secret Scanning

# Opt every JavaScript-based action into the Node.js 24 runner.
# GitHub forces this default in June 2026; doing it now eliminates the
# deprecation-warning noise on every run and surfaces any Node-24 incompat
# early. Affects actions/checkout, actions/setup-node, actions/upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least privilege: gitleaks only reads the checked-out tree.
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0

      # Use the gitleaks CLI directly. The gitleaks/gitleaks-action wrapper
      # now requires a paid GITLEAKS_LICENSE secret; the underlying binary
      # remains MIT-licensed and free for any use. We pin to a specific
      # release tag AND verify the SHA-256 (from the release's published
      # checksums.txt) so a re-cut/compromised asset can't inject a binary.
      # To bump: change GITLEAKS_VERSION and update GITLEAKS_SHA256 from
      # gitleaks_<version>_checksums.txt for the linux_x64 tarball.
      - name: Install gitleaks CLI
        run: |
          GITLEAKS_VERSION=8.21.2
          GITLEAKS_SHA256=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          # --fail: error out on HTTP 4xx/5xx instead of saving an error page that
          # tar then chokes on (a rate-limited download saved as HTML — not a real
          # leak — was the historical "exit code 2"). Retry transient 429/5xx so a
          # download blip can't redden CI.
          curl --fail --location --show-error --silent \
            --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 20 \
            "$url" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run gitleaks
        run: |
          # Scan the working tree. --redact prevents the secret value itself
          # from leaking into CI logs; --exit-code 1 fails CI on any finding.
          gitleaks detect \
            --source . \
            --verbose \
            --redact \
            --exit-code 1 \
            --no-banner
