name: Dependabot Auto-Merge

permissions: read-all

# Opt every JavaScript-based action into the Node.js 24 runner.
# GitHub forces this default in June 2026; doing it now eliminates the
# deprecation-warning noise on every run and surfaces any Node-24 incompat
# early. Affects actions/checkout, actions/setup-node, actions/upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Auto-merges Dependabot PRs that are EITHER:
#   • semver-patch version updates (any package), OR
#   • security updates at patch OR minor level (any package)
#
# Everything else — routine (non-security) minor bumps, and ALL major
# bumps — is left for human review. A malicious or breaking dependency
# release is most likely to slip in via an auto-merged minor bump, so we
# only take minor bumps automatically when they close a known security
# advisory (where the risk of NOT merging outweighs the review cost).
#
# Uses pull_request_target (not pull_request) so the GITHUB_TOKEN has the
# write permissions needed to approve and merge. This is the GitHub-
# recommended pattern for Dependabot auto-merge — see
# https://github.blog/news-insights/the-library/automating-dependabot-with-github-actions/
# It's safe here because the workflow only reads metadata and calls
# `gh pr` commands; it never executes user-supplied code from the PR.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0

      - name: Decide auto-merge eligibility
        id: decide
        env:
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
          # ghsa-ids is populated only when the PR closes one or more security
          # advisories — this is our "is this a security update?" signal.
          GHSA_IDS: ${{ steps.meta.outputs.ghsa-ids }}
        run: |
          # update-type is one of:
          #   version-update:semver-patch
          #   version-update:semver-minor
          #   version-update:semver-major

          IS_SECURITY=false
          if [ -n "$GHSA_IDS" ]; then
            IS_SECURITY=true
          fi

          ELIGIBLE=false
          REASON="not eligible"

          case "$UPDATE_TYPE" in
            version-update:semver-patch)
              # Patch bumps auto-merge whether or not they're security-driven.
              ELIGIBLE=true
              REASON="patch update"
              ;;
            version-update:semver-minor)
              # Routine minor bumps are NOT auto-merged. A minor bump only
              # auto-merges when it closes a security advisory.
              if [ "$IS_SECURITY" = "true" ]; then
                ELIGIBLE=true
                REASON="security update (minor) — advisory: $GHSA_IDS"
              else
                ELIGIBLE=false
                REASON="non-security minor update — human review required"
              fi
              ;;
            version-update:semver-major)
              # Major bumps always require human review, even for security.
              ELIGIBLE=false
              REASON="major update — human review required"
              ;;
          esac

          echo "eligible=$ELIGIBLE" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON"    >> "$GITHUB_OUTPUT"
          echo "## Dependabot auto-merge decision" >> "$GITHUB_STEP_SUMMARY"
          echo "- **update-type**: $UPDATE_TYPE"   >> "$GITHUB_STEP_SUMMARY"
          echo "- **dependencies**: $DEP_NAMES"    >> "$GITHUB_STEP_SUMMARY"
          echo "- **security-update**: $IS_SECURITY" >> "$GITHUB_STEP_SUMMARY"
          echo "- **eligible**: $ELIGIBLE"         >> "$GITHUB_STEP_SUMMARY"
          echo "- **reason**: $REASON"             >> "$GITHUB_STEP_SUMMARY"

      # NOTE: An "Approve PR" step is intentionally absent. The
      # `futureenterprises` org has "Allow GitHub Actions to create and
      # approve pull requests" disabled, so a `gh pr review --approve`
      # call would fail. Instead, we configure branch protection on
      # `main` to NOT require approving review for Dependabot PRs (they
      # already require all required-status-checks to pass via auto-merge).
      # `gh pr merge --auto` queues the merge for whenever protection is
      # satisfied — that includes both CI green and any approval already
      # present, but it does not REQUIRE the workflow to add an approval.

      - name: Enable auto-merge (queues until branch protection is satisfied)
        if: steps.decide.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --merge --delete-branch "$PR_URL"
