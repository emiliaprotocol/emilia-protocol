name: Publish MCP Server to npm

# npm trusted publisher: @emilia-protocol/mcp-server -> this workflow filename.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact tag, for example mcp-v1.0.1
        required: true
        type: string
      confirmation:
        description: Type PUBLISH @emilia-protocol/mcp-server@<version>
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  approval:
    runs-on: ubuntu-latest
    environment: registry-publishing-approval
    permissions: {}
    steps:
      - run: echo "Owner approved registry publication."

  publish:
    needs: approval
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_publish-npm-package.yml
    with:
      package_dir: mcp-server
      package_name: '@emilia-protocol/mcp-server'
      artifact_id: mcp-server
      local_install: true
      release_tag: ${{ inputs.release_tag }}
      confirmation: ${{ inputs.confirmation }}
      tag_prefix: mcp-v
