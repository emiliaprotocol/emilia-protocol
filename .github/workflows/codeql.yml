name: CodeQL

permissions: read-all

# Opt every JavaScript-based action into the Node.js 24 runner.
# GitHub forces this default in June 2026; doing it now eliminates the
# deprecation-warning noise on every run and surfaces any Node-24 incompat
# early. Affects actions/checkout, actions/setup-node, actions/upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      # An explicit permissions block replaces ALL defaults with only what's
      # listed, so security-events alone left actions/contents at `none`. The
      # CodeQL action's feature-enablement check now makes an authenticated
      # API call that needs actions:read — without it, init fails with
      # "Requires authentication". This is GitHub's recommended CodeQL set.
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
