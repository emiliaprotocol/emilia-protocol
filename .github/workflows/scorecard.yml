# OpenSSF Scorecard — automated supply-chain / security-posture attestation.
# Free for public repos. Publishes results to the Security tab and (optionally)
# the public Scorecard API, so a reviewer can read the score without trusting us.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '21 7 * * 1'   # weekly, Monday 07:21 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security tab
      id-token: write          # publish results to the public Scorecard API
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
