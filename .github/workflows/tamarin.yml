name: Tamarin Symbolic Protocol Proofs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  push:
    paths:
      - 'formal/tamarin/**'
      - '.github/workflows/tamarin.yml'
  pull_request:
    paths:
      - 'formal/tamarin/**'
      - '.github/workflows/tamarin.yml'
  workflow_dispatch:

jobs:
  composed-reliance:
    # The pinned prover digest is a linux/arm64-only manifest (checked against the
    # registry), so this job runs on GitHub's arm64 runner and CI executes the exact
    # same image bytes the proof was verified with locally.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Verify pinned model bytes
        working-directory: formal/tamarin
        run: |
          echo '174c27c35b302a9dd096eb28b40ad7df84cf0c1633a93eff829c3de3fc8bbbd3  ep_reliance_composed.spthy' | sha256sum -c -
          echo 'c3708440114c4447616e237ceb0694c68dc8217e43824e5151270b286f6f35d2  run-composed.sh' | sha256sum -c -
      - name: Run every composed proof obligation independently
        working-directory: formal/tamarin
        shell: bash
        run: sh ./run-composed.sh | tee composed-output.txt
      - name: Upload complete prover output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: tamarin-composed-output
          path: |
            formal/tamarin/composed-output.txt
            formal/tamarin/run-output/*.txt
          retention-days: 90
