name: Publish Verify SDK

# npm Trusted Publishing (OIDC) — NO long-lived NPM_TOKEN. On each run npm
# verifies the OIDC claim (owner / repo / workflow filename) and issues a
# short-lived credential, and `--provenance` attaches a signed provenance
# attestation. Configure the trusted publisher once at:
#   npmjs.com -> @emilia-protocol/verify -> Settings -> Trusted Publishing
#   Organization/User: emilia-protocol (as owner) | Repository: emilia-protocol
#   Workflow filename: publish-verify-sdk.yml | Environment: (leave blank)
# Requires npm >= 11.5.1 (installed below).

# Opt every JavaScript-based action into the Node.js 24 runner.
# GitHub forces this default in June 2026; doing it now eliminates the
# deprecation-warning noise on every run and surfaces any Node-24 incompat
# early. Affects actions/checkout, actions/setup-node, actions/upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - "verify-v*"

jobs:
  publish:
    name: Publish @emilia-protocol/verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # REQUIRED for npm trusted publishing (OIDC) + provenance

    defaults:
      run:
        working-directory: packages/verify

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (>= 11.5.1 for OIDC trusted publishing + provenance)
        # --min-release-age=0: the repo .npmrc age-gates app dependencies (supply-
        # chain defense); the trusted first-party npm tool is exempt so publish
        # tooling always installs a current npm with full provenance support.
        run: npm install -g npm@latest --min-release-age=0

      # Zero-dependency package — no install step. The package.json "files"
      # array controls exactly what ships: index.js plus every module it
      # re-exports (web, federation, quorum, revocation, provenance,
      # time-attestation, evidence-record, cli) and index.d.ts/README/LICENSE.
      # `npm pack --dry-run` below prints the authoritative list before publish.

      - name: Run tests
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm (OIDC trusted publishing + provenance)
        run: npm publish --access public --provenance
