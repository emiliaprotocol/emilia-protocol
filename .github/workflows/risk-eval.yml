name: risk-eval

# Regression gate for the deterministic floor plus advisory ML perimeter. A
# high-risk action must never be classified as safe, the heuristic must cover
# every current perimeter case, and malformed/unavailable remote inference must
# fail closed without allowing a model to lower the deterministic verdict.
on:
  push:
    paths:
      - 'ml/risk-eval/**'
      - 'ml/train/**'
      - 'lib/guard-policies.ts'
      - 'package.json'
      - '.github/workflows/risk-eval.yml'
  pull_request:
    paths:
      - 'ml/risk-eval/**'
      - 'ml/train/**'
      - 'lib/guard-policies.ts'
      - 'package.json'
      - '.github/workflows/risk-eval.yml'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24'
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'
      - name: Run risk-eval gate (perimeter + selftest)
        # ml/risk-eval imports lib/guard-policies.ts (renamed .js -> .ts; the
        # import specifier is unchanged, per the bundler/NodeNext convention
        # used repo-wide). Step-scoped env, never $GITHUB_ENV (GitHub blocks
        # NODE_OPTIONS there) and never workflow/job-level (which would apply
        # before actions/checkout has the repo on disk). See
        # scripts/ts-loader/README.md.
        env:
          NODE_OPTIONS: "--import ${{ github.workspace }}/scripts/ts-loader/register.mjs"
        run: npm run ml:gate
