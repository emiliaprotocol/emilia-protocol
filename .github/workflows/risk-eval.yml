name: risk-eval

# Regression gate for the deterministic policy engine: a high-risk action must
# never be classified as safe. Runs the eval harness against lib/guard-policies.js.
# Zero deps — pure Node + the engine (node:crypto only).
on:
  push:
    paths:
      - 'ml/risk-eval/**'
      - 'lib/guard-policies.js'
      - '.github/workflows/risk-eval.yml'
  pull_request:
    paths:
      - 'ml/risk-eval/**'
      - 'lib/guard-policies.js'
      - '.github/workflows/risk-eval.yml'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24'
      - run: node ml/risk-eval/eval.mjs
