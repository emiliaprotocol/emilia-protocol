name: Publish CrewAI Adapter

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact tag, for example crewai-v0.1.0
        required: true
        type: string
      confirmation:
        description: Type PUBLISH emilia-crewai@<version>
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  approval:
    runs-on: ubuntu-latest
    environment: registry-publishing-approval
    permissions: {}
    steps:
      - run: echo "Owner approved registry publication."

  publish:
    needs: approval
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_publish-pypi-package.yml
    with:
      package_dir: packages/crewai
      package_name: 'emilia-crewai'
      artifact_id: crewai
      release_tag: ${{ inputs.release_tag }}
      confirmation: ${{ inputs.confirmation }}
      tag_prefix: crewai-v
