name: Mobile Apps

on:
  push:
    branches: [main]
    paths:
      - 'app/.well-known/**'
      - 'app/api/v1/mobile/**'
      - 'app/mobile/**'
      - 'apps/secure-app/**'
      - 'docs/mobile/**'
      - 'examples/mobile-government/**'
      - 'lib/rate-limit.js'
      - 'lib/mobile/**'
      - 'lib/write-guard.ts'
      - 'middleware.js'
      - 'mobile/**'
      - 'openapi.yaml'
      - 'package.json'
      - 'package-lock.json'
      - 'packages/mobile/**'
      - 'sdks/kotlin-mobile/**'
      - 'sdks/swift-mobile/**'
      - 'scripts/check-mobile-production.mjs'
      - 'scripts/check-mobile-release.mjs'
      - 'scripts/check-write-discipline.js'
      - 'scripts/test-mobile-migration.sh'
      - 'supabase/migrations/*mobile*.sql'
      - 'tests/mobile-production-*.test.js'
      - 'tests/mobile-production-migration.sql'
      - 'tests/conformance.test.ts'
      - 'tests/security.test.ts'
      - 'tests/write-guard-extended.test.ts'
      - '.github/workflows/mobile-apps.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/.well-known/**'
      - 'app/api/v1/mobile/**'
      - 'app/mobile/**'
      - 'apps/secure-app/**'
      - 'docs/mobile/**'
      - 'examples/mobile-government/**'
      - 'lib/rate-limit.js'
      - 'lib/mobile/**'
      - 'lib/write-guard.ts'
      - 'middleware.js'
      - 'mobile/**'
      - 'openapi.yaml'
      - 'package.json'
      - 'package-lock.json'
      - 'packages/mobile/**'
      - 'sdks/kotlin-mobile/**'
      - 'sdks/swift-mobile/**'
      - 'scripts/check-mobile-production.mjs'
      - 'scripts/check-mobile-release.mjs'
      - 'scripts/check-write-discipline.js'
      - 'scripts/test-mobile-migration.sh'
      - 'supabase/migrations/*mobile*.sql'
      - 'tests/mobile-production-*.test.js'
      - 'tests/mobile-production-migration.sql'
      - 'tests/conformance.test.ts'
      - 'tests/security.test.ts'
      - 'tests/write-guard-extended.test.ts'
      - '.github/workflows/mobile-apps.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  protocol-and-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: mobile-contract
          POSTGRES_DB: mobile_contract
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mobile_contract"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Check release invariants
        run: npm run mobile:release-check
      - name: Enforce trust-table write discipline
        run: node scripts/check-write-discipline.js
      - name: Run server-side mobile conformance
        env:
          # Swift/CryptoKit and Android execute in their native jobs below.
          MOBILE_CONFORMANCE_PORTS: javascript
        run: npm run mobile:conformance
      - name: Run production adapters and routes
        run: npx vitest run tests/mobile-production-attestation.test.ts tests/mobile-production-routes.test.ts tests/mobile-production-runtime.test.ts tests/mobile-production-store.test.ts
      - name: Run mobile package hostility suite
        run: node --test packages/mobile/*.test.js
      - name: Execute the production migration contract
        env:
          MOBILE_TEST_DATABASE_URL: postgresql://postgres:mobile-contract@127.0.0.1:5432/mobile_contract
        run: npm run mobile:db-contract

  ios:
    runs-on: macos-15
    env:
      # macos-15 still defaults to Xcode 16.4 / Swift 6.1. The checked-in
      # package manifest requires Swift tools 6.2, which is installed here.
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Lint privacy and entitlement manifests
        run: |
          plutil -lint examples/mobile-government/ios/Sources/PrivacyInfo.xcprivacy
          plutil -lint examples/mobile-government/ios/GovernmentApproval.entitlements
      - name: Test Swift SDK
        run: swift test --package-path sdks/swift-mobile
      - name: Compile the iOS app without signing
        run: |
          xcodebuild \
            -project examples/mobile-government/ios/EmiliaGovernmentApproval.xcodeproj \
            -scheme GovernmentApproval \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/emilia-ios" \
            CODE_SIGNING_ALLOWED=NO \
            build

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Test SDK and compile debug app
        working-directory: sdks/kotlin-mobile
        run: ./gradlew test :sample:assembleDebug :sample:lintDebug --no-daemon

  secure-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/secure-app
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/secure-app/package-lock.json
      - name: Install secure-app dependencies
        run: npm ci --ignore-scripts
      - name: Audit secure-app dependency tree
        run: npm audit --omit=dev --audit-level=high
      - name: Run secure-app protocol tests
        run: npm test
      - name: Validate Expo dependency compatibility
        run: npx expo-doctor
