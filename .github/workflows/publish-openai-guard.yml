name: Publish OpenAI Guard

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact tag, for example openai-guard-v0.1.0
        required: true
        type: string
      confirmation:
        description: Type PUBLISH @emilia-protocol/openai-guard@<version>
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  approval:
    runs-on: ubuntu-latest
    environment: registry-publishing-approval
    permissions: {}
    steps:
      - run: echo "Owner approved registry publication."

  publish:
    needs: approval
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_publish-npm-package.yml
    with:
      package_dir: packages/openai-guard
      package_name: '@emilia-protocol/openai-guard'
      artifact_id: openai-guard
      release_tag: ${{ inputs.release_tag }}
      confirmation: ${{ inputs.confirmation }}
      tag_prefix: openai-guard-v
