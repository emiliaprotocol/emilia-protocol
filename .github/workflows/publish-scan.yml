name: Publish Scan

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact tag, for example scan-v0.1.0
        required: true
        type: string
      confirmation:
        description: Type PUBLISH @emilia-protocol/scan@<version>
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  approval:
    runs-on: ubuntu-latest
    environment: registry-publishing-approval
    permissions: {}
    steps:
      - run: echo "Owner approved registry publication."

  publish:
    needs: approval
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_publish-npm-package.yml
    with:
      package_dir: packages/scan
      package_name: '@emilia-protocol/scan'
      artifact_id: scan
      release_tag: ${{ inputs.release_tag }}
      confirmation: ${{ inputs.confirmation }}
      tag_prefix: scan-v
