name: k6 Performance Baseline

# Opt every JavaScript-based action into the Node.js 24 runner.
# GitHub forces this default in June 2026; doing it now eliminates the
# deprecation-warning noise on every run and surfaces any Node-24 incompat
# early. Affects actions/checkout, actions/setup-node, actions/upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Manual trigger: run against any environment
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target base URL (e.g. https://www.emiliaprotocol.ai)'
        required: true
        default: 'https://www.emiliaprotocol.ai'
      entity_id:
        description: 'Entity ID registered in the target environment'
        required: false
        default: 'perf-test-entity-001'
      test_type:
        description: 'Test type: "smoke" (5 VUs × 30s) or "staircase" (10→500 VUs × ~7min)'
        required: false
        default: 'smoke'

  # Scheduled runs hit production (www.emiliaprotocol.ai) using
  # perf-test-entity-001 / test-responder-001 (seeded in prod Supabase) and
  # the PERF_TEST_API_KEY secret. tests/k6/baseline.js setup() resolves
  # POLICY_KEY → policy_id (UUID) via GET /api/handshake-policies once
  # before scenarios start, so the test stays decoupled from any specific
  # UUID. Smoke is ~500 reqs/night at 5 VUs × 30s — small enough to be
  # filterable from prod metrics by the dedicated entity ids.
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily — smoke test
    - cron: '0 2 * * 0'   # 02:00 UTC every Sunday — full staircase test

jobs:
  baseline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install k6
        run: |
          # The previous install used `gpg --recv-keys` against
          # keyserver.ubuntu.com — that keyserver flakes regularly with
          # "keyserver receive failed: End of file" (e.g., run 25204805889
          # on 2026-05-01). Fetch the key directly over HTTPS from k6's
          # own publish endpoint instead — same key, no keyserver
          # dependency. Retry the apt step a couple times to absorb any
          # transient mirror flake.
          set -eo pipefail
          curl -fsSL https://dl.k6.io/key.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          for i in 1 2 3; do
            sudo apt-get update -q && sudo apt-get install -q -y k6 && break
            echo "apt attempt $i failed, retrying in 5s"; sleep 5
          done
          k6 version

      - name: Run smoke test (always)
        env:
          BASE_URL: ${{ inputs.base_url || 'https://www.emiliaprotocol.ai' }}
          API_KEY: ${{ secrets.PERF_TEST_API_KEY }}
          ENTITY_ID: ${{ inputs.entity_id || 'perf-test-entity-001' }}
        run: |
          k6 run tests/k6/baseline.js \
            --env BASE_URL="$BASE_URL" \
            --env API_KEY="$API_KEY" \
            --env ENTITY_ID="$ENTITY_ID" \
            --out json=k6-smoke-results.json
        continue-on-error: false

      - name: Run staircase load test (Sunday schedule + manual staircase)
        # Runs on: (a) Sunday scheduled trigger, or (b) manual dispatch with test_type=staircase
        if: >-
          (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0') ||
          (github.event_name == 'workflow_dispatch' && inputs.test_type == 'staircase')
        env:
          BASE_URL: ${{ inputs.base_url || 'https://www.emiliaprotocol.ai' }}
          API_KEY: ${{ secrets.PERF_TEST_API_KEY }}
          ENTITY_ID: ${{ inputs.entity_id || 'perf-test-entity-001' }}
        run: |
          echo "### Staircase test (10→500 VUs) — estimated runtime ~7 minutes"
          k6 run tests/k6/staircase.js \
            --env BASE_URL="$BASE_URL" \
            --env API_KEY="$API_KEY" \
            --env ENTITY_ID="$ENTITY_ID" \
            --out json=k6-staircase-results.json
        continue-on-error: false

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: k6-results
          path: |
            k6-smoke-results.json
            k6-staircase-results.json
            tests/k6/staircase-results.json
          retention-days: 90

      - name: Annotate with summary
        if: always()
        run: |
          echo "### k6 Performance Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          if [ -f k6-smoke-results.json ]; then
            p95=$(jq -r '[.[] | select(.type=="Point" and .metric=="http_req_duration") | .data.value] | sort | .[length * 0.95 | floor]' k6-smoke-results.json 2>/dev/null || echo "N/A")
            echo "| Smoke (5 VUs) | p95 latency | ${p95}ms |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f k6-staircase-results.json ]; then
            hs_p95=$(jq -r '.slos.handshake_create_p95_ms // "N/A"' k6-staircase-results.json 2>/dev/null || echo "N/A")
            echo "| Staircase (500 VUs) | handshake p95 | ${hs_p95}ms |" >> "$GITHUB_STEP_SUMMARY"
          fi
