name: Publish CLI

# npm trusted publisher: @emilia-protocol/cli -> this workflow filename.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact tag, for example cli-v0.1.0
        required: true
        type: string
      confirmation:
        description: Type PUBLISH @emilia-protocol/cli@<version>
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  approval:
    runs-on: ubuntu-latest
    environment: registry-publishing-approval
    permissions: {}
    steps:
      - run: echo "Owner approved registry publication."

  publish:
    needs: approval
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_publish-npm-package.yml
    with:
      package_dir: cli
      package_name: '@emilia-protocol/cli'
      artifact_id: cli
      release_tag: ${{ inputs.release_tag }}
      confirmation: ${{ inputs.confirmation }}
      tag_prefix: cli-v
      local_install: true
