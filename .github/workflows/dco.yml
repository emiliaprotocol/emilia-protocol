name: DCO

on:
  pull_request:
    branches: [main]

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        uses: christophebedard/dco-check@v0.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
