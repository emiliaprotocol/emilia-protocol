name: DCO

permissions: read-all

# Opt every JavaScript-based action into the Node.js 24 runner.
# GitHub forces this default in June 2026; doing it now eliminates the
# deprecation-warning noise on every run and surfaces any Node-24 incompat
# early. Affects actions/checkout, actions/setup-node, actions/upload-artifact, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]

jobs:
  dco:
    # Skip DCO for Dependabot PRs — the bot can't add Signed-off-by to its
    # own commits, and the bumps it ships don't carry copyrightable
    # contribution. A skipped job satisfies required status checks per
    # GitHub's documented behavior, so this doesn't open a hole.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check DCO sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          failure=0
          while IFS= read -r commit_sha; do
            author="$(git show -s --format='%an <%ae>' "$commit_sha")"
            if ! git show -s --format='%B' "$commit_sha" \
              | grep --fixed-strings --ignore-case --quiet "Signed-off-by: $author"; then
              echo "::error::Commit $commit_sha is missing Signed-off-by: $author"
              failure=1
            fi
          done < <(git rev-list --reverse "$BASE_SHA..$HEAD_SHA")
          exit "$failure"
