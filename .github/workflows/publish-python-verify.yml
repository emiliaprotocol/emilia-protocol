name: Publish emilia-verify to PyPI

# Trusted Publishing (OIDC) — NO API token is stored anywhere. On each run PyPI
# verifies the OIDC claim (owner / repo / workflow filename) and issues a
# short-lived upload credential. Configure the matching trusted publisher once at:
#   pypi.org -> Your projects -> emilia-verify -> Manage -> Publishing
#   Owner: emiliaprotocol | Repo: emilia-protocol
#   Workflow: publish-python-verify.yml | Environment: (leave blank)
#
# Release flow: bump version in packages/python-verify/pyproject.toml, then
#   git tag python-verify-v1.0.1 && git push origin python-verify-v1.0.1
# (PyPI rejects re-publishing an existing version, so always bump first.)

on:
  workflow_dispatch:
  push:
    tags:
      - 'python-verify-v*'

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish emilia-verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # REQUIRED for PyPI trusted publishing (OIDC)
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0 (Node 24)
        with:
          python-version: '3.12'

      - name: Build sdist + wheel
        working-directory: packages/python-verify
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: packages/python-verify/dist/
          print-hash: true
          skip-existing: true   # re-runs / dispatch on an already-published version exit green
