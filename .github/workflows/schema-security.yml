name: schema-security

# Release-blocker invariant: prod schema truth comes from executable contracts
# (objects that ACTUALLY exist with the expected shape), NOT the migration
# journal. Runs the schema-security contract + the journal-vs-reality
# reconciliation against the live database.
#
# Secret policy:
#   - pull_request: secrets are unavailable to fork PRs; skip NEUTRALLY (green)
#     so external contributors aren't blocked by a check they can't run.
#   - push to main / nightly schedule: secrets are REQUIRED; their absence or any
#     drift FAILS the workflow.
#
# Required repo secret (Settings → Secrets → Actions):
#   SCHEMA_GATE_DB_URL — least-privilege pooler connection string for the
#   read-only `schema_gate` Postgres role (EXECUTE on gov_schema_contract_introspect
#   only; cannot read any table rows). The god-mode service-role key is NOT in CI.
#
# To make this a true deploy gate: add "schema-security / schema-contract" as a
# required status check in branch protection for main, and enable Vercel's
# "wait for CI to pass" on the Git integration.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 7 * * *'   # nightly 07:17 UTC drift sweep
  workflow_dispatch:

concurrency:
  group: schema-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-contract:
    runs-on: ubuntu-latest
    env:
      SCHEMA_GATE_DB_URL: ${{ secrets.SCHEMA_GATE_DB_URL }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          # Node 24: @supabase/supabase-js needs native WebSocket (absent in Node 20).
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts

      - name: Secret guard (skip neutrally on fork PRs; required on main/schedule)
        id: guard
        run: |
          if [ -n "$SCHEMA_GATE_DB_URL" ]; then
            echo "have_secrets=true" >> "$GITHUB_OUTPUT"
            echo "schema_gate credential present — running schema truth checks."
          else
            echo "have_secrets=false" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "::notice::SCHEMA_GATE_DB_URL unavailable (fork PR or unset) — skipping schema-security neutrally."
            else
              echo "::error::SCHEMA_GATE_DB_URL is REQUIRED on '${{ github.event_name }}' but is missing. Prod schema truth cannot be verified — failing."
              exit 1
            fi
          fi

      - name: schema:security — contract vs live prod (tables, columns, RLS, no-anon policies, RPC ACLs, indexes, authority shape)
        if: steps.guard.outputs.have_secrets == 'true'
        run: npm run schema:security

      - name: schema:reconcile — migration journal vs reality (declared objects must actually exist)
        if: steps.guard.outputs.have_secrets == 'true'
        run: npm run schema:reconcile
