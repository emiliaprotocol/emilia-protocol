  /api/v1/adapters/gov/benefit-address-change/precheck:
    post:
      tags: [GovGuard]
      summary: Precheck benefit address or contact-routing change
      description: GovGuard adapter precheck for benefit address, contact, or identity-routing changes.
      security:
