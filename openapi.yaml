                url:
                  type: string
                  format: uri
                  description: Webhook destination URL (must use HTTPS or HTTP)
                events:
                  type: array
                  items:
                    type: string
                  description: Event types to subscribe to
      responses:
        '201':
          description: Webhook endpoint created
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoint:
                    type: object
                  secret:
                    type: string
                    description: HMAC signing secret — shown once, store securely
                  tenant_id:
                    type: string
        '400':
          description: Invalid URL or event list
        '401':
          description: Cloud API authentication required
        '403':
          description: Write permission required
        '500':
          description: Webhook creation failed

  /api/cloud/webhooks/{endpointId}:
    get:
      tags: [Cloud]
      summary: Get webhook endpoint details
      description: |
        Get details of a specific webhook endpoint.
        Requires read permission.
      security:
        - BearerAuth: []
      parameters:
        - name: endpointId
          in: path
          required: true
          schema:
            type: string
          description: Webhook endpoint ID
      responses:
        '200':
          description: Webhook endpoint details
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoint:
                    type: object
                  tenant_id:
                    type: string
        '401':
          description: Cloud API authentication required
        '403':
          description: Read permission required
        '404':
          description: Webhook endpoint not found
        '500':
          description: Webhook query failed
    put:
      tags: [Cloud]
      summary: Update a webhook endpoint
      description: |
        Update a webhook endpoint's URL, subscribed events, or status.
        Requires write permission.
      security:
        - BearerAuth: []
      parameters:
        - name: endpointId
          in: path
          required: true
          schema:
            type: string
          description: Webhook endpoint ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [active, paused, disabled]
      responses:
        '200':
          description: Webhook endpoint updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoint:
                    type: object
                  tenant_id:
                    type: string
        '400':
          description: Invalid URL, event list, or status
        '401':
          description: Cloud API authentication required
        '403':
          description: Write permission required
        '404':
          description: Webhook endpoint not found
        '500':
          description: Webhook update failed
    delete:
      tags: [Cloud]
      summary: Delete a webhook endpoint
      description: |
        Remove a webhook endpoint and its delivery history.
        Requires write permission.
      security:
        - BearerAuth: []
      parameters:
        - name: endpointId
          in: path
          required: true
          schema:
            type: string
          description: Webhook endpoint ID
      responses:
        '200':
          description: Webhook endpoint deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  endpoint_id:
                    type: string
                  tenant_id:
                    type: string
        '401':
          description: Cloud API authentication required
        '403':
          description: Write permission required
        '404':
          description: Webhook endpoint not found
        '500':
          description: Webhook delete failed

  /api/cloud/webhooks/{endpointId}/deliveries:
    get:
      tags: [Cloud]
      summary: List webhook deliveries
      description: |
        List recent deliveries for a webhook endpoint.
        Requires read permission.
      security:
        - BearerAuth: []
      parameters:
        - name: endpointId
          in: path
          required: true
          schema:
            type: string
          description: Webhook endpoint ID
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: status
          in: query
          schema:
            type: string
          description: Filter by delivery status
      responses:
        '200':
          description: Webhook deliveries
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer
                  endpoint_id:
                    type: string
                  tenant_id:
                    type: string
        '401':
          description: Cloud API authentication required
        '403':
          description: Read permission required
        '404':
          description: Webhook endpoint not found
        '500':
          description: Deliveries query failed

  /api/cloud/webhooks/{endpointId}/test:
    post:
      tags: [Cloud]
      summary: Send a test webhook delivery
      description: |
        Send a test webhook delivery to verify endpoint connectivity.
        The endpoint must be active.
        Requires write permission.
      security:
        - BearerAuth: []
      parameters:
        - name: endpointId
          in: path
          required: true
          schema:
            type: string
          description: Webhook endpoint ID
      responses:
        '200':
          description: Test delivery result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  delivery:
                    type: object
                  tenant_id:
                    type: string
        '401':
          description: Cloud API authentication required
        '403':
          description: Write permission required
        '404':
          description: Webhook endpoint not found
        '500':
          description: Test delivery failed

  /api/cloud/approvals:
    get:
      tags: [Cloud Approval Prototype]
      summary: List the tenant's connected approval queue
      description: |
        Experimental pre-standard prototype. Lists only approval requests
        created by the authenticated tenant's Cloud key through this connected
        surface. Every item is the fixed `large_payment_release` action type.
        Each item exposes the server-computed `action_caid` for the exact
        `payment.release.1` typed content. CAID identifies content; it does not
        establish authorization.
        Requires a tenant-bound Cloud bearer key with `approval_request` or
        `admin`.

        This route is not a production API, is not a certification program,
        and is not an interoperability claim.
      operationId: listCloudApprovalPrototype
      security:
        - CloudBearerAuth: []
      x-emilia-maturity: experimental-pre-standard-prototype
      x-emilia-permissions: [approval_request, admin]
      x-emilia-fixed-action-type: large_payment_release
      x-emilia-caid-action-type: payment.release.1
      responses:
        '200':
          description: Tenant-scoped approval queue and status summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudApprovalQueueResponse'
        '401':
          description: A valid Cloud API key is required
        '403':
          description: The Cloud key lacks approval_request or admin
        '503':
          description: The tenant-scoped approval queue is unavailable
        '500':
          description: Approval queue failed unexpectedly
    post:
      tags: [Cloud Approval Prototype]
      summary: Create one connected large-payment approval request
      description: |
        Experimental pre-standard prototype. Creates exactly one
        `large_payment_release` receipt in enforce mode, binds the amount,
        currency, counterparty name, payment destination hash, and payment
        reference, and opens a one-hour signoff request for the named
        `approver_id`. The response includes a server-computed `action_caid`
        for `payment.release.1`. CAID identifies exact typed action content; it
        does not establish authorization. The route refuses to continue unless
        receipt creation requires Class-A assurance.

        The returned `review_path` enters the WebAuthn/WYSIWYS Class-A review
        flow. The plain bearer-key signoff decision routes are Class C and
        cannot decide this request. Requires a tenant-bound Cloud bearer key
        with `approval_request` or `admin`.

        This route is not a production API, is not a certification program,
        and is not an interoperability claim.
      operationId: createCloudApprovalPrototype
      security:
        - CloudBearerAuth: []
      x-emilia-maturity: experimental-pre-standard-prototype
      x-emilia-permissions: [approval_request, admin]
      x-emilia-fixed-action-type: large_payment_release
      x-emilia-caid-action-type: payment.release.1
      x-emilia-required-assurance: A
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudApprovalCreateRequest'
      responses:
        '201':
          description: Pending Class-A approval request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudApprovalCreateResponse'
        '400':
          description: Invalid payment or approver input
        '401':
          description: A valid Cloud API key is required
        '403':
          description: The Cloud key lacks approval_request or admin, or cannot create the bounded receipt
        '413':
          description: Request body exceeds 32 KiB
        '404':
          description: A delegated receipt or signoff resource was not found
        '409':
          description: Delegated signoff state conflicts with the new request
        '410':
          description: The delegated receipt expired before signoff creation
        '500':
          description: Approval creation failed or the Class-A invariant was not met

  /api/cloud/approvals/{receiptId}/consume:
    post:
      tags: [Cloud Approval Prototype]
      summary: Consume an approved connected request exactly once
      description: |
        Experimental pre-standard prototype. Consumes the tenant-owned
        `large_payment_release` receipt once after its Class-A approval. The
        supplied `action_hash` must exactly match issuance. The server fixes
        `executing_system` to `emilia_cloud_approval_endpoint`; callers cannot
        override it. A consumed receipt cannot be reused.

        Consumption records one-time authorization use; this prototype route
        does not itself move money. Requires a tenant-bound Cloud bearer key
        with `approval_request` or `admin`.

        This route is not a production API, is not a certification program,
        and is not an interoperability claim.
      operationId: consumeCloudApprovalPrototype
      security:
        - CloudBearerAuth: []
      x-emilia-maturity: experimental-pre-standard-prototype
      x-emilia-permissions: [approval_request, admin]
      x-emilia-fixed-action-type: large_payment_release
      x-emilia-caid-action-type: payment.release.1
      x-emilia-consumption: one-time
      parameters:
        - $ref: '#/components/parameters/CloudApprovalReceiptId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudApprovalConsumeRequest'
      responses:
        '200':
          description: Receipt consumed once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudApprovalConsumeResponse'
        '400':
          description: Invalid receipt_id or action_hash
        '401':
          description: A valid Cloud API key is required
        '403':
          description: The Cloud key lacks approval_request or admin, or Class-A approval is absent or rejected
        '404':
          description: No tenant-owned connected approval receipt was found
        '409':
          description: Receipt already consumed or action_hash mismatch
        '410':
          description: Receipt expired

  /api/cloud/approvals/{receiptId}/evidence:
    get:
      tags: [Cloud Approval Prototype]
      summary: Export the connected approval evidence packet
      description: |
        Experimental pre-standard prototype. Exports the tenant-owned JSON
        evidence packet for the fixed `large_payment_release` receipt,
        including its audit timeline, recorded signoff decision, consumption
        state, and signed offline-verifiable receipt fields when the underlying
        evidence route can honestly produce them. For a signed packet,
        `document.payload.claim.canonical_action.action_caid` carries the
        server-computed `payment.release.1` identifier. The create response and
        queue expose `action_caid` directly. CAID identifies exact typed action
        content; it does not establish authorization.

        The export is evidence, not a certification or an interoperability
        result. Requires a tenant-bound Cloud bearer key with
        `approval_request` or `admin`.
      operationId: exportCloudApprovalPrototypeEvidence
      security:
        - CloudBearerAuth: []
      x-emilia-maturity: experimental-pre-standard-prototype
      x-emilia-permissions: [approval_request, admin]
      x-emilia-fixed-action-type: large_payment_release
      x-emilia-caid-action-type: payment.release.1
      parameters:
        - $ref: '#/components/parameters/CloudApprovalReceiptId'
      responses:
        '200':
          description: JSON approval evidence packet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudApprovalEvidence'
        '400':
          description: Invalid receipt_id
        '401':
          description: A valid Cloud API key is required
        '403':
          description: The Cloud key lacks approval_request or admin
        '404':
          description: No tenant-owned connected approval receipt was found
        '500':
          description: Approval evidence export failed

  /api/v1/approvers/webauthn/register-options:
    post:
      tags: [Class A Signoff]
      summary: Begin approver passkey enrollment (WebAuthn registration options)
      description: |
        Start enrolling a named approver's device-bound signing key (key class
        A). Requires an authenticated EP API key; the authenticated entity is
        recorded as the second-party attestation on the enrollment.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approver_id]
              properties:
                approver_id: { type: string, description: 'e.g. ep:approver:jchen-controller' }
                approver_name: { type: string }
                approver_email: { type: string }
      responses:
        '200':
          description: WebAuthn registration options (single-use, 5-minute challenge)
        '401':
          description: Missing or invalid EP API key
  /api/v1/approvers/webauthn/register-verify:
    post:
      tags: [Class A Signoff]
      summary: Complete approver passkey enrollment (verify attestation)
      description: |
        Verify the WebAuthn attestation against the pending challenge and
        store the credential (COSE + P-256 SPKI for offline verification).
        ES256/P-256 only.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approver_id, attestation]
              properties:
                approver_id: { type: string }
                approver_name: { type: string }
                attestation: { type: object, description: WebAuthn RegistrationResponseJSON }
      responses:
        '201':
          description: Credential enrolled (key class A, second-party attested)
        '400':
          description: Attestation invalid or unsupported key type
        '409':
          description: Credential already enrolled
  /api/v1/signoffs/{signoffId}/webauthn-options:
    post:
      tags: [Class A Signoff]
      summary: Issue the WebAuthn signing challenge for a pending signoff
      description: |
        Builds the canonical Authorization Context for this signoff and
        returns WebAuthn authentication options whose challenge is
        SHA-256(JCS(context)) — action-bound and single-use by construction.
        Capability-URL auth: possession of the unguessable signoff_id permits
        viewing; authorizing additionally requires the device assertion.
      parameters:
        - name: signoffId
          in: path
          required: true
          schema: { type: string, pattern: '^sig_[a-f0-9]{32}$' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approver_id]
              properties:
                approver_id: { type: string }
      responses:
        '200':
          description: Authentication options + the exact context being signed
        '403':
          description: Approver is the initiator (separation of duties)
        '404':
          description: Signoff not found or approver not enrolled
        '409':
          description: Signoff already decided
        '410':
          description: Signoff window expired
  /api/v1/signoffs/{signoffId}/approve-webauthn:
    post:
      tags: [Class A Signoff]
      summary: Decide a signoff with an approver-held device key (key class A)
      description: |
        Verifies the WebAuthn assertion (challenge = context hash, user
        verification required, separation of duties enforced) and records the
        decision with the assertion embedded, so the receipt verifies offline
        against the approver's enrolled key. Denials are signed the same way.
      parameters:
        - name: signoffId
          in: path
          required: true
          schema: { type: string, pattern: '^sig_[a-f0-9]{32}$' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approver_id, assertion]
              properties:
                approver_id: { type: string }
                decision: { type: string, enum: [approved, rejected], default: approved }
                assertion: { type: object, description: WebAuthn AuthenticationResponseJSON }
      responses:
        '200':
          description: Decision recorded with key class A evidence
        '400':
          description: Assertion invalid
        '403':
          description: SoD violation or credential not enrolled for approver
        '409':
          description: Already decided, replay, or action-hash mismatch
        '410':
          description: Challenge or signoff window expired

  # ===========================================================================
  # Native mobile approval
  # ===========================================================================

  /api/v1/mobile/pairings:
    post:
      tags: [Mobile Approval]
      summary: Create a single-use native app pairing code
      description: |
        Creates a short-lived pairing capability for one named approver. The
        organization API key determines the tenant; approver identity is never
        accepted as an authority claim from the mobile app.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [approver_id]
              properties:
                approver_id:
                  type: string
                  pattern: '^[A-Za-z0-9:_.@-]{3,128}$'
      responses:
        '201':
          description: Single-use pairing code created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobilePairing'
        '401': { description: Missing or invalid organization API key }
        '403': { description: Write permission required }
        '429': { description: Pairing rate exceeded }
        '503': { description: Durable pairing service unavailable }

  /api/v1/mobile/pairings/exchange:
    post:
      tags: [Mobile Approval]
      summary: Exchange a single-use pairing code for a mobile session
      description: |
        Consumes the pairing capability atomically and returns a time-bounded
        mobile bearer token. The platform and app identity must match the apps
        pinned when the pairing was created.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [pairing_code, platform, app_id]
              properties:
                pairing_code:
                  type: string
                  pattern: '^[2-9A-HJ-NP-Z]{4}-[2-9A-HJ-NP-Z]{4}-[2-9A-HJ-NP-Z]{4}$'
                platform:
                  type: string
                  enum: [ios, android]
                app_id:
                  type: string
      responses:
        '201':
          description: Paired mobile session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileSession'
        '401': { description: Pairing capability refused }
        '429': { description: Pairing rate exceeded }
        '503': { description: Durable pairing service unavailable }

  /api/v1/mobile/inbox:
    get:
      tags: [Mobile Approval]
      operationId: listMobileApprovalInbox
      summary: List pending CAID-bound action revisions for the paired approver
      description: |
        Returns the active approval assignments visible to the paired approver.
        Each continuity-enabled action includes its server-computed CAID and
        action digest, revision, aggregate quorum, lifecycle state, material
        changes, cross-system alignment claims, event summaries, and whether
        this approver can still withdraw an approval before consumption.
      security:
        - MobileSessionAuth: []
      responses:
        '200':
          description: Pending approvals scoped to the paired tenant and approver
          content:
            application/json:
              schema:
                type: object
                required: [approver_id, actions]
                properties:
                  approver_id: { type: string }
                  actions:
                    type: array
                    items:
                      $ref: '#/components/schemas/MobileInboxAction'
        '401': { description: 'Invalid, expired, or revoked mobile session' }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Approval inbox unavailable }

  /api/v1/mobile/history:
    get:
      tags: [Mobile Approval]
      operationId: listMobileActionHistory
      summary: List the paired approver's mobile action history
      description: |
        Returns current and superseded revisions, terminal lifecycle states,
        quorum progress, material changes, cross-system alignments, event
        summaries, and a bounded decision passport when one is available.
        Decision passports contain evidence digests, not raw WebAuthn or
        provider evidence.
      security:
        - MobileSessionAuth: []
      responses:
        '200':
          description: Mobile action history scoped to the paired tenant and approver
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [approver_id, actions]
                properties:
                  approver_id: { type: string }
                  actions:
                    type: array
                    items:
                      $ref: '#/components/schemas/MobileHistoryAction'
        '401': { description: 'Invalid, expired, or revoked mobile session' }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Mobile action history unavailable }

  /api/v1/mobile/actions/{actionReference}/passport:
    get:
      tags: [Mobile Approval]
      operationId: getMobileDecisionPassport
      summary: Get the paired approver's bounded decision passport
      description: |
        Returns the decision passport for the exact tenant, approver, action
        reference, and revision. The passport carries CAID, digest, lifecycle,
        quorum, and evidence digests only. Raw WebAuthn assertions, platform
        tokens, provider signatures, and provider payloads remain server-side.
      security:
        - MobileSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/MobileActionReference'
      responses:
        '200':
          description: Bounded decision passport
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [passport]
                properties:
                  passport:
                    $ref: '#/components/schemas/MobileDecisionPassport'
        '400': { description: Malformed action reference }
        '401': { description: 'Invalid, expired, or revoked mobile session' }
        '404': { description: Passport unavailable in this paired approver scope }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Mobile decision passport unavailable }

  /api/v1/mobile/actions/{actionReference}/withdraw:
    post:
      tags: [Mobile Approval]
      operationId: withdrawMobileApproval
      summary: Withdraw this paired approver's approval before consumption
      description: |
        Accepts exactly an empty JSON object. Withdrawal is scoped to the
        authenticated paired session and is refused after execution authority
        has been consumed. It does not undo or compensate an effect.
      security:
        - MobileSessionAuth: []
      parameters:
        - $ref: '#/components/parameters/MobileActionReference'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              maxProperties: 0
      responses:
        '200':
          description: Approval withdrawn before consumption
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [withdrawn, state]
                properties:
                  withdrawn: { type: boolean, enum: [true] }
                  state: { type: string, enum: [withdrawn] }
        '400': { description: Request body or action reference is malformed }
        '401': { description: 'Invalid, expired, or revoked mobile session' }
        '409': { description: Execution authority was already consumed }
        '415': { description: Request is not application/json }
        '422': { description: Approval is not withdrawable }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Mobile approval withdrawal unavailable }

  /api/v1/mobile/actions/{actionReference}/consume:
    post:
      tags: [Mobile Approval]
      operationId: consumeMobileAction
      summary: Atomically consume an authorized mobile action revision
      description: |
        Operator endpoint for the protected executor. Creates one tenant-scoped
        operation and one server-random consumption nonce for an authorized
        active revision. The operation freezes the intended executor and its
        currently active key. Reusing the operation within the tenant, consuming
        a superseded revision, or consuming authority twice is refused.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MobileActionReference'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [operation_id, executor_id]
              properties:
                operation_id:
                  type: string
                  pattern: '^[A-Za-z0-9:_.@/-]{8,256}$'
                executor_id:
                  type: string
                  minLength: 3
                  maxLength: 256
      responses:
        '201':
          description: Execution authority atomically consumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileConsumption'
        '400': { description: Request body or action reference is malformed }
        '401': { description: Missing or invalid organization API key }
        '403': { description: Write permission required }
        '409': { description: Action was superseded or execution authority was already consumed }
        '415': { description: Request is not application/json }
        '422': { description: Action is not authorized for consumption }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Mobile action consumption unavailable }

  /api/v1/mobile/actions/{actionReference}/outcomes:
    post:
      tags: [Mobile Approval]
      operationId: recordMobileActionOutcome
      summary: Mark an operation indeterminate or reconcile its terminal outcome
      description: |
        A provider timeout is recorded with `state=indeterminate` and no
        evidence. INDETERMINATE is not retry-safe: the executor must not issue a
        blind replay. A later `state=reconcile` request can resolve the operation
        to EXECUTED or REFUSED only with an exact CAID-, digest-, operation-, and
        consumption-nonce-bound `EP-MOBILE-PROVIDER-OUTCOME-v1` statement signed
        by the exact Ed25519 executor key frozen at consumption and still active
        for this organization. The signed provider statement is retained in the
        protected server-side evidence store; bounded mobile exports carry only
        its digest.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MobileActionReference'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/MobileIndeterminateOutcomeRequest'
                - $ref: '#/components/schemas/MobileReconcileOutcomeRequest'
      responses:
        '200':
          description: Indeterminate state recorded or terminal outcome reconciled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileOutcomeTransition'
        '400': { description: 'Request, action reference, or provider evidence is malformed' }
        '401': { description: Missing or invalid organization API key }
        '403': { description: Write permission required }
        '404': { description: Operation was not found in this tenant and action scope }
        '409': { description: Operation is already terminal or cannot make this transition }
        '415': { description: Request is not application/json }
        '422': { description: 'Provider evidence failed exact binding, key pin, or signature verification' }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Mobile action outcome service unavailable }

  /api/v1/mobile/actions/{actionReference}/supersede:
    post:
      tags: [Mobile Approval]
      operationId: supersedeMobileAction
      summary: Replace an unconsumed action with a new CAID-bound revision
      description: |
        Operator endpoint that creates a successor revision and deterministic
        added, changed, or removed material-field records. Supersession is
        refused after execution authority has been consumed.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MobileActionReference'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileSupersessionRequest'
      responses:
        '201':
          description: Successor action revision created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileSupersessionResult'
        '400': { description: Request body or action reference is malformed }
        '401': { description: Missing or invalid organization API key }
        '403': { description: Write permission required }
        '409': { description: 'Action is missing, conflicting, or already consumed' }
        '415': { description: Request is not application/json }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Mobile action supersession unavailable }

  /api/v1/mobile/actions/{actionReference}/alignments:
    post:
      tags: [Mobile Approval]
      operationId: recordMobileActionAlignment
      summary: Record an evidence-backed cross-system action alignment
      description: |
        Stores a named system's comparison to this exact action revision.
        `EQUIVALENT_UNDER_PROFILE` requires native verification, a pinned mapping
        profile ID and SHA-256 hash, and an evidence digest. The service does not
        infer equivalence from matching labels or action references.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MobileActionReference'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileAlignmentRequest'
      responses:
        '201':
          description: Cross-system alignment recorded
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [recorded]
                properties:
                  recorded: { type: boolean, enum: [true] }
        '400': { description: Request body or action reference is malformed }
        '401': { description: Missing or invalid organization API key }
        '403': { description: Write permission required }
        '415': { description: Request is not application/json }
        '422': { description: Alignment does not meet its claimed verification requirements }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Mobile action alignment unavailable }

  /api/v1/mobile/executors:
    post:
      tags: [Mobile Approval]
      operationId: registerMobileExecutorKey
      summary: Register or rotate an organization's pinned provider-outcome key
      description: |
        Admin-only endpoint. Registers a DER SPKI Ed25519 public key encoded as
        base64url. `key_id` must equal the server-derived
        `ep:executor-key:sha256:<hex>` identifier for the submitted key.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileExecutorKeyRegistration'
      responses:
        '201':
          description: Executor key registered or rotated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [registered, executor_id, key_id]
                properties:
                  registered: { type: boolean, enum: [true] }
                  executor_id: { type: string }
                  key_id:
                    type: string
                    pattern: '^ep:executor-key:sha256:[0-9a-f]{64}$'
        '400': { description: 'Executor identifier, key ID, or Ed25519 public key is invalid' }
        '401': { description: Missing or invalid organization API key }
        '403': { description: Organization admin permission required }
        '409': { description: Executor key registration was refused }
        '415': { description: Request is not application/json }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Mobile executor registration unavailable }

  /api/v1/mobile/enrollments/challenges:
    post:
      tags: [Mobile Approval]
      summary: Begin passkey and platform-attestation enrollment
      description: |
        Returns one challenge binding the approver, app identity, RP ID,
        passkey registration, and App Attest or Play Integrity request.
      security:
        - MobileSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [approver_id, platform, app_id]
              properties:
                approver_id: { type: string }
                platform: { type: string, enum: [ios, android] }
                app_id: { type: string }
      responses:
        '200':
          description: Enrollment challenge issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileProtocolResult'
        '401': { description: Invalid mobile session }
        '409': { description: Challenge replay or state conflict }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Durable enrollment service unavailable }

  /api/v1/mobile/enrollments:
    post:
      tags: [Mobile Approval]
      summary: Complete passkey and platform-attestation enrollment
      description: |
        Verifies the passkey registration and platform attestation against the
        same single-use enrollment challenge before admitting the device.
      security:
        - MobileSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobilePresentation'
      responses:
        '200':
          description: Device enrollment accepted or refused with a closed verdict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileProtocolResult'
        '401': { description: Invalid mobile session }
        '409': { description: Challenge replay or state conflict }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Durable enrollment service unavailable }

  /api/v1/mobile/challenges:
    post:
      tags: [Mobile Approval]
      summary: Issue an exact-action approval challenge
      description: |
        Resolves the action from the tenant system of record and issues a
        single-use challenge bound to the action digest, presentation, approver,
        decision, enrolled device, app identity, policy, and expiry.
      security:
        - MobileSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [profile_id, action_reference, approver_id, decision, platform, app_id, device_key_id]
              properties:
                profile_id: { type: string }
                action_reference: { type: string }
                approver_id: { type: string }
                decision: { type: string, enum: [approved, denied] }
                platform: { type: string, enum: [ios, android] }
                app_id: { type: string }
                device_key_id: { type: string }
      responses:
        '200':
          description: Exact-action challenge issued or refused with a closed verdict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileProtocolResult'
        '401': { description: Invalid mobile session }
        '403': { description: Session is not authorized for the named approver or device }
        '409': { description: Challenge replay or action-state conflict }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Durable challenge service unavailable }

  /api/v1/mobile/ceremonies:
    post:
      tags: [Mobile Approval]
      summary: Verify and atomically consume a native approval ceremony
      description: |
        Verifies passkey user presence and verification, exact-action binding,
        app and device enrollment, platform attestation, freshness, policy, and
        replay state. The action decision and portable evidence record commit in
        one database transaction; storage failure refuses the action.
      security:
        - MobileSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobilePresentation'
      responses:
        '200':
          description: Closed reliance verdict and portable evidence record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileProtocolResult'
        '400': { description: Malformed or mismatched ceremony }
        '401': { description: Invalid mobile session }
        '409': { description: 'Replayed, already decided, or conflicting ceremony' }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Verification or durable evidence store unavailable }

  /api/v1/mobile/ceremonies/{challengeId}:
    get:
      tags: [Mobile Approval]
      summary: Recover a possibly committed mobile ceremony result
      description: |
        Idempotently checks whether the exact challenge produced a verified,
        atomically committed decision for the authenticated tenant, session,
        approver, app, and device. Unknown identifiers and all scope, freshness,
        or evidence mismatches return the same closed unknown body.
      security:
        - MobileSessionAuth: []
      parameters:
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9:_.@-]{8,256}$'
      responses:
        '200':
          description: Committed verified result or closed unknown state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileCeremonyLookup'
        '401': { description: Invalid mobile session }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Durable ceremony result lookup unavailable }

  /api/v1/mobile/session:
    delete:
      tags: [Mobile Approval]
      summary: Revoke the current paired mobile session
      security:
        - MobileSessionAuth: []
      responses:
        '200': { description: Mobile session revoked }
        '401': { description: Invalid mobile session }
        '409': { description: Session already inactive }
        '429': { description: Mobile request rate exceeded }
        '503': { description: Session revocation unavailable }

  /api/v1/mobile/demo/actions:
    post:
      tags: [Mobile Approval]
      summary: Inject a synthetic approval into a demo tenant
      description: |
        Disabled unless MOBILE_DEMO_ENABLED=true. Creates only synthetic
        treasury, grid, or healthcare examples for authenticated demo tenants;
        it is not an action-ingestion interface for production deployments.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [approver_id]
              properties:
                approver_id: { type: string }
                scenario: { type: string, enum: [treasury, grid, healthcare], default: treasury }
      responses:
        '201': { description: Synthetic action created }
        '401': { description: Missing or invalid organization API key }
        '403': { description: Write permission required }
        '404': { description: Mobile demo injection is disabled }
        '429': { description: Demo action rate exceeded }
        '503': { description: Demo action service unavailable }

  # ===========================================================================
  # GRACE grid curtailment
  # ===========================================================================

  /api/v1/grace/curtailment/actions:
    post:
      tags: [GRACE]
      operationId: createGraceCurtailmentActionGroup
      summary: Create one bounded grid-curtailment approval group
      description: |
        Canonicalizes one `grid.curtailment` action and atomically creates the
        named mobile-approver assignments. The relying-party policy, exact
        approval surface, action digest, approver order, and threshold are
        server-derived. A curtailment at or above the configured hard-cut floor
        requires at least two distinct approvers.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - action_id
                - facility
                - target_delta_kw
                - not_before
                - not_after
                - baseline_method_hash
                - envelope_id
                - initiator_id
                - approver_ids
                - required_approvals
              properties:
                action_id: { type: string, minLength: 3, maxLength: 256 }
                facility: { type: string, minLength: 3, maxLength: 256 }
                target_delta_kw:
                  type: string
                  pattern: '^(0|[1-9][0-9]*)(\.[0-9]{1,3})?$'
                  description: Positive decimal kilowatts, encoded as a string.
                not_before: { type: string, format: date-time }
                not_after: { type: string, format: date-time }
                baseline_method_hash:
                  type: string
                  pattern: '^sha256:[0-9a-f]{64}$'
                envelope_id: { type: string, minLength: 3, maxLength: 256 }
                initiator_id: { type: string, minLength: 3, maxLength: 256 }
                approver_ids:
                  type: array
                  minItems: 1
                  maxItems: 16
                  uniqueItems: true
                  items:
                    type: string
                    pattern: '^[A-Za-z0-9:_.@-]{3,128}$'
                required_approvals: { type: integer, minimum: 1, maximum: 16 }
                control_mode:
                  type: string
                  enum: [human_on_the_loop, human_in_the_loop]
                  default: human_on_the_loop
      responses:
        '201':
          description: Canonical action and mobile approval group created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [action_id, action_hash, required_approvals, assignments, expires_at]
                properties:
                  action_id: { type: string }
                  action_hash: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
                  required_approvals: { type: integer }
                  assignments:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      required: [action_reference, approver_id]
                      properties:
                        action_reference: { type: string, pattern: '^mobact_[0-9a-f]{32}$' }
                        approver_id: { type: string }
                  expires_at: { type: string, format: date-time }
        '400': { description: Malformed action or insufficient hard-cut quorum }
        '401': { description: Missing or invalid organization API key }
        '403': { description: Write permission required }
        '415': { description: Request is not application/json }
        '429': { description: Action-creation rate exceeded }
        '503': { description: Durable GRACE action service unavailable }

  /api/v1/grace/reference-scenario:
    get:
      tags: [GRACE]
      operationId: runGraceReferenceScenario
      summary: Run the public signed GRACE reference composition
      description: |
        Runs a synthetic 18 MW scenario through two Class-A mobile approvals,
        bounded one-time dispatch, separately signed actuator and meter evidence,
        an Action State COSE Signed Statement, one-time entitlement redemption,
        and hostile replay cases. Cryptographic verification is real; the
        adapters are simulations and this endpoint makes no physical-grid claim.
      security: []
      responses:
        '200':
          description: Completed reference proof and hostile-refusal results
          content:
            application/json:
              schema:
                type: object
                required: [ok, reference_only, physical_claim, action, action_hash, authorization, acknowledgment, meter_statement, compliance, action_state, settlement, attacks, pins]
                properties:
                  ok: { type: boolean, enum: [true] }
                  reference_only: { type: boolean, enum: [true] }
                  physical_claim: { type: boolean, enum: [false] }
                  description: { type: string }
                  action: { type: object }
                  action_hash: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
                  authorization: { type: object }
                  acknowledgment: { type: object }
                  meter_statement: { type: object }
                  compliance: { type: object }
                  action_state: { type: object }
                  settlement: { type: object }
                  attacks: { type: object }
                  pins: { type: object }
        '429': { description: Public reference-run rate exceeded }
        '503': { description: Reference scenario unavailable }

  /api/v1/gate/reference-scenario:
    get:
      tags: [EMILIA Gate]
      operationId: runGateReferenceScenario
      summary: Run the public EMILIA Gate consequence-firewall scenario
      description: |
        Runs a synthetic consequential action through the real Gate runtime:
        missing evidence is challenged, a generated human or quorum ceremony is
        bound to the exact action, the authorized effect runs once, and drift,
        tampering, wrong-authority, and replay presentations are refused. Keys
        and effects are reference-only; this endpoint makes no production-system
        or physical-world claim.
      security: []
      parameters:
        - in: query
          name: profile
          required: false
          schema:
            type: string
            enum: [treasury, production, data, healthcare]
            default: treasury
      responses:
        '200':
          description: Completed reference execution and hostile-refusal results
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, reference_only, physical_claim, run_id, profile, action, action_hash, challenge, ceremony, authorization, execution, reliance, evidence, attacks, limitations]
                properties:
                  ok: { type: boolean, enum: [true] }
                  reference_only: { type: boolean, enum: [true] }
                  physical_claim: { type: boolean, enum: [false] }
                  generated_at: { type: string, format: date-time }
                  run_id: { type: string }
                  profile: { type: object }
                  action: { type: object }
                  action_hash: { type: string }
                  challenge: { type: object }
                  ceremony: { type: object }
                  authorization: { type: object }
                  execution: { type: object }
                  reliance: { type: object }
                  evidence: { type: object }
                  attacks:
                    type: array
                    items: { type: object }
                  limitations:
                    type: array
                    items: { type: string }
        '400': { description: Unknown reference profile }
        '429': { description: Public reference-run rate exceeded }
        '503': { description: Gate reference scenario unavailable }

  /api/v1/gate/control-plane-scenario:
    get:
      tags: [EMILIA Gate]
      operationId: runGateControlPlaneScenario
      summary: Run the public three-plane Gate control-plane scenario
      description: |
        Composes a synthetic executor-side Gate, an independently pinned network
        observation, coverage evidence, and an evidence-eligibility decision. The
        witness-only mode demonstrates the fail-closed boundary: observing traffic
        does not establish that the action was mediated. All keys, effects, and
        measurements are reference-only and make no production-system claim.
      security: []
      parameters:
        - in: query
          name: mode
          required: false
          schema:
            type: string
            enum: [complete, witness_only]
            default: complete
      responses:
        '200':
          description: Three-plane reference result with coverage and evidence eligibility
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, reference_only, physical_claim, mode, action, action_digest, planes, hashes, limitations]
                properties:
                  ok: { type: boolean, enum: [true] }
                  reference_only: { type: boolean, enum: [true] }
                  physical_claim: { type: boolean, enum: [false] }
                  mode: { type: string, enum: [complete, witness_only] }
                  generated_at: { type: string, format: date-time }
                  action: { type: object }
                  action_digest: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
                  planes: { type: object }
                  hashes: { type: object }
                  limitations:
                    type: array
                    items: { type: string }
        '400': { description: Unknown control-plane reference mode }
        '429': { description: Public reference-run rate exceeded }
        '503': { description: Control-plane reference scenario unavailable }

  # ===========================================================================
  # Release Lock
  # ===========================================================================

  /api/v1/release-locks:
    post:
      operationId: createReleaseLock
      tags: [Release Lock]
      summary: Create a two-round change-order Release Lock
      description: |
        Requires write permission. Verifies the final retained document, both
        independently verified contact bindings, and two distinct role subjects
        under one relying-party-pinned external authority. It then delivers one
        single-use invitation to each verified contact. Raw invitation
        capabilities are never returned to the creating contractor.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseLockCreateRequest'
      responses:
        '201': { description: 'Release Lock created and invitations delivered' }
        '400': { description: 'Malformed, non-canonical, or incomplete lock' }
        '401': { description: 'Organization authentication required' }
        '403': { description: 'Contractor entity or organization mismatch' }
        '422': { description: 'Authoritative document evidence refused' }
        '503': { description: 'Storage, document, or delivery provider unavailable' }

  /api/v1/release-locks/invitations/exchange:
    post:
      operationId: exchangeReleaseLockInvitation
      tags: [Release Lock]
      summary: Exchange one exact participant invitation
      description: |
        Browser or cookie-jar exchange. The request Origin must exactly match
        the API origin. The response sets a strict host-only cookie named
        `__Host-ep_release_lock_session_{lockId}`; clients must preserve that
        exact Set-Cookie value for participant operations.
      security: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockOrigin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [token, lock_id, role]
              properties:
                token: { type: string, pattern: '^[A-Za-z0-9_-]{43}$', writeOnly: true }
                lock_id: { $ref: '#/components/schemas/ReleaseLockId' }
                role: { $ref: '#/components/schemas/ReleaseLockRole' }
      responses:
        '200':
          description: Invitation consumed; strict host-only session cookie set
          headers:
            Set-Cookie:
              schema: { type: string }
              description: Dynamic per-lock HttpOnly, Secure, SameSite=Strict session cookie
        '401': { description: 'Invitation invalid' }
        '403': { description: 'Origin, invitation lock, or role mismatch' }
        '409': { description: 'Invitation already exchanged or no longer active' }
        '410': { description: 'Invitation expired' }

  /api/v1/release-locks/pairings/exchange:
    post:
      operationId: exchangeReleaseLockPairing
      tags: [Release Lock]
      summary: Exchange a one-time Action Mirror phone pairing
      description: |
        Creates a short-lived session restricted to the pairing's exact lock,
        participant role, contact binding, and approval round. The request
        Origin must exactly match the API origin; the response sets the exact
        dynamic per-lock cookie used by the Action Mirror.
      security: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockOrigin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [token, lock_id, role, round]
              properties:
                token: { type: string, pattern: '^[A-Za-z0-9_-]{43}$', writeOnly: true }
                lock_id: { $ref: '#/components/schemas/ReleaseLockId' }
                role: { $ref: '#/components/schemas/ReleaseLockRole' }
                round: { $ref: '#/components/schemas/ReleaseLockRound' }
      responses:
        '200':
          description: Pairing consumed; round-scoped session cookie set
          headers:
            Set-Cookie:
              schema: { type: string }
              description: Dynamic per-lock HttpOnly, Secure, SameSite=Strict session cookie
        '401': { description: 'Pairing invalid' }
        '403': { description: 'Pairing lock, role, or round mismatch' }
        '409': { description: 'Pairing already exchanged' }
        '410': { description: 'Pairing expired' }

  /api/v1/release-locks/{lockId}/view:
    get:
      operationId: getReleaseLockParticipantView
      tags: [Release Lock]
      summary: Retrieve the participant-scoped canonical lock view
      security:
        - ReleaseLockSession: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockId'
      responses:
        '200': { description: 'Canonical actions, decisions, and effect state for this lock' }
        '401': { description: 'Session invalid or expired' }
        '403': { description: 'Session is scoped to a different lock' }
        '404': { description: 'Release Lock not found' }

  /api/v1/release-locks/{lockId}/evidence:
    get:
      operationId: getReleaseLockEvidence
      tags: [Release Lock]
      summary: Export the organization-scoped portable evidence bundle
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockId'
      responses:
        '200': { description: 'Content-digested Release Lock transport bundle; authenticity comes from its signed components and pinned verification inputs' }
        '401': { description: 'Organization authentication required' }
        '404': { description: 'Release Lock not found in the authenticated organization' }

  /api/v1/release-locks/{lockId}/participant-evidence:
    get:
      operationId: getReleaseLockParticipantEvidence
      tags: [Release Lock]
      summary: Export the same portable bundle from a participant session
      security:
        - ReleaseLockSession: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockId'
      responses:
        '200': { description: 'Content-digested Release Lock transport bundle; authenticity comes from its signed components and pinned verification inputs' }
        '401': { description: 'Session invalid or expired' }
        '403': { description: 'Session is scoped to a different lock' }

  /api/v1/release-locks/{lockId}/registration/options:
    post:
      operationId: createReleaseLockRegistrationOptions
      tags: [Release Lock]
      summary: Begin role-scoped passkey enrollment
      description: Browser-only mutation requiring the dynamic Release Lock cookie and an exact same-origin Origin header.
      security:
        - ReleaseLockSession: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockId'
        - $ref: '#/components/parameters/ReleaseLockOrigin'
      responses:
        '201': { description: 'WebAuthn registration options bound to this lock, role, and contact' }
        '401': { description: 'Session invalid or expired' }
        '403': { description: 'Origin or session scope refused' }
        '409': { description: 'Credential already enrolled for this role' }

  /api/v1/release-locks/{lockId}/registration/verify:
    post:
      operationId: verifyReleaseLockRegistration
      tags: [Release Lock]
      summary: Verify and store one role-scoped passkey credential
      description: Browser-only mutation requiring the dynamic Release Lock cookie and an exact same-origin Origin header.
      security:
        - ReleaseLockSession: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockId'
        - $ref: '#/components/parameters/ReleaseLockOrigin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [challenge_id, attestation]
              properties:
                challenge_id: { type: string, format: uuid }
                attestation: { type: object, description: WebAuthn RegistrationResponseJSON }
      responses:
        '201': { description: 'Credential enrolled for the exact lock, role, and contact' }
        '400': { description: 'WebAuthn attestation refused' }
        '401': { description: 'Session invalid or expired' }
        '403': { description: 'Origin or session scope refused' }
        '409': { description: 'Challenge replayed or credential reused' }

  /api/v1/release-locks/{lockId}/rounds/{round}/action-check/options:
    post:
      operationId: createReleaseLockActionCheck
      tags: [Release Lock]
      summary: Begin a fresh exact-action approval check
      description: |
        Returns randomized material-field questions and WebAuthn authentication
        options committed to the exact lock version, role, round, action hash,
        expected-answer digest, nonce, and expiry. Requires an exact same-origin
        Origin header.
      security:
        - ReleaseLockSession: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockId'
        - $ref: '#/components/parameters/ReleaseLockRound'
        - $ref: '#/components/parameters/ReleaseLockOrigin'
      responses:
        '201': { description: 'Fresh Action Check and WebAuthn options' }
        '401': { description: 'Session invalid or expired' }
        '403': { description: 'Session role or round scope mismatch' }
        '409': { description: 'Round unavailable, complete, or already approved' }

  /api/v1/release-locks/{lockId}/rounds/{round}/approvals:
    post:
      operationId: approveReleaseLockRound
      tags: [Release Lock]
      summary: Record one exact, passkey-backed round approval
      description: Browser-only mutation requiring the dynamic Release Lock cookie and an exact same-origin Origin header.
      security:
        - ReleaseLockSession: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockId'
        - $ref: '#/components/parameters/ReleaseLockRound'
        - $ref: '#/components/parameters/ReleaseLockOrigin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [challenge_id, answers, assertion]
              properties:
                challenge_id: { type: string, format: uuid }
                answers:
                  type: array
                  items:
                    type: object
                    additionalProperties: false
                    required: [question_id, option_id]
                    properties:
                      question_id: { type: string }
                      option_id: { type: string }
                assertion: { type: object, description: WebAuthn AuthenticationResponseJSON }
      responses:
        '200': { description: 'Approval recorded; a complete draw round may reserve one effect' }
        '400': { description: 'Assertion or Action Check malformed' }
        '403': { description: 'Origin, session, credential, role, or round scope mismatch' }
        '409': { description: 'Binding mismatch, replay, or round already complete' }
        '422': { description: 'One or more exact-term answers are incorrect' }
        '503': { description: 'Custodian result unavailable or ambiguous' }

  /api/v1/release-locks/{lockId}/rounds/{round}/pairings:
    post:
      operationId: createReleaseLockRoundPairing
      tags: [Release Lock]
      summary: Create a one-time Action Mirror pairing for this participant round
      description: Browser-only mutation requiring the dynamic Release Lock cookie and an exact same-origin Origin header.
      security:
        - ReleaseLockSession: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockId'
        - $ref: '#/components/parameters/ReleaseLockRound'
        - $ref: '#/components/parameters/ReleaseLockOrigin'
      responses:
        '201': { description: 'Five-minute pairing capability scoped to one lock, role, and round' }
        '401': { description: 'Session invalid or expired' }
        '403': { description: 'Origin, session lock, or round scope mismatch' }
        '409': { description: 'Round unavailable or already complete' }

  /api/v1/release-locks/{lockId}/draw-release:
    post:
      operationId: stageReleaseLockDraw
      tags: [Release Lock]
      summary: Stage the exact post-milestone draw and custodian instruction
      description: Requires write permission and payee-bound lien-waiver evidence for every exact payee.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseLockDrawRequest'
      responses:
        '201': { description: 'DRAW_RELEASE staged for the accepted change-order version' }
        '401': { description: 'Organization authentication required' }
        '403': { description: 'Contractor entity or organization mismatch' }
        '409': { description: 'CO not accepted, version stale, or draw already staged' }
        '422': { description: 'Authoritative milestone evidence refused' }
        '503': { description: 'Evidence provider unavailable or ambiguous' }

  /api/v1/release-locks/{lockId}/amendments:
    post:
      operationId: amendReleaseLock
      tags: [Release Lock]
      summary: Replace the retained change order and invalidate both prior rounds
      description: Requires write permission. Any amendment revokes unexchanged pairings and resets both approval rounds.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReleaseLockId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseLockAmendRequest'
      responses:
        '201': { description: 'New immutable version created; both rounds reset' }
        '401': { description: 'Organization authentication required' }
        '403': { description: 'Contractor entity or organization mismatch' }
        '409': { description: 'Version stale, identical amendment, or effect already in progress' }
        '422': { description: 'Authoritative replacement document refused' }

  /api/internal/release-lock/reconcile:
    post:
      operationId: reconcileReleaseLockEffect
      tags: [Release Lock]
      summary: Reconcile an ambiguous custodian result
      description: Named full-operator endpoint; shared cron credentials and lower-privilege named roles are refused.
      security:
        - OperatorAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [effect_reference]
              properties:
                effect_reference: { type: string }
      responses:
        '200': { description: 'Authoritative custodian state recorded' }
        '401': { description: 'Named operator authentication required' }
        '403': { description: 'Named operator lacks release_lock.reconcile permission' }
        '409': { description: 'Effect is not ambiguous or provider binding mismatched' }
        '503': { description: 'Authoritative reconciliation unavailable' }
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: EP API key (ep_live_...)
    CloudBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ep_ or ept_ Cloud API key
      description: |
        Active tenant-bound Cloud API key supplied as
        `Authorization: Bearer <key>`. Connected approval operations require
        the named `approval_request` capability or `admin`.
    MobileSessionAuth:
      type: http
      scheme: bearer
      description: Time-bounded paired native session token (ep_mobile_...)
    CronAuth:
      type: http
      scheme: bearer
      description: CRON_SECRET for internal/operator endpoints
    OperatorAuth:
      type: http
      scheme: bearer
      description: Five-minute ep_op_ named-operator token
    ReleaseLockSession:
      type: apiKey
      in: header
      name: Cookie
      description: |
        Raw Cookie header containing exactly one dynamic
        `__Host-ep_release_lock_session_{lockId}=<token>` entry. Browsers receive
        it as HttpOnly, Secure, SameSite=Strict from invitation or pairing
        exchange. Non-browser clients must preserve the returned Set-Cookie;
        the session token is never returned in a JSON body.

  parameters:
    MobileActionReference:
      name: actionReference
      in: path
      required: true
      description: Tenant-scoped mobile action assignment reference
      schema:
        type: string
        pattern: '^[A-Za-z0-9:_.@-]{8,256}$'
    CloudApprovalReceiptId:
      name: receiptId
      in: path
      required: true
      description: Connected approval receipt ID
      schema:
        type: string
        pattern: '^tr_[a-f0-9]{32}$'
    ReleaseLockId:
      name: lockId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ReleaseLockId'
    ReleaseLockRound:
      name: round
      in: path
      required: true
      schema:
        type: string
        enum: [co-accepted, draw-release]
    ReleaseLockOrigin:
      name: Origin
      in: header
      required: true
      description: Exact API origin required for every cookie-authenticated or capability-exchange mutation
      schema:
        type: string
        format: uri

  schemas:
    CloudApprovalCreateRequest:
      type: object
      description: |
        Inputs for the single connected action. Callers do not choose an
        action type; the server always creates `large_payment_release`.
      x-emilia-fixed-action-type: large_payment_release
      x-emilia-caid-action-type: payment.release.1
      required:
        [amount, currency, counterparty_name, payment_destination_hash,
         payment_reference, approver_id]
      properties:
        amount:
          type: number
          format: double
          exclusiveMinimum: true
          minimum: 0
          maximum: 1000000000000
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: Three-letter uppercase ISO-style currency code
        counterparty_name:
          type: string
          minLength: 1
          maxLength: 160
          description: Printable counterparty display name
        payment_destination_hash:
          type: string
          pattern: '^sha256:[a-f0-9]{64}$'
          description: |
            SHA-256 digest of the normalized payment destination. This becomes
            the `beneficiary_account` material field in the server-computed
            `payment.release.1` CAID.
        payment_reference:
          type: string
          minLength: 3
          maxLength: 200
          pattern: '^(?!.*\.\.)[A-Za-z0-9][A-Za-z0-9:._/-]{2,199}$'
          description: Safe payment identifier; `..` is forbidden
        approver_id:
          type: string
          minLength: 3
          maxLength: 128
          pattern: '^[A-Za-z0-9:_.@-]{3,128}$'
          description: Named approver who will complete the Class-A review
        comment:
          type: string
          maxLength: 500

    CloudApprovalCreateResponse:
      type: object
      required:
        [receipt_id, action_hash, action_caid, expires_at, signoff_id, approver_id,
         required_assurance, status, review_path, implementation_status]
      properties:
        receipt_id:
          type: string
          pattern: '^tr_[a-f0-9]{32}$'
        action_hash:
          type: string
          pattern: '^[a-f0-9]{64}$'
        action_caid:
          type: string
          pattern: '^caid:1:payment\.release\.1:jcs-sha256:[A-Za-z0-9_-]{43}$'
          description: |
            Server-computed identifier for exact `payment.release.1` typed
            action content. CAID does not establish authorization.
        expires_at:
          type: string
          format: date-time
        signoff_id:
          type: string
          pattern: '^sig_[a-f0-9]{32}$'
        approver_id:
          type: string
        required_assurance:
          type: string
          enum: [A]
        status:
          type: string
          enum: [pending]
        review_path:
          type: string
          pattern: '^/signoff/sig_[a-f0-9]{32}$'
          description: WebAuthn/WYSIWYS Class-A review path
        implementation_status:
          type: string
          enum: [prototype]

    CloudApprovalRecord:
      type: object
      required:
        [receipt_id, action_caid, action_type, payment_destination_hash, status]
      properties:
        receipt_id:
          type: string
          pattern: '^tr_[a-f0-9]{32}$'
        action_hash:
          type: string
          nullable: true
        action_caid:
          type: string
          pattern: '^caid:1:payment\.release\.1:jcs-sha256:[A-Za-z0-9_-]{43}$'
          description: |
            Server-computed typed-content identifier; not an authorization
            decision or proof.
        action_type:
          type: string
          enum: [large_payment_release]
        amount:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        counterparty_name:
          type: string
          nullable: true
        payment_destination_hash:
          type: string
          pattern: '^sha256:[a-f0-9]{64}$'
          description: SHA-256 digest of the normalized payment destination
        target_resource_id:
          type: string
          nullable: true
          description: The submitted payment_reference
        created_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected, expired, consumed]
        signoff_id:
          type: string
          nullable: true
        approver_id:
          type: string
          nullable: true
        review_path:
          type: string
          nullable: true
        consumed_at:
          type: string
          format: date-time
          nullable: true

    CloudApprovalQueueResponse:
      type: object
      required: [tenant_id, approvals, summary, implementation_status]
      properties:
        tenant_id:
          type: string
        approvals:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/CloudApprovalRecord'
        summary:
          type: object
          required: [pending, approved, rejected, expired, consumed]
          properties:
            pending: { type: integer, minimum: 0 }
            approved: { type: integer, minimum: 0 }
            rejected: { type: integer, minimum: 0 }
            expired: { type: integer, minimum: 0 }
            consumed: { type: integer, minimum: 0 }
        implementation_status:
          type: string
          enum: [prototype]

    CloudApprovalConsumeRequest:
      type: object
      description: |
        The exact action hash returned at creation. The server supplies the
        fixed executing_system and does not accept a caller-selected executor
        identity.
      required: [action_hash]
      properties:
        action_hash:
          type: string
          pattern: '^[a-f0-9]{64}$'

    CloudApprovalConsumeResponse:
      type: object
      required: [receipt_id, status, consumed_at, consumed_by_system]
      properties:
        receipt_id:
          type: string
          pattern: '^tr_[a-f0-9]{32}$'
        status:
          type: string
          enum: [consumed]
        consumed_at:
          type: string
          format: date-time
        consumed_by_system:
          type: string
          enum: [emilia_cloud_approval_endpoint]
        execution_reference_id:
          type: string
          nullable: true

    CloudApprovalEvidence:
      type: object
      description: |
        JSON projection delegated to the trust-receipt evidence route. Signed
        receipt fields are present only when that route can honestly mint them.
      required:
        [receipt_id, organization_id, actor, action, policy, signoff, consume,
         replay_attempts, timeline, signed, verify_with, issued_at, expires_at,
         format, schema_version]
      properties:
        document:
          type: object
          nullable: true
          description: |
            Signed EP receipt when available. For connected payment approvals,
            `payload.claim.canonical_action.action_caid` is the server-computed
            `payment.release.1` typed-content identifier; it does not establish
            authorization.
        public_key:
          type: string
          nullable: true
        signed:
          type: boolean
        verify_with:
          type: string
          enum: ['@emilia-protocol/verify']
        receipt_id:
          type: string
          pattern: '^tr_[a-f0-9]{32}$'
        organization_id:
          type: string
        actor:
          type: object
        action:
          type: object
          required: [type, action_hash]
          properties:
            type:
              type: string
              enum: [large_payment_release]
            action_hash:
              type: string
        policy:
          type: object
        signoff:
          type: object
        consume:
          type: object
        replay_attempts:
          type: integer
          minimum: 0
        timeline:
          type: array
          items:
            type: object
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        format:
          type: string
          enum: [application/json]
        schema_version:
          type: string
          enum: [ep-guard-evidence-v1]

    ReleaseLockId:
      type: string
      pattern: '^rlk_[a-f0-9]{32}$'

    ReleaseLockRole:
      type: string
      enum: [contractor, customer]

    ReleaseLockRound:
      type: string
      enum: [CO_ACCEPTED, DRAW_RELEASE]

    ReleaseLockCreateRequest:
      type: object
      additionalProperties: false
      required:
        [change_order, lock_expires_at, invitation_expires_at, contractor_party, customer_party]
      properties:
        organization_id: { type: string }
        change_order:
          $ref: '#/components/schemas/ReleaseLockChangeOrder'
        lock_expires_at: { type: string, format: date-time }
        invitation_expires_at: { type: string, format: date-time }
        contractor_party:
          $ref: '#/components/schemas/ReleaseLockParty'
        customer_party:
          $ref: '#/components/schemas/ReleaseLockParty'

    ReleaseLockParty:
      type: object
      additionalProperties: false
      required: [party_id, display_name, contact, authority]
      properties:
        party_id: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9:_.@/-]{2,255}$' }
        display_name: { type: string, minLength: 1, maxLength: 200 }
        contact:
          $ref: '#/components/schemas/ReleaseLockVerifiedContact'
        authority:
          $ref: '#/components/schemas/ReleaseLockAuthority'

    ReleaseLockVerifiedContact:
      type: object
      additionalProperties: false
      required: [channel, identifier, verification]
      properties:
        channel: { type: string, enum: [email, sms] }
        identifier: { type: string, writeOnly: true }
        verification:
          $ref: '#/components/schemas/ReleaseLockVerificationProof'

    ReleaseLockAuthority:
      type: object
      additionalProperties: false
      description: |
        Portable provider-signed role authority. Verification uses a
        relying-party-pinned Ed25519 provider key. The provider remains
        responsible for civil-identity proofing, subject uniqueness, and its
        asserted binding between the subject and verified contact digest.
      required: [assertion, signature]
      properties:
        assertion:
          type: object
          additionalProperties: false
          required:
            ['@version', algorithm, provider, key_id, reference, role, party_id,
             subject_digest, contact_binding_digest, verified_at, expires_at]
          properties:
            '@version':
              type: string
              enum: [EP-RELEASE-LOCK-AUTHORITY-ASSERTION-v1]
            algorithm: { type: string, enum: [Ed25519] }
            provider: { type: string, pattern: '^[a-z0-9][a-z0-9._-]{1,127}$' }
            key_id: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9:_.@/-]{2,255}$' }
            reference: { type: string, minLength: 1, maxLength: 512 }
            role: { $ref: '#/components/schemas/ReleaseLockRole' }
            party_id: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9:_.@/-]{2,255}$' }
            subject_digest: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
            contact_binding_digest: { type: string, pattern: '^hmac-sha256:[0-9a-f]{64}$' }
            verified_at: { type: string, format: date-time }
            expires_at: { type: string, format: date-time }
        signature:
          type: string
          pattern: '^[A-Za-z0-9_-]{86}$'
          description: Ed25519 signature over the domain-separated RFC 8785 assertion bytes

    ReleaseLockVerificationProof:
      type: object
      additionalProperties: false
      required: [provider, reference, verified_at, expires_at, proof]
      properties:
        provider: { type: string, pattern: '^[a-z0-9][a-z0-9._-]{1,127}$' }
        reference: { type: string, minLength: 1, maxLength: 512 }
        verified_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        proof: { type: string, pattern: '^hmac-sha256:[0-9a-f]{64}$', writeOnly: true }

    ReleaseLockProviderDocument:
      type: object
      additionalProperties: false
      required: [provider, reference, verification]
      properties:
        provider: { type: string, pattern: '^[a-z0-9][a-z0-9._-]{1,127}$' }
        reference: { type: string, minLength: 1, maxLength: 512 }
        verification:
          type: object
          description: Provider-specific verification object; credentials and tokens are forbidden

    ReleaseLockChangeOrder:
      type: object
      additionalProperties: false
      required: [document, scope, price_delta, currency, progress_schedule_effect, expires_at]
      properties:
        document:
          $ref: '#/components/schemas/ReleaseLockProviderDocument'
        scope: { type: object, minProperties: 1 }
        price_delta: { type: string, pattern: '^-?(?:0|[1-9][0-9]{0,11})\.[0-9]{2}$' }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        progress_schedule_effect: { type: object, minProperties: 1 }
        expires_at: { type: string, format: date-time }

    ReleaseLockDrawRequest:
      type: object
      additionalProperties: false
      required: [expected_version, draw]
      properties:
        organization_id: { type: string }
        expected_version: { type: integer, minimum: 1 }
        draw:
          $ref: '#/components/schemas/ReleaseLockDraw'

    ReleaseLockDraw:
      type: object
      additionalProperties: false
      required:
        [draw_id, amount, currency, payees, milestone, completion_evidence, lien_waivers, draw_documents, custodian, expires_at]
      properties:
        draw_id: { type: string, minLength: 1, maxLength: 256 }
        amount: { type: string, pattern: '^(?:0|[1-9][0-9]{0,11})\.[0-9]{2}$' }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        payees:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/ReleaseLockPayee'
        milestone:
          type: object
          additionalProperties: false
          required: [id, label]
          properties:
            id: { type: string }
            label: { type: string }
        completion_evidence:
          $ref: '#/components/schemas/ReleaseLockProviderDocument'
        lien_waivers:
          type: array
          minItems: 1
          maxItems: 40
          description: Must cover every exact payee; provider references cannot be reused across evidence categories.
          items:
            $ref: '#/components/schemas/ReleaseLockLienWaiver'
        draw_documents:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/ReleaseLockProviderDocument'
        custodian:
          $ref: '#/components/schemas/ReleaseLockCustodian'
        expires_at: { type: string, format: date-time }

    ReleaseLockPayee:
      type: object
      additionalProperties: false
      required: [party_id, destination_id, amount]
      properties:
        party_id: { type: string }
        destination_id: { type: string }
        amount: { type: string, pattern: '^(?:0|[1-9][0-9]{0,11})\.[0-9]{2}$' }

    ReleaseLockLienWaiver:
      type: object
      additionalProperties: false
      required: [payee_party_id, document]
      properties:
        payee_party_id: { type: string }
        document:
          $ref: '#/components/schemas/ReleaseLockProviderDocument'

    ReleaseLockCustodian:
      type: object
      additionalProperties: false
      required: [provider, environment, transaction_id, milestone_id, instruction]
      properties:
        provider: { type: string, pattern: '^[a-z0-9][a-z0-9._-]{1,127}$' }
        environment: { type: string, enum: [sandbox, production] }
        transaction_id: { type: string }
        milestone_id: { type: string }
        instruction: { type: string, enum: [release_milestone] }

    ReleaseLockAmendRequest:
      type: object
      additionalProperties: false
      required:
        [expected_version, change_order, lock_expires_at, contractor_party, customer_party]
      properties:
        organization_id: { type: string }
        expected_version: { type: integer, minimum: 1 }
        change_order:
          $ref: '#/components/schemas/ReleaseLockChangeOrder'
        lock_expires_at: { type: string, format: date-time }
        contractor_party:
          $ref: '#/components/schemas/ReleaseLockParty'
        customer_party:
          $ref: '#/components/schemas/ReleaseLockParty'

    MobilePairing:
      type: object
      required: [pairing_code, profile_id, expires_at, enabled_platforms]
      properties:
        pairing_code: { type: string }
        profile_id: { type: string }
        expires_at: { type: string, format: date-time }
        enabled_platforms:
          type: array
          items: { type: string, enum: [ios, android] }

    MobileSession:
      type: object
      required: [access_token, token_type, expires_at, approver_id, profile_id]
      properties:
        access_token: { type: string, readOnly: true }
        token_type: { type: string, enum: [Bearer] }
        expires_at: { type: string, format: date-time }
        approver_id: { type: string }
        profile_id: { type: string }

    MobileInboxAction:
      type: object
      additionalProperties: false
      required:
        - action_reference
        - title
        - summary
        - risk
        - material_fields
        - expires_at
        - created_at
        - status
        - revision
        - identity
        - supersedes_action_caid
        - changes
        - continuity
        - quorum
        - alignments
        - events
        - can_withdraw
      properties:
        action_reference:
          type: string
          pattern: '^[A-Za-z0-9:_.@-]{8,256}$'
        title: { type: string }
        summary: { type: string }
        risk: { type: string }
        material_fields:
          type: object
          additionalProperties: { type: string }
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        status:
          type: string
          enum: [pending, approved, denied, withdrawn, expired, cancelled]
        revision:
          type: integer
          minimum: 1
          nullable: true
        identity:
          type: object
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MobileActionIdentity'
        supersedes_action_caid:
          type: string
          nullable: true
          pattern: '^caid:1:emilia\.mobile\.authorized-action\.1:jcs-sha256:[A-Za-z0-9_-]{43}$'
        changes:
          type: array
          items:
            $ref: '#/components/schemas/MobileActionChange'
        continuity:
          type: object
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MobileActionContinuity'
        quorum:
          type: object
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MobileQuorum'
        alignments:
          type: array
          items:
            $ref: '#/components/schemas/MobileActionAlignment'
        events:
          type: array
          items:
            $ref: '#/components/schemas/MobileActionEvent'
        passport:
          type: object
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MobileDecisionPassport'
          description: Present on history responses and omitted from inbox responses.
        can_withdraw: { type: boolean }

    MobileHistoryAction:
      allOf:
        - $ref: '#/components/schemas/MobileInboxAction'
        - type: object
          required: [passport]
          properties:
            passport:
              type: object
              nullable: true
              allOf:
                - $ref: '#/components/schemas/MobileDecisionPassport'

    MobileActionIdentity:
      type: object
      additionalProperties: false
      required: [action_caid, action_digest, fingerprint]
      properties:
        action_caid:
          type: string
          pattern: '^caid:1:emilia\.mobile\.authorized-action\.1:jcs-sha256:[A-Za-z0-9_-]{43}$'
          description: Server-computed CAID for the authoritative exact-action wrapper.
        action_digest:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        fingerprint:
          type: string
          pattern: '^[0-9A-F]{4}(?:-[0-9A-F]{4}){3}$'
          description: Display aid derived from the CAID; never an authorization token.

    MobileActionChange:
      type: object
      additionalProperties: false
      required: [field, change, before, after]
      properties:
        field: { type: string }
        change: { type: string, enum: [added, changed, removed] }
        before: { type: string, nullable: true }
        after: { type: string, nullable: true }

    MobileQuorum:
      type: object
      additionalProperties: false
      required: [approved, required, denied, withdrawn]
      properties:
        approved: { type: integer, minimum: 0 }
        required: { type: integer, minimum: 1 }
        denied: { type: integer, minimum: 0 }
        withdrawn: { type: integer, minimum: 0 }

    MobileActionContinuity:
      type: object
      additionalProperties: false
      required: [state, retry_safe, quorum]
      properties:
        state:
          type: string
          enum:
            - AWAITING_DECISION
            - QUORUM_PENDING
            - AUTHORIZED
            - DENIED
            - WITHDRAWN
            - CONSUMED
            - INDETERMINATE
            - EXECUTED
            - REFUSED
            - EXPIRED
            - CANCELLED
        retry_safe:
          type: boolean
          description: |
            False after consumption. INDETERMINATE specifically forbids blind
            replay while the original provider outcome is unresolved.
        quorum:
          $ref: '#/components/schemas/MobileQuorum'

    MobileActionAlignment:
      type: object
      additionalProperties: false
      required: [system, verdict, profile_id, profile_hash, native_verified, reason]
      properties:
        system: { type: string, maxLength: 128 }
        verdict:
          type: string
          enum: [EQUIVALENT_UNDER_PROFILE, NOT_EQUIVALENT, INDETERMINATE]
        profile_id: { type: string, maxLength: 256, nullable: true }
        profile_hash:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
          nullable: true
        native_verified: { type: boolean }
        reason: { type: string, maxLength: 256, nullable: true }

    MobileActionEvent:
      type: object
      additionalProperties: false
      required: [event_id, type, details, evidence_digest, created_at]
      properties:
        event_id: { type: string }
        type: { type: string }
        details:
          type: object
          additionalProperties: true
        evidence_digest:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
          nullable: true
        created_at: { type: string, format: date-time }

    MobileDecisionPassport:
      type: object
      additionalProperties: false
      description: |
        Bounded portable summary. It contains evidence digests and lifecycle
        bindings, never raw WebAuthn assertions or provider evidence.
      required: ['@version', action, decision, lifecycle, created_at, passport_digest]
      properties:
        '@version': { type: string, enum: [EP-MOBILE-DECISION-PASSPORT-v1] }
        action:
          type: object
          additionalProperties: false
          required: [action_reference, action_caid, action_digest]
          properties:
            action_reference: { type: string }
            action_caid:
              type: string
              pattern: '^caid:1:emilia\.mobile\.authorized-action\.1:jcs-sha256:[A-Za-z0-9_-]{43}$'
            action_digest: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        decision:
          type: object
          additionalProperties: false
          required: [challenge_id, verdict, decided_at, evidence_digest]
          properties:
            challenge_id: { type: string, nullable: true }
            verdict: { type: string, nullable: true }
            decided_at: { type: string, format: date-time, nullable: true }
            evidence_digest:
              type: string
              pattern: '^sha256:[0-9a-f]{64}$'
              nullable: true
        lifecycle:
          type: object
          additionalProperties: false
          required: [state, retry_safe, quorum, consumption_nonce, outcome_digest]
          properties:
            state:
              type: string
              enum:
                - AWAITING_DECISION
                - QUORUM_PENDING
                - AUTHORIZED
                - DENIED
                - WITHDRAWN
                - CONSUMED
                - INDETERMINATE
                - EXECUTED
                - REFUSED
                - EXPIRED
                - CANCELLED
            retry_safe: { type: boolean }
            quorum:
              type: object
              nullable: true
              allOf:
                - $ref: '#/components/schemas/MobileQuorum'
            consumption_nonce: { type: string, nullable: true }
            outcome_digest:
              type: string
              pattern: '^sha256:[0-9a-f]{64}$'
              nullable: true
        created_at: { type: string, format: date-time, nullable: true }
        passport_digest: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }

    MobileAuthorizationContext:
      type: object
      additionalProperties: false
      required:
        - ep_version
        - context_type
        - action_reference
        - action_caid
        - action_digest
        - action_hash
        - policy_id
        - policy_hash
        - initiator
        - approver
        - approver_index
        - required_approvals
        - nonce
        - issued_at
        - expires_at
        - decision
        - display_hash
        - mobile_binding
      properties:
        ep_version: { type: string, enum: ['1.0'] }
        context_type: { type: string, enum: [ep.signoff.v1] }
        action_reference:
          type: string
          pattern: '^[A-Za-z0-9:_.@-]{3,256}$'
        action_caid:
          type: string
          pattern: '^caid:1:emilia\.mobile\.authorized-action\.1:jcs-sha256:[A-Za-z0-9_-]{43}$'
        action_digest: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        action_hash: { type: string, pattern: '^(?:sha256:)?[0-9a-f]{64}$' }
        policy_id: { type: string, nullable: true }
        policy_hash:
          type: string
          pattern: '^(?:sha256:)?[0-9a-f]{64}$'
          nullable: true
        initiator: { type: string }
        approver: { type: string }
        approver_index: { type: integer, minimum: 1, maximum: 1024 }
        required_approvals: { type: integer, minimum: 1, maximum: 1024 }
        nonce: { type: string }
        issued_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        decision: { type: string, enum: [approved, denied] }
        display_hash: { type: string, pattern: '^(?:sha256:)?[0-9a-f]{64}$' }
        mobile_binding:
          type: object
          additionalProperties: false
          required:
            - profile
            - profile_hash
            - platform
            - app_id
            - device_key_id
            - credential_id
            - attestation_key_id
          properties:
            profile: { type: string, enum: [EP-MOBILE-CHALLENGE-v2] }
            profile_hash: { type: string, pattern: '^(?:sha256:)?[0-9a-f]{64}$' }
            platform: { type: string, enum: [ios, android] }
            app_id: { type: string }
            device_key_id: { type: string }
            credential_id: { type: string }
            attestation_key_id: { type: string }

    MobileChallenge:
      type: object
      additionalProperties: false
      required:
        - '@version'
        - challenge_profile
        - challenge_id
        - nonce
        - action
        - action_hash
        - profile_hash
        - authorization_context
        - webauthn
        - presentation
        - issued_at
        - expires_at
        - attestation
      properties:
        '@version': { type: string, enum: [AE-CHALLENGE-v1] }
        challenge_profile: { type: string, enum: [EP-MOBILE-CHALLENGE-v2] }
        challenge_id: { type: string }
        nonce: { type: string }
        action:
          type: object
          additionalProperties: true
        action_hash: { type: string, pattern: '^(?:sha256:)?[0-9a-f]{64}$' }
        profile_hash: { type: string, pattern: '^(?:sha256:)?[0-9a-f]{64}$' }
        authorization_context:
          $ref: '#/components/schemas/MobileAuthorizationContext'
        webauthn:
          type: object
          additionalProperties: false
          required: [rp_id, challenge, credential_ids, user_verification, timeout_ms]
          properties:
            rp_id: { type: string }
            challenge: { type: string }
            credential_ids:
              type: array
              items: { type: string }
            user_verification: { type: string, enum: [required] }
            timeout_ms: { type: integer, minimum: 1 }
        presentation:
          $ref: '#/components/schemas/MobileReviewPresentation'
        issued_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        attestation:
          type: object
          additionalProperties: false
          required: [required, format, binding, request_hash]
          properties:
            required: { type: boolean }
            format: { type: string, enum: [apple-app-attest, play-integrity-standard] }
            binding:
              type: object
              additionalProperties: true
            request_hash: { type: string, pattern: '^(?:sha256:)?[0-9a-f]{64}$' }

    MobileConsumption:
      type: object
      additionalProperties: false
      required:
        [ok, operation_id, action_caid, consumption_nonce, executor_id, executor_key_id, state]
      properties:
        ok: { type: boolean, enum: [true] }
        operation_id: { type: string }
        action_caid:
          type: string
          pattern: '^caid:1:emilia\.mobile\.authorized-action\.1:jcs-sha256:[A-Za-z0-9_-]{43}$'
        consumption_nonce: { type: string }
        executor_id: { type: string }
        executor_key_id:
          type: string
          pattern: '^ep:executor-key:sha256:[0-9a-f]{64}$'
        state: { type: string, enum: [consumed] }

    MobileIndeterminateOutcomeRequest:
      type: object
      additionalProperties: false
      required: [operation_id, state]
      properties:
        operation_id:
          type: string
          pattern: '^[A-Za-z0-9:_.@/-]{8,256}$'
        state: { type: string, enum: [indeterminate] }

    MobileProviderOutcome:
      type: object
      additionalProperties: false
      required:
        - '@version'
        - operation_id
        - action_caid
        - action_digest
        - consumption_nonce
        - executor_id
        - outcome
        - observed_at
        - provider_reference
        - proof
      properties:
        '@version': { type: string, enum: [EP-MOBILE-PROVIDER-OUTCOME-v1] }
        operation_id: { type: string }
        action_caid:
          type: string
          pattern: '^caid:1:emilia\.mobile\.authorized-action\.1:jcs-sha256:[A-Za-z0-9_-]{43}$'
        action_digest: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        consumption_nonce: { type: string }
        executor_id: { type: string }
        outcome: { type: string, enum: [executed, refused] }
        observed_at: { type: string, format: date-time }
        provider_reference: { type: string }
        proof:
          type: object
          additionalProperties: false
          required: [algorithm, key_id, public_key, signature_b64u]
          properties:
            algorithm: { type: string, enum: [Ed25519] }
            key_id:
              type: string
              pattern: '^ep:executor-key:sha256:[0-9a-f]{64}$'
            public_key:
              type: string
              pattern: '^[A-Za-z0-9_-]+$'
              description: Base64url DER SPKI Ed25519 public key; it must match the tenant pin.
            signature_b64u:
              type: string
              pattern: '^[A-Za-z0-9_-]+$'

    MobileReconcileOutcomeRequest:
      type: object
      additionalProperties: false
      required: [operation_id, state, evidence]
      properties:
        operation_id:
          type: string
          pattern: '^[A-Za-z0-9:_.@/-]{8,256}$'
        state: { type: string, enum: [reconcile] }
        evidence:
          $ref: '#/components/schemas/MobileProviderOutcome'

    MobileOutcomeTransition:
      type: object
      additionalProperties: false
      required: [ok, state, retry_safe]
      properties:
        ok: { type: boolean, enum: [true] }
        state: { type: string, enum: [indeterminate, executed, refused] }
        retry_safe: { type: boolean, enum: [false] }

    MobileSupersessionRequest:
      type: object
      additionalProperties: false
      required: [assignments, initiator_id, action, presentation, policy, policy_id, expires_at]
      properties:
        assignments:
          type: array
          minItems: 1
          maxItems: 16
          items:
            type: object
            additionalProperties: false
            required: [action_reference, approver_id]
            properties:
              action_reference:
                type: string
                pattern: '^mobact_[0-9a-f]{32}$'
              approver_id:
                type: string
                pattern: '^[A-Za-z0-9:_.@-]{3,128}$'
        initiator_id: { type: string }
        action:
          type: object
          additionalProperties: true
        presentation:
          $ref: '#/components/schemas/MobileReviewPresentation'
        policy:
          type: object
          additionalProperties: true
        policy_id: { type: string }
        expires_at: { type: string, format: date-time }

    MobileSupersessionResult:
      type: object
      additionalProperties: false
      required: [superseded, group_id, revision, identity, changes]
      properties:
        superseded: { type: boolean, enum: [true] }
        group_id:
          type: string
          pattern: '^mag_[0-9a-f]{32}$'
        revision: { type: integer, minimum: 2 }
        identity:
          $ref: '#/components/schemas/MobileActionIdentity'
        changes:
          type: array
          items:
            $ref: '#/components/schemas/MobileActionChange'

    MobileAlignmentRequest:
      type: object
      additionalProperties: false
      required: [system, verdict]
      properties:
        system: { type: string, minLength: 1, maxLength: 128 }
        verdict:
          type: string
          enum: [EQUIVALENT_UNDER_PROFILE, NOT_EQUIVALENT, INDETERMINATE]
        profile_id: { type: string, maxLength: 256 }
        profile_hash: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        native_verified: { type: boolean }
        evidence_digest: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        reason: { type: string, maxLength: 256 }

    MobileExecutorKeyRegistration:
      type: object
      additionalProperties: false
      required: [executor_id, key_id, public_key]
      properties:
        executor_id: { type: string, minLength: 3, maxLength: 256 }
        key_id:
          type: string
          pattern: '^ep:executor-key:sha256:[0-9a-f]{64}$'
        public_key:
          type: string
          pattern: '^[A-Za-z0-9_-]+$'
          description: Base64url DER SPKI Ed25519 public key.

    MobileReviewPresentation:
      type: object
      additionalProperties: false
      required: ['@version', title, summary, risk, consequence, material_fields]
      properties:
        '@version': { type: string, enum: [EP-MOBILE-PRESENTATION-v1] }
        title: { type: string }
        summary: { type: string }
        risk: { type: string }
        consequence: { type: string }
        material_fields:
          type: object
          additionalProperties: { type: string }

    MobilePresentation:
      type: object
      additionalProperties: false
      required: [challenge, response]
      properties:
        challenge:
          allOf:
            - $ref: '#/components/schemas/MobileChallenge'
          description: Server-issued challenge returned without mutation.
        response:
          type: object
          description: Passkey and platform-attestation response bound to the challenge

    MobileProtocolResult:
      type: object
      description: Closed mobile protocol result. Unknown or unavailable state refuses.
      required: [ok, verdict]
      properties:
        ok: { type: boolean }
        valid: { type: boolean }
        verdict:
          type: string
          pattern: '^(issued|accepted|refuse_[a-z0-9_]+)$'
        reason: { type: string }
        challenge:
          type: object
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MobileChallenge'
        decision: { type: string, nullable: true }
        audit_record: { type: object, nullable: true }

    MobileCeremonyLookup:
      type: object
      additionalProperties: false
      required: [committed, outcome, result]
      properties:
        committed: { type: boolean }
        outcome: { type: string, enum: [committed, unknown] }
        result:
          type: object
          nullable: true
          additionalProperties: false
          required: [valid, verdict, decision, reason, context_hash]
          properties:
            valid: { type: boolean, enum: [true] }
            verdict: { type: string, enum: [verified] }
            decision: { type: string, enum: [approved, denied] }
            reason: { type: string, nullable: true }
            context_hash: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }

    TrustProfileResponse:
      type: object
      properties:
        entity_id:
          type: string
        display_name:
          type: string
        trust_profile:
          type: object
          properties:
            behavioral:
              type: object
              properties:
                score:
                  type: number
                completion_rate:
                  type: number
                dispute_rate:
                  type: number
            signals:
              type: object
            consistency:
              type: number
            provenance:
              type: object
        current_confidence:
          type: string
          enum: [pending, insufficient, provisional, emerging, confident]
        effective_evidence_current:
          type: number
        quality_gated_evidence_current:
          type: number
        historical_establishment:
          type: boolean

    PolicyEvaluationResponse:
      type: object
      deprecated: true
      description: |
        DEPRECATED — Use TrustDecision instead. This legacy schema is retained
        for backward compatibility only. It wraps the canonical TrustDecision
        and adds derived decision fields for legacy consumers.
      allOf:
        - $ref: '#/components/schemas/TrustDecision'
        - type: object
          properties:
            pass:
              type: boolean
              deprecated: true
              description: "DEPRECATED — Derived from TrustDecision.decision (decision === 'allow'). Use decision field instead."
            score:
              type: number
              deprecated: true
              description: "DEPRECATED — Legacy numeric score. Use TrustDecision.confidence and reasons for evaluation."
            failures:
              type: array
              deprecated: true
              description: "DEPRECATED — Use TrustDecision.reasons instead."
              items:
                type: string

    ReceiptSubmission:
      type: object
      required: [entity_id, transaction_ref]
      properties:
        entity_id:
          type: string
        transaction_ref:
          type: string
        transaction_type:
          type: string
        agent_behavior:
          type: string
          enum: [completed, retried, abandoned, disputed]
        delivery_accuracy:
          type: number
        product_accuracy:
          type: number
        price_integrity:
          type: number
        evidence:
          type: object

    GovGuardPrecheckRequest:
      type: object
      required: [organization_id]
      properties:
        organization_id:
          type: string
          description: Authenticated tenant/organization. In bound mode this must match the API key's organization.
        enforcement_mode:
          type: string
          enum: [observe, warn, enforce]
          default: observe
          description: Observe records evidence; enforce fails closed before mutation when approval or evidence is missing.
        mode:
          type: string
          enum: [observe, warn, enforce]
          deprecated: true
          description: Backward-compatible alias for enforcement_mode.
        strict_evidence:
          type: boolean
          default: false
          description: When true, evidence/audit write failure returns 503 instead of degraded observe evidence.
        target_changed_fields:
          type: array
          items:
            type: string
          description: System-of-record fields the caller is about to mutate.
        changed_fields:
          type: array
          items:
            type: string
          deprecated: true
          description: Backward-compatible alias for target_changed_fields.
        amount:
          type: number
          description: Monetary amount for disbursement or grant release workflows.
        currency:
          type: string
          default: USD
        vendor_id:
          type: string
        recipient_id:
          type: string
        payment_instruction_id:
          type: string
        agency_id:
          type: string
        program_id:
          type: string
        grant_id:
          type: string
        award_id:
          type: string
        provider_id:
          type: string
        provider_tax_id_hash:
          type: string
        provider_status:
          type: string
        npi:
          type: string
        case_id:
          type: string
        claimant_id:
          type: string
        eligibility_case_id:
          type: string
        eligibility_rule:
          type: string
        eligibility_status:
          type: string
        benefit_amount:
          type: number
        destination_hash:
          type: string
          description: Hash or opaque digest of the proposed destination/account data.
        payment_destination_hash:
          type: string
        bank_account_hash:
          type: string
        routing_number_hash:
          type: string
        address_hash:
          type: string
        mailing_address_hash:
          type: string
        phone_hash:
          type: string
        email_hash:
          type: string
        contact_method:
          type: string
        identity_document_hash:
          type: string
        identity_status:
          type: string
        external_reference:
          type: string
        metadata:
          type: object

    GovGuardPrecheckResponse:
      type: object
      properties:
        receipt_id:
          type: string
        receipt_status:
          type: string
          enum: [not_required, pending_signoff, issued, consumed]
        signoff_required:
          type: boolean
        signoff_tier:
          type: string
          enum: [single, dual]
          nullable: true
        required_assurance:
          type: string
          enum: [A]
          nullable: true
          description: GovGuard high-risk workflows require Class-A approval.
        evidence_status:
          type: string
          enum: [durable, degraded]
          description: Whether the receipt/audit evidence was durably recorded.
        decision:
          type: object
          properties:
            allow:
              type: boolean
            mode:
              type: string
              enum: [observe, enforce]
            reasons:
              type: array
              items:
                type: string
        canonical_action:
          type: object
          description: Canonical action bound into the receipt, including action_hash inputs.
        policy_id:
          type: string
        policy_hash:
          type: string
        execution_binding_hash:
          type: string

    StatsResponse:
      type: object
      properties:
        total_entities:
          type: integer
        trust_surfaces:
          type: integer
        automated_checks:
          type: integer
        trust_policies:
          type: integer
        mcp_tools:
          type: integer

    TrustDecision:
      type: object
      description: Canonical Trust Decision — EP's primary output object. Every decision surface returns this shape.
      required: [decision, entity_id, policy_used, confidence, reasons, appeal_path]
      properties:
        decision:
          type: string
          enum: [allow, review, deny]
        entity_id:
          type: string
        policy_used:
          type: string
        confidence:
          type: string
          enum: [confident, emerging, provisional, insufficient, pending, unknown]
        reasons:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        appeal_path:
          type: string
          description: URL path for disputes/appeals
        context_used:
          type: object
          nullable: true
        profile_summary:
          type: object
          nullable: true
          properties:
            confidence:
              type: string
