    CommitObject:
      type: object
      description: |
        EP Commit — a signed pre-action authorization token. Proves that a
        machine action was evaluated under policy before the action proceeded.
      properties:
        commit_id:
          type: string
          description: Unique commit identifier (starts with epc_)
        entity_id:
          type: string
        kid:
          type: string
          description: Key ID identifying which signing key produced the signature (e.g., ep-signing-key-1)
        principal_id:
          type: string
        counterparty_entity_id:
          type: string
        delegation_id:
          type: string
        action_type:
          type: string
          enum: [install, connect, delegate, transact]
        decision:
          type: string
          enum: [allow, review, deny]
        scope:
          type: object
        max_value_usd:
          type: number
        context:
          type: object
        policy_snapshot:
          type: object
          description: Snapshot of the policy evaluation at time of issuance
        nonce:
          type: string
        signature:
          type: string
          description: Ed25519 signature over the canonical payload
        public_key:
          type: string
          description: Base64-encoded Ed25519 public key
        status:
          type: string
          enum: [active, fulfilled, revoked, expired]
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    CommitVerifyResponse:
      type: object
      description: |
        Commit verification verdict. Minimum disclosure: returns validity
        and status only. MUST NOT expose scope, entity_id, action_type,
        or other commit details per PROTOCOL-STANDARD Section 18.4.
      properties:
        valid:
          type: boolean
        status:
          type: string
          enum: [active, fulfilled, revoked, expired, not_found]
        decision:
          type: string
          enum: [allow, review, deny]
        expires_at:
          type: string
          format: date-time
        reasons:
          type: array
          items:
            type: string
          description: Human-readable reasons (empty array when valid)

    CommitKeySet:
      type: object
      description: |
        JWKS-style signing key set for EP Commit signature verification.
        Returned by GET /api/commit/keys.
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kid:
                type: string
                description: Key identifier (e.g., ep-signing-key-1)
              algorithm:
                type: string
                enum: [Ed25519]
              public_key_base64:
                type: string
                description: Base64-encoded 32-byte Ed25519 public key
              status:
                type: string
                enum: [active, rotated, revoked]
              created_at:
                type: string
                format: date-time
        rotation_policy:
          type: object
          properties:
            rotation_interval_days:
              type: integer
            overlap_period_days:
              type: integer
            revocation_mechanism:
              type: string

    HandshakeResponse:
      type: object
      description: EP Handshake state including parties, presentations, binding, and result.
      properties:
        handshake_id:
          type: string
        mode:
          type: string
        policy_id:
          type: string
        status:
          type: string
          enum: [pending, active, accepted, rejected, revoked]
        parties:
          type: array
          items:
            type: object
            properties:
              entity_ref:
                type: string
              role:
                type: string
              presented:
                type: boolean
        presentations:
          type: array
          items:
            $ref: '#/components/schemas/HandshakePresentationResponse'
        binding:
          type: object
        result:
          type: object
          properties:
            outcome:
              type: string
              enum: [accepted, rejected, partial]
            reason_codes:
              type: array
              items:
                type: string
            evaluated_at:
              type: string
              format: date-time
        interaction_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    HandshakePresentationResponse:
      type: object
      description: An identity presentation within a handshake.
      properties:
        presentation_id:
          type: string
        handshake_id:
          type: string
        party_role:
          type: string
        presentation_type:
          type: string
        issuer_ref:
          type: string
        claims:
          type: object
        disclosure_mode:
          type: string
          enum: [full, selective, zk]
        created_at:
          type: string
          format: date-time
