# EMILIA Protocol — Test Database
#
# Spins up a plain Postgres 17 instance for running integration tests
# against real DB constraints (triggers, unique indexes, check constraints).
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   INTEGRATION_POSTGRES=1 npx vitest run tests/postgres-integration.test.ts
#   docker compose -f docker-compose.test.yml down -v

services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER:     ep_test
      POSTGRES_PASSWORD: ep_test
      POSTGRES_DB:       ep_test
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ep_test -d ep_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data   # ephemeral — data is discarded on container stop
