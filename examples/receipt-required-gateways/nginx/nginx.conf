# Reference / experimental. Not production audited.
worker_processes auto;
error_log stderr notice;
pid /tmp/ep-receipt-required-nginx.pid;

events { worker_connections 1024; }

http {
  # Align this with the handler's receipt/header limits. Tune down if your
  # actual receipt profile is smaller.
  large_client_header_buffers 8 128k;
  client_max_body_size 1m;

  upstream ep_edge_auth { server ep-edge-auth:8788; }
  upstream protected_api { server protected-api:9000; }

  server {
    listen 8080;
    server_name _;

    location = /_ep_auth {
      internal;
      proxy_pass http://ep_edge_auth/nginx-auth;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-EMILIA-Receipt $http_x_emilia_receipt;
      proxy_set_header X-EP-Auth-Request-Mode nginx;
      proxy_set_header X-EP-Original-Method $request_method;
      proxy_set_header X-EP-Original-URI $request_uri;
      proxy_set_header X-EP-Original-Host $host;
      proxy_set_header X-EP-Original-Scheme $scheme;
      proxy_set_header X-EP-Original-Content-Length $http_content_length;
    }

    location @ep_receipt_challenge {
      proxy_pass http://ep_edge_auth/nginx-challenge;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-EP-Challenge-Only 1;
      proxy_set_header X-EP-Original-Method $request_method;
      proxy_set_header X-EP-Original-URI $request_uri;
      proxy_set_header X-EP-Original-Host $host;
      proxy_set_header X-EP-Original-Scheme $scheme;
      proxy_set_header X-EP-Original-Content-Length $http_content_length;
    }

    location / {
      auth_request /_ep_auth;
      error_page 403 = @ep_receipt_challenge;

      auth_request_set $ep_verified_action $upstream_http_x_emilia_verified_action;
      auth_request_set $ep_verified_receipt_id $upstream_http_x_emilia_verified_receipt_id;

      proxy_set_header X-EMILIA-Receipt "";
      proxy_set_header X-EMILIA-Verified-Action $ep_verified_action;
      proxy_set_header X-EMILIA-Verified-Receipt-ID $ep_verified_receipt_id;
      proxy_set_header X-EP-Original-Method "";
      proxy_set_header X-EP-Original-URI "";
      proxy_set_header X-EP-Original-Host "";
      proxy_set_header X-EP-Original-Scheme "";
      proxy_set_header X-EP-Original-Content-Length "";
      proxy_pass http://protected_api;
      proxy_intercept_errors off;
    }
  }
}
