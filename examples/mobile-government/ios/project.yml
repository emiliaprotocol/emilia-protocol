name: EmiliaGovernmentApproval
options:
  bundleIdPrefix: org.example
  deploymentTarget:
    iOS: "16.0"
packages:
  EmiliaMobile:
    path: ../../../sdks/swift-mobile
targets:
  GovernmentApproval:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: EmiliaMobile
    entitlements:
      path: GovernmentApproval.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.example.government.approvals
        PRODUCT_NAME: Government Approval
        SWIFT_VERSION: 6.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Government Approval
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.business
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
