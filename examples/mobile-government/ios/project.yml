name: EmiliaGovernmentApproval
options:
  bundleIdPrefix: ai.emiliaprotocol
  deploymentTarget:
    iOS: "16.0"
packages:
  EmiliaMobile:
    path: ../../../sdks/swift-mobile
targets:
  GovernmentApproval:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: EmiliaMobile
    entitlements:
      path: GovernmentApproval.entitlements
      properties:
        com.apple.developer.associated-domains:
          - webcredentials:www.emiliaprotocol.ai
          - applinks:www.emiliaprotocol.ai
        com.apple.developer.devicecheck.appattest-environment: $(APP_ATTEST_ENVIRONMENT)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.emiliaprotocol.approver
        PRODUCT_NAME: EMILIA Approver
        DEVELOPMENT_TEAM: 5M2Z48UQQY
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 6.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: EMILIA Approver
        INFOPLIST_KEY_EmiliaAPIBaseURL: https://www.emiliaprotocol.ai/api/
        INFOPLIST_KEY_NSFaceIDUsageDescription: Confirm a protected action with your device passkey.
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.business
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
      configs:
        Debug:
          APP_ATTEST_ENVIRONMENT: development
        Release:
          APP_ATTEST_ENVIRONMENT: production
