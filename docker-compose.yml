# EMILIA Protocol — Docker Helper
# Starts the Next.js app container only.
# EP requires a Supabase-compatible HTTP API (hosted or self-hosted).
# Provide NEXT_PUBLIC_SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY via .env or environment.

services:
  emilia-api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - CRON_SECRET=${CRON_SECRET:-dev-cron-secret}
      - EP_WALLET_PRIVATE_KEY=${EP_WALLET_PRIVATE_KEY:-}
      - BASE_RPC_URL=${BASE_RPC_URL:-https://mainnet.base.org}
    restart: unless-stopped
